<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卓管理</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #c9a84c;
    --accent-dim: #7a6330;
    --arrived: #1a3a2a;
    --arrived-border: #2ecc71;
    --text: #f0ece0;
    --text-dim: #888;
    --danger: #c0392b;
    --font-main: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  /* 入力欄・テキストエリアは通常通りテキスト選択できるようにする */
  input, textarea {
    -webkit-touch-callout: default;
    -webkit-user-select: text;
    user-select: text;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--accent-dim);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  .header-date {
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-stats {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .header-stats span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    z-index: 99;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ===== PANELS ===== */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* 固定統計バー（スクロールしても常時表示） */
  #fixedStats, #tantoStats, #baanaiBar {
    position: fixed;
    left: 0;
    right: 0;
    top: 0; /* JSのupdateFixedTop()で実際の位置に上書きされる。裏に隠れる事故を防ぐ初期値 */
  }

  /* ===== LINE INPUT ===== */
  .parse-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .parse-area-label {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
  }
  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 12px;
    min-height: 140px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }
  textarea::placeholder { color: #555; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    font-family: var(--font-main);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    justify-content: center;
    font-size: 14px;
    padding: 12px;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:active { filter: brightness(0.9); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sm {
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* ===== LOADING ===== */
  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .loading.show { display: block; }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shareNoteGlow {
    0%, 100% { box-shadow: 0 0 3px 1px rgba(231,76,60,0.7); border-color: #e74c3c; }
    50% { box-shadow: 0 0 10px 4px rgba(230,126,34,0.9); border-color: #e67e22; }
  }
  .share-note-glow { animation: shareNoteGlow 1.4s ease-in-out infinite; }

  /* ===== PARSED PREVIEW ===== */
  .parsed-preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 12px;
  }
  .parsed-preview-header {
    padding: 8px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .parsed-preview-header span {
    font-size: 12px;
    color: var(--text-dim);
  }
  .preview-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .preview-item:last-child { border-bottom: none; }
  .preview-item .name { font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .preview-item .meta { color: var(--text-dim); line-height: 1.6; }

  /* ===== TABLE LIST (紙様式) ===== */
  .paper-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
    background: #fff;
    color: #000;
  }
  .paper-table th {
    background: #f0f0f0;
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 3px;
    border: 1.5px solid #555;
    text-align: center;
    white-space: nowrap;
  }
  .paper-table td {
    padding: 5px 4px;
    border: 1px solid #888;
    vertical-align: middle;
    color: #000;
    font-size: 12px;
    line-height: 1.4;
    min-height: 28px;
    height: 28px;
  }
  .paper-table tr.arrived td {
    background: #b0c4b0;
    text-decoration: line-through;
    color: #444;
  }
  .paper-table tr:not(.arrived):nth-child(even) td { background: #fafafa; }
  .paper-table tr:not(.arrived) td { background: #fff; }
  .paper-table tr.overdue-highlight td { background: #5a2a2a !important; color: #fff !important; }

  .p-col-no   { width: 24px; text-align: center; color: #888; font-size: 11px; cursor:pointer; }
  .p-col-num  { width: 42px; text-align: center; font-weight: 700; color: #c9a84c; }
  .p-col-time { width: 52px; text-align: center; font-size: 11px; }
  .p-col-tanto{ width: 46px; }
  .p-col-guest{ width: 80px; }
  .p-col-keep { width: 44px; text-align: center; }
  .p-col-note { width: 136px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 初回タブ：スマホ幅では列を詰めて、横スクロールなしで全体が見えるようにする（PC表示はそのまま） */
  @media (max-width: 500px) {
    #firstTable th, #firstTable td {
      font-size: 9.5px !important;
      padding: 3px 2px !important;
      line-height: 1.25 !important;
    }
    #firstTable th { white-space: normal !important; }
    #firstTable th:nth-child(1) { width: 18px !important; }
    #firstTable th:nth-child(2) { width: 26px !important; }
    #firstTable th:nth-child(3) { width: 32px !important; }
    #firstTable th:nth-child(4) { width: 28px !important; }
    #firstTable th:nth-child(5) { width: 40px !important; }
    #firstTable th:nth-child(6) { width: 40px !important; }
    #firstTable th:nth-child(7) { width: 36px !important; }
    #firstTable th:nth-child(8) { width: 36px !important; }
    #firstTable th:nth-child(9) { width: 42px !important; }
  }

  .table-num-input {
    width: 100%;
    border: none;
    background: #fffde7;
    font-size: 12px;
    font-weight: 700;
    color: #c9a84c;
    text-align: center;
    outline: 1px solid #c9a84c;
    padding: 2px;
    border-radius: 2px;
    font-family: var(--font-main);
  }
  .editable { cursor: pointer; }
  .editable:hover { background: #fffde7 !important; }
  .paper-table tr.arrived .editable:hover { background: #c8ddc8 !important; }
  .cell-input {
    width: 100%;
    border: none;
    outline: 1px solid #c9a84c;
    background: #fffde7;
    font-size: 12px;
    color: #000;
    padding: 2px 3px;
    font-family: var(--font-main);
    border-radius: 2px;
    box-sizing: border-box;
  }

  .paper-table tr {
    cursor: pointer;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #deleteOverlay {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .paper-table tr:hover td { filter: brightness(0.95); }

  /* ===== TABLE LIST (テーブル形式) ===== */
  .res-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  .res-table th {
    background: var(--surface2);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 8px 5px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .res-table td {
    padding: 8px 5px;
    border: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
    font-size: 12px;
    word-break: break-all;
    line-height: 1.5;
  }
  .res-table tr.arrived td { background: var(--arrived); }
  .paper-table tr.arrived td { background: #d4edda !important; color: #000; }
  .res-table tr:nth-child(even):not(.arrived) td { background: rgba(255,255,255,0.02); }

  .col-num   { width: 30px; text-align: center; }
  .col-time  { width: 54px; text-align: center; }
  .col-tanto { width: 52px; }
  .col-guest { width: auto; font-weight: 600; }
  .col-keep  { width: 56px; }
  .col-note  { width: 72px; font-size: 11px; color: var(--text-dim); }
  .col-act   { width: 36px; text-align: center; }

  .num-cell { font-weight: 900; color: var(--accent); font-size: 15px; }
  .arrived-cell { color: var(--arrived-border); font-weight: 900; font-size: 15px; }

  .arrive-btn {
    width: 100%;
    padding: 6px 2px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .arrive-btn:hover { border-color: var(--arrived-border); color: var(--arrived-border); }
  tr.arrived .arrive-btn.main-btn { background: var(--arrived-border); color: #000; border-color: var(--arrived-border); }

  /* ===== VIEW LIST ===== */
  .view-section-label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--accent-dim);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .view-section-label:first-child { margin-top: 0; }
  .view-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .view-row:last-child { border-bottom: none; }
  .view-num {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    min-width: 32px;
    text-align: center;
    line-height: 1.3;
  }
  .view-num.no-table { color: var(--text-dim); font-size: 12px; font-weight: 400; padding-top: 2px; }
  .view-body { flex: 1; }
  .view-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .view-meta { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .view-arrived { color: var(--arrived-border); font-size: 11px; font-weight: 700; }
  .view-num-inline { color: var(--accent); font-weight: 900; font-size: 15px; min-width: 40px; display: inline-block; }

  /* ===== UNASSIGNED LIST ===== */
  .unassigned-section { margin-top: 16px; }
  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .guest-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .guest-chip-info { flex: 1; font-size: 12px; }
  .guest-chip-name { font-weight: 700; color: var(--accent); margin-bottom: 2px; }
  .guest-chip-meta { color: var(--text-dim); line-height: 1.5; }
  .guest-chip-assign { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .table-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 12px;
    padding: 5px 6px;
    outline: none;
    max-width: 80px;
  }
  .table-select:focus { border-color: var(--accent); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }
  .modal-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .modal-body { padding: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 4px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }

  /* 項目数の多いモーダル用のコンパクト表示 */
  .form-row-compact { margin-bottom: 7px; }
  .form-label-compact { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; display: block; }
  .form-input-compact {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 6px 8px;
    outline: none;
  }
  .form-input-compact:focus { border-color: var(--accent); }

  .aiban-input {
    flex: 1;
    min-width: 0;
    box-sizing: border-box;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 12px;
    padding: 5px 7px;
    outline: none;
  }
  .aiban-input:focus {
    border-color: #3498db;
    background: #0d1b26;
    box-shadow: 0 0 0 1px #3498db;
  }

  .modal-footer {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .modal-footer .btn { flex: 1; justify-content: center; }

  /* ===== UPLOAD ===== */
  .upload-area {
    background: var(--surface);
    border: 2px dashed var(--accent-dim);
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-text { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text-dim); }
  .thumb-wrap { position: relative; width: 72px; height: 72px; }
  .thumb-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .thumb-remove {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--danger); border-radius: 50%; border: none;
    color: #fff; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    border-radius: 12px;
    padding: 32px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .login-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }
  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 16px;
    padding: 12px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-error {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 8px;
    min-height: 16px;
  }

  /* iOSズームアップ防止 */
  input, select, textarea { font-size: 16px !important; }

  @media (max-width: 480px) {
    .table-grid { grid-template-columns: 1fr; }
    .header-title { font-size: 14px; }
  }
</style>

  const backupRef = ref(db, 'resetBackup');
  const aliasRef = ref(db, 'staffAliases');
  const baanaiRef = ref(db, 'baanai');
  const floorRef = ref(db, 'floorData');
  const dayStatusRef = ref(db, 'staffDayStatus');
  const monthlyLogsRef = ref(db, 'monthlyLogs');

  // Firebaseにゲストデータを保存
  // Firebaseにゲスト1件を保存（衝突回避：全体を上書きせず該当IDのみ書き込む）
  window.fbSaveGuest = function(guest) {
    if (!guest || guest.id == null) return;
    set(ref(db, 'guests/g' + guest.id), guest).catch(e => console.error('FB save guest error:', e));
  };
  // Firebaseからゲスト1件を削除
  window.fbRemoveGuest = function(id) {
    if (id == null) return;
    remove(ref(db, 'guests/g' + id)).catch(e => console.error('FB remove guest error:', e));
  };

  // Firebaseにスタッフリストを保存
  window.fbSaveStaff = function(list) {
    set(staffRef, list).catch(e => console.error('FB staff save error:', e));
  };

  // Firebaseに初回データを保存
  // Firebaseに初回グループ1件を保存（衝突回避：全体を上書きせず該当IDのみ書き込む）
  window.fbSaveFirstGroup = function(group) {
    if (!group || group.id == null) return;
    set(ref(db, 'firstGroups/g' + group.id), group).catch(e => console.error('FB save firstGroup error:', e));
  };
  // Firebaseから初回グループ1件を削除
  window.fbRemoveFirstGroup = function(id) {
    if (id == null) return;
    remove(ref(db, 'firstGroups/g' + id)).catch(e => console.error('FB remove firstGroup error:', e));
  };

  // Firebaseにリセット直前のバックアップを保存
  window.fbSaveBackup = function(backupData) {
    set(backupRef, backupData).catch(e => console.error('FB backup save error:', e));
  };

  // Firebaseに呼び名データを保存
  window.fbSaveAliases = function(aliasData) {
    set(aliasRef, aliasData || {}).catch(e => console.error('FB alias save error:', e));
  };
  // 呼び名は1名分だけをピンポイントで更新する版（衝突回避）
  window.fbSaveAliasesFor = function(staffName, aliasList) {
    if (!staffName) return;
    set(ref(db, 'staffAliases/' + staffName), aliasList || []).catch(e => console.error('FB alias save error:', e));
  };

  // Firebaseに場内メモを保存
  window.fbSaveBaanai = function(text) {
    set(baanaiRef, text || '').catch(e => console.error('FB baanai save error:', e));
  };

  // Firebaseに卓状況（フロア構成）を保存
  window.fbSaveFloor = function(floorDataObj) {
    set(floorRef, floorDataObj || {}).catch(e => console.error('FB floor save error:', e));
  };

  // Firebaseに本日の報告状況（休み・有休・半休・予定未定）を保存
  window.fbSaveDayStatus = function(dayStatusObj) {
    set(dayStatusRef, dayStatusObj || {}).catch(e => console.error('FB dayStatus save error:', e));
  };
  // 報告状況は1名分だけをピンポイントで更新する版（衝突回避）
  window.fbSaveDayStatusFor = function(staffName, entry) {
    if (!staffName) return;
    set(ref(db, 'staffDayStatus/' + staffName), entry).catch(e => console.error('FB dayStatus save error:', e));
  };

  // Firebaseに月次集計ログの1日分を保存（キーは日付文字列）
  window.fbSaveMonthlyLog = function(dateKey, logData) {
    set(ref(db, 'monthlyLogs/' + dateKey), logData).catch(e => console.error('FB monthlyLog save error:', e));
  };

  // Firebaseからゲストをリアルタイム受信
  onValue(guestsRef, (snapshot) => {
    const data = snapshot.val();
    window._fbGuests = data === null ? [] : Object.values(data).filter(g => g && (g.name || g.tanto || g.tableNum));
    if (typeof guests !== 'undefined' && typeof renderTables === 'function') {
      // 初回以降もリアルタイム反映
      guests = window._fbGuests;
      nextId = guests.reduce((m,g) => Math.max(m, (g.id||0)+1), 1);
      if (window.renderTables) window.renderTables();
      if (window.renderStaffStatus) window.renderStaffStatus();
      if (window.renderView && document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active')) window.renderView();
      if (window.updateStats) window.updateStats();
    } else if (window._fbReady) {
      window._fbReady();
    }
  });

  // Firebaseからスタッフリストをリアルタイム受信
  onValue(staffRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const list = Array.isArray(data) ? data : String(data).split('\n').map(s => s.trim()).filter(Boolean);
      window._fbStaff = list;
      // 常にリアルタイムで反映
      if (typeof staffList !== 'undefined') {
        staffList = list;
        try { localStorage.setItem('tableManager_staff', JSON.stringify(staffList)); } catch(e) {}
        if (window.renderStaffStatus) window.renderStaffStatus();
      } else if (window._fbStaffReady) {
        window._fbStaffReady();
      }
    }
  });

  // Firebaseから初回データをリアルタイム受信
  onValue(firstRef, (snapshot) => {
    const data = snapshot.val();
    // 1件ずつ 'g'+id キーで保存された形式に対応（配列としてもオブジェクトとしても受け取れるようにする）
    const list = Array.isArray(data) ? data.filter(Boolean) : (data && typeof data === 'object' ? Object.values(data).filter(Boolean) : []);
    window._fbFirstGroups = list;
    if (typeof firstGroups !== 'undefined' && typeof renderFirstTab === 'function') {
      firstGroups = list;
      // idカウンタがFirebase側のデータと衝突しないよう調整
      if (typeof firstGid !== 'undefined') {
        firstGid = list.reduce((m,g)=>Math.max(m,(g.id||0)+1), 1);
      }
      if (typeof firstRid !== 'undefined') {
        list.forEach(g => {
          (g.rows||[]).forEach(r => { firstRid = Math.max(firstRid, (r.id||0)+1); });
        });
      }
      try { localStorage.setItem('rj_firstData', JSON.stringify(firstGroups)); } catch(e) {}
      if (window.renderFirstTabFromFB) window.renderFirstTabFromFB();
    } else if (window._fbFirstReady) {
      window._fbFirstReady();
    }
  });

  // Firebaseからリセットバックアップをリアルタイム受信（別端末からの復元にも対応）
  onValue(backupRef, (snapshot) => {
    const data = snapshot.val();
    window._fbBackup = data || null;
    if (window.updateUndoButtonState) window.updateUndoButtonState();
  });

  // Firebaseから呼び名データをリアルタイム受信
  onValue(aliasRef, (snapshot) => {
    const data = snapshot.val();
    const aliases = (data && typeof data === 'object') ? data : {};
    window._fbAliases = aliases;
    if (typeof staffAliases !== 'undefined') {
      staffAliases = aliases;
      try { localStorage.setItem('rj_staffAliases', JSON.stringify(staffAliases)); } catch(e) {}
      if (window.refreshAliasModalIfOpen) window.refreshAliasModalIfOpen();
    }
  });

  // Firebaseから場内メモをリアルタイム受信
  onValue(baanaiRef, (snapshot) => {
    const data = snapshot.val();
    const text = typeof data === 'string' ? data : '';
    window._fbBaanai = text;
    try { localStorage.setItem('rj_baanai', text); } catch(e) {}
    const el = document.getElementById('baanaiInput');
    // 自分が今まさに入力中でなければ値を反映（別端末からの更新を取りこぼさないため）
    if (el && document.activeElement !== el) el.value = text;
    if (window.updateBaanaiBar) window.updateBaanaiBar(text);
    if (window.renderFloorStatus) window.renderFloorStatus();
  });

  // Firebaseから卓状況（フロア構成）をリアルタイム受信
  onValue(floorRef, (snapshot) => {
    const data = snapshot.val();
    if (data && typeof data === 'object' && (data.V || data.A || data.B)) {
      window._fbFloorData = data;
      if (typeof floorData !== 'undefined') {
        floorData = data;
        try { localStorage.setItem('rj_floorData', JSON.stringify(floorData)); } catch(e) {}
        if (window.renderFloorStatus) window.renderFloorStatus();
        if (window.refreshFloorModalIfOpen) window.refreshFloorModalIfOpen();
      }
    }
  });

  // Firebaseから本日の報告状況（休み・有休・半休・予定未定）をリアルタイム受信
  onValue(dayStatusRef, (snapshot) => {
    const data = snapshot.val();
    const statusObj = (data && typeof data === 'object') ? data : {};
    window._fbDayStatus = statusObj;
    if (typeof staffDayStatus !== 'undefined') {
      staffDayStatus = statusObj;
      try { localStorage.setItem('rj_staffDayStatus', JSON.stringify(staffDayStatus)); } catch(e) {}
      if (window.renderStaffStatus) window.renderStaffStatus();
    }
  });

  // Firebaseから月次集計ログをリアルタイム受信（過去分含む全件）
  onValue(monthlyLogsRef, (snapshot) => {
    const data = snapshot.val();
    const logs = (data && typeof data === 'object') ? data : {};
    window._fbMonthlyLogs = logs;
    try { localStorage.setItem('rj_monthlyLogs', JSON.stringify(logs)); } catch(e) {}
    if (window.refreshSummaryModalIfOpen) window.refreshSummaryModalIfOpen();
  });
</script>
</head>

<!-- 固定統計バー（JSでtop位置を計算してヘッダー/タブ直下に固定） -->

<!-- 予定報告パネル -->

  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
    <button onclick="promptQuickStatus('pending')" style="flex:1;min-width:70px;padding:8px 4px;border-radius:6px;border:1px solid #3498db;background:transparent;color:#3498db;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">予定未定</button>

  <div style="display:flex; gap:10px; align-items:flex-start;">

お客様名：
来店時間：

      <span style="font-size:10px;color:var(--accent);letter-spacing:0.08em;font-weight:700;">卓状況</span>
      <button onclick="openFloorSettings()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:2px 8px;cursor:pointer;font-family:var(--font-main);">⚙ 編集</button>

    <div style="display:flex;gap:8px;" id="floorStatusArea">
      <!-- V・A・Bフロア -->

      <button class="btn btn-primary" onclick="addManual()">追加</button>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let guests = []; // { id, name, arrive, leave, tanto, budget, help, note, tableNum, arrived }
let nextId = 1;
let firstGroups = [];
let firstGid = 1;
let firstRid = 1;
let staffList = [];
let staffAliases = {}; // { "本名": ["呼び名1","呼び名2", ...] }
let staffDayStatus = {}; // { "本名": { status: 'pending'|'off'|'paid_off'|'half_off', reportType: 'self'|'proxy'|null, timestamp } }
let proxyMode = false; // 内勤端末での「代理入力モード」。ページを開くたびOFFにリセットされる（意図的に永続化しない）

// ===== LOGIN =====
const PASS_ADMIN = 'rj0123';
const PASS_HOST  = '1234';

function checkLogin() {
  const role = localStorage.getItem('rj_role');
  if (role === 'admin' || role === 'host') {
    applyRole(role);
    document.getElementById('loginScreen').style.display = 'none';
  }
}

function doLogin() {
  const val = document.getElementById('loginInput').value.trim();
  if (val === PASS_ADMIN) {
    localStorage.setItem('rj_role', 'admin');
    applyRole('admin');
    document.getElementById('loginScreen').style.display = 'none';
  } else if (val === PASS_HOST) {
    localStorage.setItem('rj_role', 'host');
    applyRole('host');
    document.getElementById('loginScreen').style.display = 'none';
  } else {
    document.getElementById('loginError').textContent = 'パスワードが違います';
    document.getElementById('loginInput').value = '';
  }
}

function applyRole(role) {
  if (role === 'host') {
    // ホストは卓一覧タブを非表示
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    // 卓一覧タブ（index 1）を非表示

// ===== AI TEXT PARSE =====
function resetTemplate() {
  document.getElementById('lineTextInput').value = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
}

function clearTemplate() {
  const ta = document.getElementById('lineTextInput');
  const tmpl = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  const blocks = ta.value.split('\n\n').filter(b => b.trim());
  const filtered = blocks.filter(block => {
    const lines = block.split('\n');
    return lines.some(line => {
      const idx = line.indexOf('：');
      const val = idx >= 0 ? line.slice(idx + 1).trim() : line.trim();
      return val !== '';
    });
  });
  ta.value = filtered.join('\n\n');
}

function addTemplate() {
  const ta = document.getElementById('lineTextInput');
  const current = ta.value.trim();
  const tmpl = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  ta.value = current ? current + '\n\n' + tmpl : tmpl;
  ta.scrollTop = ta.scrollHeight;
}

function parseLineText() {
  const text = document.getElementById('lineTextInput').value.trim();
  if (!text) { showToast('内容を入力してください'); return; }

  // ブロックを空行で分割
  const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
  const parsed = [];

  blocks.forEach(block => {
    // ラベルの表記ゆれ（「担当名」→「担当」など短縮形も可）と、
    // コロンの表記ゆれ（半角「:」・全角「：」どちらも可）に対応する
    const get = (keys) => {
      const keyArr = Array.isArray(keys) ? keys : [keys];
      for (const k of keyArr) {
        const match = block.match(new RegExp(k + '\\s*[:：]\\s*(.*)'));
        if (match) return match[1].trim();
      }
      return '';
    };

    // テンプレ形式かチェック
    const tanto = get(['担当名', '担当']);
    const name = get(['お客様名', 'お客様', '名前', 'お名前']);

    if (tanto || name) {
      // テンプレ形式
      if (!tanto) { showToast('担当名を入力してください'); return; }
      // 予定未定はスキップ（お客様名なしor予定未定）
      if (!name || name.includes('予定未定')) {
        // 報告状況に反映するためtantoだけ記録
        markReported(tanto);
        return;
      }
      parsed.push({
        tanto, name,
        arrive: get(['来店時間', '来店']),
        leave:  get(['退店時間', '退店']),
        budget: get(['予算']),
        help:   get(['ヘルプ']),
        note:   get(['備考']),
        aiban:  get(['アイバン']),
      });
    } else {
      // 自由入力形式（例：「カルマ 予定未定」）
      const trimmed = block.trim();
      if (!trimmed) return;
      // 予定未定を含む場合は報告状況に反映してスキップ
      if (trimmed.includes('予定未定')) {
        // 名前部分を抽出（「カルマ予定未定」「カルマ 予定未定」両対応）
        const tName = trimmed.replace(/\s*予定未定.*/, '').trim();
        if (tName) markReported(tName);
        return;
      }
      // スペース区切りで最初の単語を担当名、残りをお客様名として扱う
      const parts = trimmed.split(/\s+/);
      if (parts.length < 2) { showToast('担当名とお客様名を入力してください'); return; }
      parsed.push({
        tanto: parts[0],
        name: parts.slice(1).join(' '),
        arrive: '', leave: '', budget: '', help: '', note: '',
      });
    }
  });

  if (!parsed.length) {
    showToast('有効な報告が見つかりませんでした');
    return;
  }

  showReportPreview(parsed);
}

let _reportPreviewData = [];

function showReportPreview(parsed) {
  const previous = _reportPreviewData || [];
  _reportPreviewData = parsed.map(p => {
    const copy = { ...p };
    // 「戻って修正」→再度「報告する」で戻ってきた時、同じ担当名+お客様名ならアイバン入力を引き継ぐ
    if (!copy.aiban) {
      const match = previous.find(prev => prev.tanto === copy.tanto && prev.name === copy.name && prev.aiban);
      if (match) {
        copy.aiban = match.aiban;
        copy._aibanTanto = match._aibanTanto;
        copy._aibanName = match._aibanName;
      }
    }
    return copy;
  });
  _aibanFormOpen = {};
  renderReportPreviewModal();
}

function updateAibanField(index, part, value) {
  const p = _reportPreviewData[index];
  if (!p) return;
  if (part === 'tanto') p._aibanTanto = value;
  if (part === 'name') p._aibanName = value;
  p.aiban = [p._aibanTanto, p._aibanName].filter(Boolean).join(' ');

function clearAibanField(index) {
  const p = _reportPreviewData[index];
  if (!p) return;
  p.aiban = '';
  p._aibanTanto = '';
  p._aibanName = '';
  _aibanFormOpen[index] = false;
  renderReportPreviewModal();
}

function updateReportPreviewField(index, key, value) {
  if (!_reportPreviewData[index]) return;
  _reportPreviewData[index][key] = value;
}

function removeReportPreviewRow(index) {
  _reportPreviewData.splice(index, 1);
  if (!_reportPreviewData.length) {
    document.getElementById('reportPreviewModal').classList.remove('show');
    showToast('報告内容がなくなりました');
    return;
  }
  renderReportPreviewModal();

function confirmReportPreview() {
  document.getElementById('reportPreviewModal').classList.remove('show');
  // アイバン入力フォーム用の一時フィールドはゲストデータに持ち込まない
  const cleaned = _reportPreviewData.map(p => {
    const copy = { ...p };
    delete copy._aibanTanto;
    delete copy._aibanName;
    return copy;
  });
  importTextParsed(cleaned);
  _reportPreviewData = [];
  _aibanFormOpen = {};
}

function importTextParsed(parsed) {
  if (!parsed || !parsed.length) {
    showToast('該当する報告が見つかりませんでした');
    return;
  }
  const usedRows = new Set(guests.map(g => Number(g.rowNum)).filter(Boolean));
  let rc = 1;
  let skipped = 0;
  parsed.forEach(g => {
    const isDuplicate = guests.some(existing =>
      existing.tanto && existing.name && g.tanto && g.name &&
      (existing.tanto.includes(g.tanto) || g.tanto.includes(existing.tanto)) &&
      existing.name === g.name
    );
    if (isDuplicate) { skipped++; return; }
    while (usedRows.has(rc)) rc++;
    usedRows.add(rc);
    guests.push({ id: nextId++, ...g, rowNum: String(rc++), tableNum: g.tableNum||'', arrived: false, reportType: getCurrentReportType() });
  });
  document.getElementById('previewArea').innerHTML = '';
  document.getElementById('lineTextInput').value = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  saveToStorage();
  updateStats();
  renderStaffStatus();
  const msg = skipped > 0 ? `取り込みました！（重複${skipped}件をスキップ）` : `${parsed.length - skipped}件を取り込みました！`;
  showToast(msg);
  switchTab('tables');
}

  const beforeRepack = JSON.stringify(guests.map(g => g.rowNum));

    try { localStorage.setItem('tableManager_guests', JSON.stringify(guests)); } catch(e) {}

    }

  const rowMap = {};
  guests.forEach(g => { if (g.rowNum) rowMap[g.rowNum] = g; });

  for (let i = 1; i <= MAX_ROWS; i++) {
    const g = rowMap[i];
    if (g) {
      rows += rowHTML(i, g);

  // MAX_ROWS超えの行
  guests.filter(g => g.rowNum && Number(g.rowNum) > MAX_ROWS)
    .sort((a,b) => Number(a.rowNum)-Number(b.rowNum))
    .forEach(g => { rows += rowHTML(g.rowNum, g); });

// アイバン文字列（「担当名 お客様名」形式）を、担当名部分とお客様名部分に分解する
// 編集モーダルなどで2列入力欄に事前入力するために使う
function splitAibanText(text) {
  if (!text || !text.trim()) return { tanto: '', name: '' };
  const trimmed = text.trim();
  const aliasIndex = buildAliasIndex();
  const normText = toHiragana(trimmed);
  const staffMatch = aliasIndex.find(entry => normText.startsWith(entry.norm));
  if (staffMatch) {
    return { tanto: staffMatch.name, name: trimmed.slice(staffMatch.text.length).trim() };
  }
  return { tanto: '', name: trimmed };
}

// アイバン欄（「担当名　お客様名」形式）から、対応する相手のゲストを探す
// 表記は担当名の呼び名マッチ＋お客様名の部分一致で判定する（完全一致は求めない）
function findAibanPartner(g) {
  if (!g.aiban) return null;
  const text = g.aiban.trim();
  if (!text) return null;
  const aliasIndex = buildAliasIndex();
  const normText = toHiragana(text);
  // 担当名らしき部分を先頭から検出
  const staffMatch = aliasIndex.find(entry => normText.startsWith(entry.norm));
  const nameHint = staffMatch ? text.slice(staffMatch.text.length).trim() : text;
  return guests.find(other => {
    if (other.id === g.id || other.left) return false;
    const nameOk = nameHint && other.name && toHiragana(other.name).includes(toHiragana(nameHint).replace(/[△\s]/g,''));
    const tantoOk = !staffMatch || (other.tanto && toHiragana(other.tanto).includes(staffMatch.norm));
    return nameOk && tantoOk;
  }) || null;
}

// そのゲストがアイバンで誰かと紐づいているかを判定する（自分が設定側／相手として参照される側の両方に対応）
// アイバンで繋がっているグループごとに色を割り当てる（複数組のアイバンが同時にあっても見分けられるように）
const AIBAN_PALETTE = ['#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#e91e63', '#2ecc71', '#f39c12', '#95a5a6'];
function computeAibanColorMap() {
  const active = guests.filter(g => !g.left);
  const parent = {};
  function find(x) {
    if (!(x in parent)) parent[x] = x;
    while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
    return x;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra !== rb) parent[ra] = rb;
  }
  active.forEach(g => {
    if (g.aiban && g.aiban.trim()) {
      const partner = findAibanPartner(g);
      if (partner) { find(g.id); find(partner.id); union(g.id, partner.id); }
    }
  });
  const groupsMap = {};
  Object.keys(parent).forEach(idStr => {
    const id = Number(idStr);
    const root = find(id);
    if (!groupsMap[root]) groupsMap[root] = [];
    groupsMap[root].push(id);
  });
  // グループ内最小idの昇順で色を安定的に割り当てる
  const groupList = Object.values(groupsMap).sort((a,b) => Math.min(...a) - Math.min(...b));
  const colorMap = {};
  groupList.forEach((ids, idx) => {
    const color = AIBAN_PALETTE[idx % AIBAN_PALETTE.length];
    ids.forEach(id => { colorMap[id] = color; });
  });
  return colorMap;
}

function getAibanLinkInfo(g) {
  const colorMap = computeAibanColorMap();
  const color = colorMap[g.id] || '#3498db';
  if (g.aiban && g.aiban.trim()) {
    const partner = findAibanPartner(g);
    const label = partner
      ? `アイバン: ${partner.tanto||''} ${formatGuestDisplayName(partner.name)}`
      : `アイバン: ${g.aiban}`;
    return { linked: true, label, color, partnerId: partner ? partner.id : null };
  }
  const referrer = guests.find(other => {
    if (other.id === g.id || other.left || !other.aiban) return false;
    const partner = findAibanPartner(other);
    return partner && partner.id === g.id;
  });
  if (referrer) {
    return { linked: true, label: `アイバン: ${referrer.tanto||''} ${formatGuestDisplayName(referrer.name)}と`, color, partnerId: referrer.id };
  }
  return { linked: false, label: '', color: null, partnerId: null };
}

// インライン編集でセルを再描画すると、キーボードが閉じるタイミングと重なって
// 画面が勝手にスクロールしてしまうことがあるため、再描画の前後でスクロール位置を保持する
// 編集していた行(trEl)を目印に、再描画後も同じ行が画面上の同じ位置に見えるよう調整する
// （絶対スクロール位置の保持だけだと、編集前後で行の高さがわずかに変わる場合にズレてしまうため）
function withScrollPreserved(renderFn, trEl) {
  const rowNum = trEl ? trEl.getAttribute('data-rownum') : null;
  const trId = trEl ? trEl.id : null;
  const beforeTop = trEl ? trEl.getBoundingClientRect().top : null;

  function realign() {
    if (beforeTop === null) return;
    let newTr = null;
    if (rowNum) newTr = document.querySelector(`[data-rownum="${rowNum}"]`);
    if (!newTr && trId) newTr = document.getElementById(trId);
    if (newTr) {
      const afterTop = newTr.getBoundingClientRect().top;
      window.scrollBy(0, afterTop - beforeTop);
    }
  }

  // キーボードが閉じるアニメーションと再描画のタイミングが重なるとズレやすいため、
  // 少し待ってキーボードが閉じきってから再描画し、その後複数回にわたって位置を補正する
  setTimeout(() => {
    renderFn();
    realign();
    requestAnimationFrame(realign);
    setTimeout(realign, 100);
    setTimeout(realign, 300);
  }, 120);
}

// セルをインライン編集
function editCell(id, field, td) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  const current = g[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  // カーソルを末尾に（全選択しない）
  const len = input.value.length;
  input.setSelectionRange(len, len);
  function save() {
    g[field] = input.value.trim();
    saveToStorage();
    updateSingleGuestRow(id);
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { td.textContent = current; }
  });
}

// 空行タップで新規作成してその場編集
function createAndEdit(rowNum, field, td) {
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  function save() {
    const val = input.value.trim();
    if (!val) { withScrollPreserved(renderTables, td.closest('tr')); return; } // 空なら何もしない
    const g = { id: nextId++, rowNum: String(rowNum), tableNum:'', arrive:'', leave:'', tanto:'', name:'', budget:'', note:'', help:'', arrived: false };
    g[field] = val;
    guests.push(g);
    repackRowNums();
    saveToStorage();
    withScrollPreserved(renderTables, td.closest('tr'));
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { withScrollPreserved(renderTables, td.closest('tr')); }
  });
}



// ===== 卓状況 =====
const DEFAULT_FLOORS = {
  V: Array.from({length:9},(_,i)=>'V'+(i+1)),
  A: Array.from({length:6},(_,i)=>'A'+(i+1)),
  B: Array.from({length:9},(_,i)=>'B'+(i+1)),
};
let floorData = JSON.parse(JSON.stringify(DEFAULT_FLOORS));

function loadFloorData() {
  try {
    const raw = localStorage.getItem('rj_floorData');
    if (raw) floorData = JSON.parse(raw);
  } catch(e) {}
}

function saveFloorData() {
  try { localStorage.setItem('rj_floorData', JSON.stringify(floorData)); } catch(e) {}
  if (window.fbSaveFloor) window.fbSaveFloor(floorData);
}

function renderFloorStatus() {
  const area = document.getElementById('floorStatusArea');
  if (!area) return;
  // 卓番→表示情報のマップを作成（通常ゲスト・初回グループ両対応）
  // 同じ卓に「予定報告の来店予定」と「今対応中の初回」が重なる場合、初回を優先表示する
  // （例：22時に予定の客がいても、19時に来た初回を同じ卓で先に対応しているケース）
  const infoMap = {}; // { "V1": { tanto, name, help, specials, isFirst } }
  (firstGroups || []).filter(g => g.tableNum).forEach(g => {
    // 全員が飲直に転換済みなら、もう「初回」ではなく実際のお客様として扱う（優先表示の対象から外す）
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => r.nominaoshi && r.nominaoshi.trim() !== '');
    if (allDone) return;
    const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
    if (!infoMap[key]) {
      const count = parseInt(g.count) || 0;
      const photoNames = [...new Set((g.rows||[]).flatMap(r => [r.photo1, r.photo2]).filter(Boolean))];
      infoMap[key] = { tanto: '', name: `初回${count ? count+'名' : ''}`, help: photoNames.length ? '写指:'+photoNames.join('/') : '', specials: [], isFirst: true, arrived: true };
    }
  });
  // 通常ゲストは「来店済み」を優先して登録する。同じ卓に予定(未来店)と現状(来店済み)が
  // 被っている場合、現状の方だけが表示・タップ・長押し編集の対象になるようにするため
  guests.filter(g => g.tableNum && !g.left && g.arrived).forEach(g => {
    const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
    if (!infoMap[key]) {
      infoMap[key] = {
        tanto: g.tanto || '',
        name: (g.name || '').replace('△','').trim(),
        help: g.help || '',
        leave: g.leave || '',
        shareNote: g.shareNote || '',
        specials: g.specials || [],
        isFirst: false,
        arrived: true
      };
    }
  });
  guests.filter(g => g.tableNum && !g.left && !g.arrived).forEach(g => {
    const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
    if (!infoMap[key]) {
      infoMap[key] = {
        tanto: g.tanto || '',
        name: (g.name || '').replace('△','').trim(),
        help: g.help || '',
        leave: g.leave || '',
        specials: g.specials || [],
        isFirst: false,
        arrived: false
      };
    }
  });

  // 【場内】欄から卓番ごとの場内指名を取得
  let baanaiText = '';
  try { baanaiText = localStorage.getItem('rj_baanai') || ''; } catch(e) {}
  const baanaiMap = parseBaanaiAssignments(baanaiText);

  // 特記事項アイコンの凡例（表示中の卓に1つでも使われていれば表示）
  const legendEl = document.getElementById('floorLegend');
  if (legendEl) {
    const usedKeys = new Set();
    Object.values(infoMap).forEach(info => (info.specials || []).forEach(k => usedKeys.add(k)));
    if (usedKeys.size) {
      legendEl.innerHTML = SPECIALS.filter(s => usedKeys.has(s.key))
        .map(s => `<span style="font-size:10px;color:var(--text-dim);">${s.icon}${s.label}</span>`).join('');
      legendEl.style.display = 'flex';
    } else {
      legendEl.style.display = 'none';
      legendEl.innerHTML = '';
    }
  }

  const floors = ['V','A','B'];
  area.innerHTML = floors.map(f => {
    const tables = floorData[f] || [];
    return `
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:4px;font-weight:700;">${f}フロア</div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          ${tables.map(t => {
            const key = t.toUpperCase();
            const info = infoMap[key];
            const baanaiName = baanaiMap[key];
            const used = !!info || !!baanaiName;
            if (!used) {
              return `<div style="display:flex;align-items:center;font-size:10px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);">
                <span style="font-weight:700;">${t}</span>
              </div>`;
            }
            // 1行目: 卓番 → アイコン → キャスト　/　2行目: お客様名(キャストと同色) → ヘルプ → 場内指名(薄色)
            const iconsHtml = (info && info.specials && info.specials.length)
              ? info.specials.map(k => { const s = SPECIALS.find(x => x.key === k); return s ? s.icon : ''; }).join('')
              : '';
            const arrived = !!(info && info.arrived);
            // 来店済み: ゴールド塗りつぶし（今まで通り） / 未来店: ゴールド枠線のみで控えめに
            const boxBg = arrived ? '#c9a84c' : 'transparent';
            const boxText = arrived ? '#000' : 'var(--text)';
            const boxDim = arrived ? '#5a4a1a' : '#a68a4a';
            let line1, line2, line3;
            if (info && info.isFirst) {
              line1 = `<span style="font-weight:700;">${t}</span>${iconsHtml ? ' '+iconsHtml : ''}`;
              line2 = info.help
                ? `<span style="color:${boxText};">${info.name}</span> <span style="color:${boxDim};">${info.help}</span>`
                : `<span style="color:${boxText};">${info.name}</span>`;
              line3 = baanaiName ? `<span style="color:${boxDim};">場内: ${baanaiName}</span>` : '';
            } else {
              const tanto = (info && info.tanto) || '';
              const leaveHtml = (info && info.leave && info.leave.trim() !== 'ラスト') ? ` <span style="color:${arrived?'#8b2f2f':'#e57373'};font-weight:700;">⏰${info.leave}</span>` : '';
              line1 = `<span style="font-weight:700;">${t}</span>${iconsHtml ? ' '+iconsHtml : ''}${tanto ? ' '+tanto : ''}${leaveHtml}`;
              const subBits = [];
              if (info && info.name) subBits.push(`<span style="color:${boxText};">${formatGuestDisplayName(info.name)}</span>`);
              if (info && info.help) subBits.push(`<span style="color:${boxDim};">H: ${info.help}</span>`);
              line2 = subBits.join(' ');
              line3 = baanaiName ? `<span style="color:${boxDim};">場内: ${baanaiName}</span>` : '';
            }
            // 来店済みの卓で、退店予定10分前を過ぎたら赤くハイライトする
            const isLeaveSoon = arrived && info && !info.isFirst && info.leave && isTimeOverdue(info.leave, 10);
            const finalBoxBg = isLeaveSoon ? '#c0392b' : boxBg;
            const finalBoxText = isLeaveSoon ? '#fff' : boxText;
            // タップでの詳細表示・長押しでの編集は「来店済み（現状）」の卓だけ。予定段階(未来店)は対象外
            const interactiveAttrs = arrived
              ? `onclick="if(_leaveEditHoldFired){_leaveEditHoldFired=false;return;}openTableDetailModal('${key}')"
                 oncontextmenu="event.preventDefault();openLeaveTimeQuickEdit('table','${key}')"
                 ontouchstart="startLeaveEditHold('table','${key}')" ontouchend="cancelLeaveEditHold()" ontouchmove="cancelLeaveEditHold()"`
              : '';
            const hasShareNote = arrived && info && info.shareNote;
            const line4 = hasShareNote ? `<div style="font-size:8.5px;line-height:1.3;font-weight:700;color:#ffd8c2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📢${info.shareNote}</div>` : '';
            return `<div ${interactiveAttrs}
              class="${hasShareNote ? 'share-note-glow' : ''}"
              style="cursor:${arrived?'pointer':'default'};padding:3px 5px;border-radius:4px;border:1px solid ${isLeaveSoon?'#c0392b':'#c9a84c'};background:${finalBoxBg};color:${finalBoxText};overflow:hidden;">
              <div style="font-size:10px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line1}</div>
              <div style="font-size:8.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line2}</div>
              ${line3 ? `<div style="font-size:8.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line3}</div>` : ''}
              ${line4}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

          <div style="font-size:13px;color:${label==='📢 共有事項' ? '#e74c3c' : 'var(--text)'};font-weight:${label==='📢 共有事項' ? '700' : '400'};">${val}</div>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-ghost" onclick="document.getElementById('tableDetailModal').classList.remove('show');openSpecialModal(${guest.id})" style="flex:1;">特記事項を編集</button>
        ${actionButtons}
      </div>`;
  } else if (firstGroup) {
    const count = parseInt(firstGroup.count) || 0;
    const rowsHtml = (firstGroup.rows || []).map(r => {
      const bits = [];
      if (r.seat) bits.push('席:' + r.seat);
      if (r.photo1) bits.push('写真①:' + r.photo1);
      if (r.photo2) bits.push('写真②:' + r.photo2);
      if (r.okuri) bits.push('送り:' + r.okuri);
      if (r.nominaoshi) bits.push('飲直:' + r.nominaoshi);
      if (r.plan) bits.push('プラン:' + r.plan);
      return `<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);">${bits.join(' ／ ') || '（未入力）'}</div>`;
    }).join('');
    bodyHtml = `
      <div style="font-size:13px;color:#f0c040;font-weight:700;margin-bottom:8px;">初回 ${count}名</div>
      ${rowsHtml || '<div style="color:var(--text-dim);font-size:12px;">詳細未入力</div>'}
      ${baanaiName ? `<div style="margin-top:10px;font-size:12px;color:var(--text-dim);">場内指名: ${baanaiName}</div>` : ''}`;
  } else if (baanaiName) {
    bodyHtml = `<div style="font-size:13px;color:var(--text);">場内指名: ${baanaiName}</div>`;
  } else {
    bodyHtml = `<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0;">この卓の詳細情報はありません</div>`;
  }

  modal.innerHTML = `
    <div class="modal" style="max-width:340px;">
      <div class="modal-header">
        <span>${tableKey}卓 詳細</span>
        <button onclick="document.getElementById('tableDetailModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
    </div>`;
  modal.classList.add('show');
}

// ===== 初回タブ =====
// groups: [{id, count, tableNum, rows:[{id,seat,photo1,photo2,okuri,nominaoshi,plan}]}]
function loadFirstData() {
  try {
    const raw = localStorage.getItem('rj_firstData');
    if (raw) {
      const parsed = JSON.parse(raw);
      firstGroups = Array.isArray(parsed) ? parsed : [];
      if (firstGroups.length) {
        firstGid = firstGroups.reduce((m,g)=>Math.max(m,(g.id||0)+1),1);
        firstGroups.forEach(g => {
          if (Array.isArray(g.rows)) {
            g.rows.forEach(r => { firstRid = Math.max(firstRid, (r.id||0)+1); });
          } else {
            g.rows = [];
          }
        });
      }
    }
  } catch(e) { firstGroups = []; }
}

function saveFirstData() {
  try { localStorage.setItem('rj_firstData', JSON.stringify(firstGroups)); } catch(e) {}
  // Firebase: 各初回グループを個別のパスに書き込む（全体を丸ごと上書きしないので、他端末の変更と衝突しにくい）
  if (window.fbSaveFirstGroup) {
    firstGroups.forEach(g => window.fbSaveFirstGroup(g));
  }
  if (window.fbRemoveFirstGroup && window._fbFirstGroups) {
    const currentIds = new Set(firstGroups.map(g => g.id));
    window._fbFirstGroups.forEach(g => {
      if (g && g.id != null && !currentIds.has(g.id)) window.fbRemoveFirstGroup(g.id);
    });
  }
}

function addFirstRow() {
  firstGroups.push({ id: firstGid++, count:'', tableNum:'', rows:[{id:firstRid++,seat:'',photo1:'',photo2:'',okuri:'',nominaoshi:'',plan:''}] });
  saveFirstData();
  renderFirstTab();
}

function clearFirstData() {
  let overlay = document.getElementById('deleteOverlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.id='deleteOverlay'; overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;'; document.body.appendChild(overlay); }
  overlay.innerHTML = `<div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:24px;max-width:300px;width:100%;text-align:center;">
    <div style="font-size:14px;color:#f0ece0;margin-bottom:16px;">初回データを全て消去しますか？</div>
    <div style="display:flex;gap:10px;">
      <button onclick="document.getElementById('deleteOverlay').style.display='none'" style="flex:1;padding:10px;background:transparent;border:1px solid #555;border-radius:6px;color:#888;font-size:13px;cursor:pointer;">キャンセル</button>
      <button onclick="document.getElementById('deleteOverlay').style.display='none';firstGroups=[];firstGid=1;firstRid=1;saveFirstData();renderFirstTab();showToast('消去しました');" style="flex:1;padding:10px;background:#c0392b;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">消去</button>
    </div>
  </div>`;
  overlay.style.display='flex';
}

function renderFirstTab() {
  const tbody = document.getElementById('firstTableBody');
  if (!tbody) return;
  if (!Array.isArray(firstGroups)) firstGroups = [];
  const MAX_GROUPS = 20;
  let rows = '';
  let noCounter = 1;

  // グループを描画
  firstGroups.forEach(g => {
    const count = parseInt(g.count) || 1;
    const rowspan = count > 1 ? ` rowspan="${count}"` : '';
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => r.nominaoshi && r.nominaoshi.trim() !== '');
    g.rows.forEach((r, ri) => {
      const isDone = r.nominaoshi && r.nominaoshi.trim() !== '';
      const doneStyle = isDone ? 'background:#d4edda;color:#555;' : '';
      rows += `<tr id="fr-${r.id}" oncontextmenu="event.preventDefault();deleteFirstGroup(${g.id})"
          ontouchstart="startHold2(${g.id})" ontouchend="cancelHold()" ontouchmove="cancelHold()">`;
      if (ri === 0) {
        rows += `<td style="text-align:center;color:#c9a84c;font-size:12px;font-weight:700;${allDone?'background:#d4edda;':''}"${rowspan}>${noCounter}</td>`;
        const countLabel = g.isEda ? `枝${g.count||''}名` : (g.count ? `${g.count}名` : '-');
        rows += `<td${rowspan} style="${allDone?'background:#d4edda;':''}">
          <div onclick="event.stopPropagation();openCountPicker(${g.id}, this)" style="width:100%;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font-main);font-size:12px;padding:5px 2px;cursor:pointer;">${countLabel}</div>
        </td>`;
        rows += `<td${rowspan} style="${allDone?'background:#d4edda;':''}">
          <div class="editable" onclick="editFirstGroup(${g.id},'tableNum',this)" style="font-weight:700;color:var(--accent);padding:2px 0;">${g.tableNum||''}</div>
          ${g.isEda ? `<div onclick="event.stopPropagation();editFirstGroup(${g.id},'edaReferrer',this)" style="font-size:10px;color:#f0c040;border-top:1px solid var(--border);padding-top:2px;margin-top:2px;cursor:pointer;">枝:${g.edaReferrer ? g.edaReferrer : '未入力'}</div>` : ''}
        </td>`;
      }
      rows += `<td style="${doneStyle}">
        <div onclick="event.stopPropagation();openSeatPicker(${g.id},${r.id}, this)" style="width:100%;text-align:center;background:${isDone?'#d4edda':'var(--surface2)'};border:1px solid var(--border);border-radius:4px;color:${isDone?'#555':'var(--text)'};font-family:var(--font-main);font-size:12px;padding:5px 2px;cursor:pointer;">${r.seat || '-'}</div>
      </td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo1',this)" style="${doneStyle}">${r.photo1||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo2',this)" style="${doneStyle}">${r.photo2||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'okuri',this)" style="${isDone?'background:#d4edda;color:#555;':''}">${r.okuri||''}</td>`;
      const nomiDone = r.nominaoshi && r.nominaoshi.trim() !== '';
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'nominaoshi',this)" style="${nomiDone?'background:#d4edda;color:#000;':''}">${r.nominaoshi||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'plan',this)" style="${nomiDone?'background:#d4edda;color:#555;':''}">${r.plan||''}</td>`;
      rows += '</tr>';
    });
    noCounter++;
  });

  // 空行を20まで埋める
  const remaining = MAX_GROUPS - firstGroups.length;
  for (let i = 0; i < remaining; i++) {
    rows += `<tr><td style="text-align:center;color:#555;font-size:11px;">${noCounter++}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
  }

  tbody.innerHTML = rows;

  // 統計表示更新
  const statsEl = document.getElementById('firstStats');
  if (statsEl) {
    const total = firstGroups.reduce((s,g) => s + (parseInt(g.count)||0), 0);
    const current = firstGroups.reduce((s,g) => {
      const cnt = parseInt(g.count)||0;
      const rowCnt = (g.rows||[]).length || 1;
      const doneRows = (g.rows||[]).filter(r => r.nominaoshi && r.nominaoshi.trim()).length;
      return s + Math.round(cnt * (rowCnt - doneRows) / rowCnt);
    }, 0);
    statsEl.innerHTML = total > 0
      ? `初回数 現在<span style="color:var(--accent);font-weight:700;">${current}名</span>／トータル<span style="font-weight:700;">${total}名</span>`
      : '';
  }
}

// ===== ミニピッカー（<select>のiOS崩れ回避のため、独自の軽量ドロップダウンを使う） =====
let _inlinePickerCallback = null;

function openCountPicker(gid, anchorEl) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const options = [
    { value: '', label: '-' },
    { value: '1', label: '1名' },
    { value: '2', label: '2名' },
    { value: '3', label: '3名' },
    { value: 'eda-1', label: '枝1名' },
    { value: 'eda-2', label: '枝2名' },
    { value: 'eda-3', label: '枝3名' },
  ];
  const currentVal = g.isEda ? ('eda-' + g.count) : (g.count || '');
  renderInlinePicker(anchorEl, options, currentVal, (val) => { onCountChange(gid, val); });
}

function openSeatPicker(gid, rid, anchorEl) {
  const g = firstGroups.find(x => x.id === gid);
  const r = g ? (g.rows || []).find(x => x.id === rid) : null;
  const options = [
    { value: '', label: '-' },
    { value: '左', label: '左' },
    { value: '中', label: '中' },
    { value: '右', label: '右' },
  ];
  const currentVal = r ? (r.seat || '') : '';
  renderInlinePicker(anchorEl, options, currentVal, (val) => { updateFirstRow(gid, rid, 'seat', val); });
}

function renderInlinePicker(anchorEl, options, currentVal, onSelect) {
  closeInlinePicker();
  cancelHold();
  _inlinePickerCallback = onSelect;
  const picker = document.createElement('div');
  picker.id = 'inlinePicker';
  picker.style.cssText = 'position:fixed;z-index:300;background:#e8e8e8;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.4);min-width:72px;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;';
  picker.innerHTML = options.map((opt, i) => `
    <div onclick="event.stopPropagation();_inlinePickerCallback('${opt.value}');closeInlinePicker();"
      style="padding:10px 14px;font-size:13px;color:${opt.value===currentVal?'#8a6d1a':'#333'};font-weight:${opt.value===currentVal?'700':'400'};cursor:pointer;white-space:nowrap;${i<options.length-1?'border-bottom:1px solid #ccc;':''}">${opt.label}</div>
  `).join('');
  document.body.appendChild(picker);
  const rect = anchorEl.getBoundingClientRect();
  const pickerHeight = Math.min(picker.offsetHeight, 240);
  const spaceBelow = window.innerHeight - rect.bottom;
  const spaceAbove = rect.top;
  let top;
  if (spaceBelow >= pickerHeight + 8 || spaceBelow >= spaceAbove) {
    // 下に十分な余白があれば下向きに開く
    top = rect.bottom + 4;
  } else {
    // 下が狭ければ上向きに開く
    top = Math.max(8, rect.top - pickerHeight - 4);
  }
  const left = Math.min(rect.left, window.innerWidth - 90);
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';
  setTimeout(() => { document.addEventListener('click', closeInlinePickerOnce); }, 0);
}

function closeInlinePickerOnce() {
  closeInlinePicker();
  document.removeEventListener('click', closeInlinePickerOnce);
}

function closeInlinePicker() {
  const el = document.getElementById('inlinePicker');
  if (el) el.remove();
  _inlinePickerCallback = null;
}

function onCountChange(gid, val) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const isEda = val.startsWith('eda-');
  const countStr = isEda ? val.slice(4) : val;
  const newCount = parseInt(countStr) || 1;
  g.count = countStr;
  g.isEda = isEda;
  if (!isEda) g.edaReferrer = ''; // 枝でなくなったら紹介元情報はクリア
  // 行数を調整
  while (g.rows.length < newCount) g.rows.push({id:firstRid++,seat:'',photo1:'',photo2:'',okuri:'',nominaoshi:'',plan:''});
  while (g.rows.length > newCount) g.rows.pop();
  // 席位置を自動設定
  const seatMap = {1:[''], 2:['左','右'], 3:['左','中','右']};
  const seats = seatMap[newCount] || g.rows.map(()=>'');
  g.rows.forEach((r, i) => { r.seat = seats[i] || ''; });
  saveFirstData();
  renderFirstTab();
  syncFirstGroupToView(g);
  checkFirstGroupTableConflict(g);
}

function updateFirstRow(gid, rid, field, val) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const r = g.rows.find(x => x.id === rid);
  if (!r) return;
  r[field] = val;
  saveFirstData();
  // 飲直が入ったら卓一覧に反映
  if (field === 'nominaoshi') {
    syncNominaoshiToTable(g, r);
  }
}

function syncNominaoshiToTable(g, r) {
  const key = `first_${g.id}_${r.id}`;
  const nomi = (r.nominaoshi || '').trim();
  // 飲直がない or「なし」の場合は卓一覧から削除
  if (!nomi || nomi === 'なし') {
    guests = guests.filter(x => x.firstKey !== key);
    saveToStorage();
    renderTables();
    return;
  }
  const noteStr = ['飲直', r.plan ? r.plan.trim() : ''].filter(Boolean).join(' ');
  const existing = guests.find(x => x.firstKey === key);
  if (existing) {
    existing.tableNum = g.tableNum || '';
    existing.tanto = r.okuri || '';
    existing.name = nomi;
    existing.note = noteStr;
    existing.arrived = true;
    if (!existing.specials) existing.specials = [];
    if (!existing.specials.includes('new')) existing.specials.push('new'); // 飲直で出来た卓は自動で🔰マーク
  } else {
    guests.push({
      id: nextId++,
      rowNum: '999', // 仮番号、repackRowNumsで整理
      tableNum: g.tableNum || '',
      tanto: r.okuri || '',
      name: nomi,
      note: noteStr,
      arrive: '', leave: '', budget: '', help: '',
      arrived: true,
      specials: ['new'], // 飲直で出来た卓は自動で🔰マーク
      firstKey: key
    });
  }
  repackRowNums();
  saveToStorage();
  renderTables();
  // 飲直転換で卓が確定した際、その卓に別の予約が重複していないか確認する（アイバンは正常な重複として除外）
  checkNominaoshiTableConflict(g, r, key);
}

// 飲直に転換した卓が、既に別の予約（アイバンでない）で埋まっていないか確認して警告する
function checkNominaoshiTableConflict(g, r, firstKey) {
  if (!g.tableNum) return;
  const targetKey = g.tableNum.toUpperCase().replace(/^P/, 'V');
  const conflictGuest = guests.find(other => {
    if (other.left || other.firstKey === firstKey) return false;
    if (!other.tableNum) return false;
    if (other.tableNum.toUpperCase().replace(/^P/, 'V') !== targetKey) return false;
    return true;
  });
  if (conflictGuest) {
    // アイバンで意図的に同卓の場合は正常なので警告しない
    const conflictAibanPartner = conflictGuest.aiban ? findAibanPartner(conflictGuest) : null;
    const isAibanPair = conflictAibanPartner && guests.some(x => x.firstKey === firstKey && x.id === conflictAibanPartner.id);
    if (isAibanPair) return;
    showToast(`⚠ ${g.tableNum}卓は${formatGuestDisplayName(conflictGuest.name)}の予約と重複しています。卓の再配置をご確認ください`);
  }
}

// 枝以外の初回が、既に別の予定客（アイバンでない）と同じ卓になっていないか確認して警告する
// 枝タイプの初回は既存客と同卓になるのが正常なので対象外
function checkFirstGroupTableConflict(g) {
  if (!g.tableNum || g.isEda) return;
  const targetKey = g.tableNum.toUpperCase().replace(/^P/, 'V');
  const conflictGuest = guests.find(other => {
    if (other.left || !other.tableNum || !other.arrived) return false; // 来店確認前の予約は「空いている」扱い
    return other.tableNum.toUpperCase().replace(/^P/, 'V') === targetKey;
  });
  if (conflictGuest) {
    showToast(`⚠ ${g.tableNum}卓は既存客(${formatGuestDisplayName(conflictGuest.name)})と重複しています。記入ミスの可能性があります`);
  }
}

function editFirstGroup(gid, field, td) {
  cancelHold(); // タップ編集時は長押し削除タイマーをキャンセル
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const current = g[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  function save() {
    g[field] = input.value.trim();
    saveFirstData();
    withScrollPreserved(renderFirstTab, td.closest('tr'));
    // 卓番変更時は全行を再同期＋初回卓を反映
    if (field === 'tableNum') {
      (g.rows||[]).forEach(r => syncNominaoshiToTable(g, r));
      syncFirstGroupToView(g);
      checkFirstGroupTableConflict(g);
    }
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key==='Enter') input.blur(); if (e.key==='Escape') { td.textContent=current; } });
}

function editFirstRow(gid, rid, field, td) {
  cancelHold(); // タップ編集時は長押し削除タイマーをキャンセル
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const r = g.rows.find(x => x.id === rid);
  if (!r) return;
  const current = r[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  function save() {
    r[field] = input.value.trim();
    saveFirstData();
    if (field === 'nominaoshi') {
      // 飲直の確定/解除は行全体の色分けが変わるため、行ごと再描画する
      withScrollPreserved(renderFirstTab, td.closest('tr'));
    } else {
      // それ以外の項目は、このセルの表示だけを直接書き換える（他のDOMに触れないので画面がズレない）
      td.textContent = r[field] || '';
    }

// ===== 場内 =====
// 「ひろきA4」のような場内メモを解析し、卓番→キャスト名のマップを作る
// キャスト名（呼び名含む）を先頭から最長一致で判定し、残り文字列が実在する卓番と一致すれば採用する
function parseBaanaiAssignments(text) {
  const result = {};
  if (!text) return result;
  const aliasIndex = buildAliasIndex();
  const allTables = new Set([
    ...(floorData.V || []), ...(floorData.A || []), ...(floorData.B || [])
  ].map(t => t.toUpperCase()));
  const tokens = text.split(/[\s,、,\/]+/).map(s => s.trim()).filter(Boolean);
  tokens.forEach(token => {
    const normToken = toHiragana(token);
    const match = aliasIndex.find(entry => normToken.startsWith(entry.norm));
    if (!match) return;
    const remainder = token.slice(match.text.length).toUpperCase().replace(/^P/, 'V');
    if (allTables.has(remainder)) {
      result[remainder] = match.name;
    }
  });
  return result;
}

// 卓番ソート: V・P（同フロア）→A→B→その他、番号順
function tableNumSort(a, b) {
  const getGroup = (t) => {
    if (!t) return 9;
    const p = t[0].toUpperCase();
    if (p === 'V' || p === 'P') return 0; // VとPは同グループ
    if (p === 'A') return 1;
    if (p === 'B') return 2;
    return 9;
  };
  const numA = parseInt((a.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const numB = parseInt((b.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const groupA = getGroup(a.tableNum);
  const groupB = getGroup(b.tableNum);
  if (groupA !== groupB) return groupA - groupB;
  return numA - numB;
}

function toggleSpecial(id, key) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  if (!g.specials) g.specials = [];
  const turningOn = !g.specials.includes(key);
  if (turningOn) {
    g.specials.push(key);
  } else {
    g.specials = g.specials.filter(k => k !== key);
  }
  // 主役アイコンは「その担当者の卓すべて」に付くものなので、同じ担当者の他の卓にも自動で連動させる
  if (key === 'event' && g.tanto) {
    const tantoNorm = toHiragana(g.tanto.trim());
    guests.forEach(other => {
      if (other.id === g.id || other.left || !other.tanto) return;
      if (toHiragana(other.tanto.trim()) !== tantoNorm) return;
      if (!other.specials) other.specials = [];
      if (turningOn) {
        if (!other.specials.includes('event')) other.specials.push('event');
      } else {
        other.specials = other.specials.filter(k => k !== 'event');
      }
    });
  }
  saveToStorage();
  openSpecialModal(id); // モーダル更新
  renderView();
  if (window.renderFloorStatus) window.renderFloorStatus();
}

// ===== STATS =====
function updateStats() {
  const active = guests.filter(g => g.name || g.tanto || g.tableNum);
  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statArrived').textContent = active.filter(g => g.arrived).length;
  updateTableStats();
}

function updateTableStats() {
  const withData = guests.filter(g => g.name || g.tanto);
  // 予定卓数 = 実際にデータが入っている件数（行番号に隙間があっても正確に数える）
  const maxRow = withData.length;
  // △の件数（来店済みは除外）
  const deltaCount = withData.filter(g => g.name && g.name.includes('△') && !g.arrived).length;
  const arrivedCount = withData.filter(g => g.arrived).length;
  // 初回人数集計
  const allRows = firstGroups.reduce((arr, g) => arr.concat(g.rows||[]), []);
  const firstTotal = firstGroups.reduce((sum, g) => sum + (parseInt(g.count)||0), 0);
  const firstCurrent = firstGroups.reduce((sum, g) => {
    return sum + (g.rows||[]).reduce((s, r) => s + (r.nominaoshi && r.nominaoshi.trim() ? 0 : (parseInt(g.count)||0) / (g.rows||[1]).length), 0);
  }, 0);
  const firstCurrentInt = Math.round(firstCurrent);

  const statsHtml = `<span style="font-size:14px;white-space:nowrap;">予定卓数 <span style="color:var(--accent);font-weight:700;">${maxRow}卓</span><span style="color:var(--text-dim);">（△<span style="color:#e74c3c;font-weight:700;">${deltaCount}</span>）</span>&nbsp;&nbsp;現状 <span style="color:#2ecc71;font-weight:700;">${arrivedCount}卓</span>&nbsp;&nbsp;初回 現在<span style="color:var(--accent);font-weight:700;">${firstCurrentInt}名</span>／<span style="color:var(--text-dim);font-weight:700;">${firstTotal}名</span></span>`;
  // 固定バーに反映
  const fixedEl = document.getElementById('fixedStats');
  if (fixedEl) {
    fixedEl.innerHTML = statsHtml;
    fixedEl.style.display = 'block';
    updateFixedTop(); setTimeout(updateFixedTop, 50);
  }
}

// ===== STORAGE =====
function saveToStorage() {
  // 保存前に空行を除去
  guests = guests.filter(g => g.name || g.tanto || g.tableNum);
  repackRowNums();
  try { localStorage.setItem('tableManager_guests', JSON.stringify(guests)); } catch(e) {}
  // Firebase: 各ゲストを個別のパスに書き込む（全体を丸ごと上書きしないので、他端末の変更と衝突しにくい）
  if (window.fbSaveGuest) {
    guests.forEach(g => window.fbSaveGuest(g));
  }
  // 直近でFirebaseから受信していた一覧と比較し、ローカルから消えたものだけを個別に削除する
  if (window.fbRemoveGuest && window._fbGuests) {
    const currentIds = new Set(guests.map(g => g.id));
    window._fbGuests.forEach(g => {
      if (g && g.id != null && !currentIds.has(g.id)) window.fbRemoveGuest(g.id);
    });
  }
}
function loadFromStorage() {

    if (raw) {
      guests = JSON.parse(raw);
      nextId = guests.reduce((m,g) => Math.max(m, g.id+1), 1);

  } catch(e) {}
}

let _currentAliasStaff = null;

function openAliasModal(staffName) {
  _currentAliasStaff = staffName;

  if (!modal) {
    modal = document.createElement('div');

function renderAliasModalContent() {
  const modal = document.getElementById('aliasModal');
  if (!modal || !_currentAliasStaff) return;
  const name = _currentAliasStaff;
  const aliases = staffAliases[name] || [];
  const chips = aliases.length
    ? aliases.map(a => `
        <span style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:4px 6px 4px 12px;font-size:12px;margin:3px 4px 3px 0;">

        </span>`).join('')
    : '<div style="color:var(--text-dim);font-size:12px;padding:8px 0;">まだ呼び名が登録されていません</div>';

  modal.innerHTML = `
    <div class="modal" style="max-width:340px;">
      <div class="modal-header">
        <span>呼び名編集：${name}</span>
        <button onclick="closeAliasModal()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.6;">ヘルプ欄などで使われる呼び方・ひらがな表記・ニックネームを登録しておくと、集計時に自動でこのキャストとしてカウントされます。</p>
        <div style="display:flex;flex-wrap:wrap;margin-bottom:12px;">${chips}</div>
        <div style="display:flex;gap:6px;">
          <input id="aliasInput" class="form-input" placeholder="例：なる（ひらがな表記）" style="flex:1;"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addAlias();}">
          <button class="btn btn-primary" onclick="addAlias()" style="width:auto;padding:8px 14px;">追加</button>
        </div>
      </div>
    </div>`;
}

function addAlias() {
  if (!_currentAliasStaff) return;
  const input = document.getElementById('aliasInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  if (!staffAliases[_currentAliasStaff]) staffAliases[_currentAliasStaff] = [];
  if (!staffAliases[_currentAliasStaff].includes(val)) {
    staffAliases[_currentAliasStaff].push(val);
    saveAliases(_currentAliasStaff);
  }
  input.value = '';
  renderAliasModalContent();
  // 入力を続けやすいようフォーカスを戻す
  setTimeout(() => { const el = document.getElementById('aliasInput'); if (el) el.focus(); }, 0);
}

function removeAlias(alias) {
  if (!_currentAliasStaff || !staffAliases[_currentAliasStaff]) return;
  staffAliases[_currentAliasStaff] = staffAliases[_currentAliasStaff].filter(a => a !== alias);
  saveAliases(_currentAliasStaff);
  renderAliasModalContent();
}

function closeAliasModal() {
  const modal = document.getElementById('aliasModal');
  if (modal) modal.classList.remove('show');
  _currentAliasStaff = null;
}

  const modal = document.getElementById('aliasModal');
  if (modal && modal.classList.contains('show') && _currentAliasStaff) {
    renderAliasModalContent();

}

// 今日の日付キー（YYYY-MM-DD、ローカル時刻基準）
// 営業日の基準日付を取得する（深夜0時ではなく朝6時を区切りとする）
// 深夜0時〜5時台にリセットしても、その営業を開始した日の実績として記録されるようにする
function getTodayKey() {
  const now = new Date();
  const businessDate = new Date(now);
  if (now.getHours() < 6) {
    businessDate.setDate(businessDate.getDate() - 1);
  }
  const y = businessDate.getFullYear();
  const m = String(businessDate.getMonth() + 1).padStart(2, '0');
  const d = String(businessDate.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// 本日の集計結果を月次ログとして保存する（リセット直前に呼ばれる）
function saveTodayToMonthlyLog() {
  const dateKey = getTodayKey();
  const summary = computeDailySummary();
  try {
    const raw = localStorage.getItem('rj_monthlyLogs');
    const logs = raw ? JSON.parse(raw) : {};
    logs[dateKey] = summary;
    localStorage.setItem('rj_monthlyLogs', JSON.stringify(logs));
  } catch(e) {}
  if (window.fbSaveMonthlyLog) window.fbSaveMonthlyLog(dateKey, summary);
}
