<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卓管理</title>
<link rel="stylesheet" href="style.css">
<!-- Firebase SDK（有効） -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCdOu7waepEH5WXQkvFKLLFRah-FODcOUI",
    authDomain: "rjtable-cdd5c.firebaseapp.com",
    databaseURL: "https://rjtable-cdd5c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rjtable-cdd5c",
    storageBucket: "rjtable-cdd5c.firebasestorage.app",
    messagingSenderId: "893265704748",
    appId: "1:893265704748:web:95615ebcd7be9927631e89"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const guestsRef = ref(db, 'guests');
  const staffRef = ref(db, 'staff');
  const firstRef = ref(db, 'firstGroups');
  const backupRef = ref(db, 'resetBackup');
  const aliasRef = ref(db, 'staffAliases');
  const baanaiRef = ref(db, 'baanai');
  const floorRef = ref(db, 'floorData');
  const dayStatusRef = ref(db, 'staffDayStatus');
  const monthlyLogsRef = ref(db, 'monthlyLogs');
  const tableListVisibleRef = ref(db, 'tableListVisible');
  const eventTantoRef = ref(db, 'eventTantoToday');

  // Firebaseにゲストデータを保存
  // Firebaseにゲスト1件を保存（衝突回避：全体を上書きせず該当IDのみ書き込む）
  window.fbSaveGuest = function(guest) {
    if (!guest || guest.id == null) return;
    set(ref(db, 'guests/g' + guest.id), guest).catch(e => console.error('FB save guest error:', e));
  };
  // Firebaseからゲスト1件を削除
  window.fbRemoveGuest = function(id) {
    if (id == null) return;
    remove(ref(db, 'guests/g' + id)).catch(e => console.error('FB remove guest error:', e));
  };
  // guestsノード全体を確実に空にする（本日分リセット用。差分比較に頼らないので消し漏れが起きない）
  window.fbClearAllGuests = function() {
    set(guestsRef, null).catch(e => console.error('FB clear guests error:', e));
  };

  // Firebaseにスタッフリストを保存
  window.fbSaveStaff = function(list) {
    set(staffRef, list).catch(e => console.error('FB staff save error:', e));
  };

  // Firebaseに初回データを保存
  // Firebaseに初回グループ1件を保存（衝突回避：全体を上書きせず該当IDのみ書き込む）
  window.fbSaveFirstGroup = function(group) {
    if (!group || group.id == null) return;
    set(ref(db, 'firstGroups/g' + group.id), group).catch(e => console.error('FB save firstGroup error:', e));
  };
  // Firebaseから初回グループ1件を削除
  window.fbRemoveFirstGroup = function(id) {
    if (id == null) return;
    remove(ref(db, 'firstGroups/g' + id)).catch(e => console.error('FB remove firstGroup error:', e));
  };
  // firstGroupsノード全体を確実に空にする（本日分リセット用。差分比較に頼らないので消し漏れが起きない）
  window.fbClearAllFirstGroups = function() {
    set(firstRef, null).catch(e => console.error('FB clear firstGroups error:', e));
  };

  // Firebaseにリセット直前のバックアップを保存
  window.fbSaveBackup = function(backupData) {
    set(backupRef, backupData).catch(e => console.error('FB backup save error:', e));
  };

  // Firebaseに呼び名データを保存
  window.fbSaveAliases = function(aliasData) {
    const hasData = aliasData && Object.keys(aliasData).length > 0;
    set(aliasRef, hasData ? aliasData : null).catch(e => console.error('FB alias save error:', e));
  };
  // 呼び名は1名分だけをピンポイントで更新する版（衝突回避）
  window.fbSaveAliasesFor = function(staffName, aliasList) {
    if (!staffName) return;
    set(ref(db, 'staffAliases/' + staffName), aliasList || []).catch(e => console.error('FB alias save error:', e));
  };

  // Firebaseに場内メモを保存
  window.fbSaveBaanai = function(text) {
    set(baanaiRef, text || '').catch(e => console.error('FB baanai save error:', e));
  };

  // 卓一覧タブをキャストに公開するかどうか（内勤が締日などにOFFにできる）。デフォルトは公開(true)
  window.fbSaveTableListVisible = function(visible) {
    set(tableListVisibleRef, !!visible).catch(e => console.error('FB tableListVisible save error:', e));
  };

  // Firebaseに「本日一度でも👑主役が付いた担当者」の記録を保存（{date, names}形式。日付が変われば自然にリセットされる）
  window.fbSaveEventTantoToday = function(data) {
    set(eventTantoRef, data).catch(e => console.error('FB eventTantoToday save error:', e));
  };

  // Firebaseに卓状況（フロア構成）を保存
  window.fbSaveFloor = function(floorDataObj) {
    const hasData = floorDataObj && Object.keys(floorDataObj).length > 0;
    set(floorRef, hasData ? floorDataObj : null).catch(e => console.error('FB floor save error:', e));
  };

  // Firebaseに本日の報告状況（休み・有休・半休・予定未定）を保存
  window.fbSaveDayStatus = function(dayStatusObj) {
    // 空オブジェクト{}をそのままsetしてもFirebase側のデータは消えないため、
    // 空の場合はnullを渡して確実にクリアする（本日分リセット時の消し漏れ対策）
    const hasData = dayStatusObj && Object.keys(dayStatusObj).length > 0;
    set(dayStatusRef, hasData ? dayStatusObj : null).catch(e => console.error('FB dayStatus save error:', e));
  };
  // 報告状況は1名分だけをピンポイントで更新する版（衝突回避）
  window.fbSaveDayStatusFor = function(staffName, entry) {
    if (!staffName) return;
    set(ref(db, 'staffDayStatus/' + staffName), entry).catch(e => console.error('FB dayStatus save error:', e));
  };

  // Firebaseに月次集計ログの1日分を保存（キーは日付文字列）
  window.fbSaveMonthlyLog = function(dateKey, logData) {
    set(ref(db, 'monthlyLogs/' + dateKey), logData).catch(e => console.error('FB monthlyLog save error:', e));
  };
  // Firebaseから月次集計ログの1日分を削除（リセット取り消し時に使用）
  window.fbRemoveMonthlyLog = function(dateKey) {
    remove(ref(db, 'monthlyLogs/' + dateKey)).catch(e => console.error('FB monthlyLog remove error:', e));
  };

  // ゲストの配列内容が実質的に同じかどうかを比較する（id順に揃えてから比較するので、
  // Firebase側のキー順の違いだけでは「変化あり」と誤判定しない。
  // また、Firebaseはnull値のフィールドを保存時に自動で削除する仕様のため、
  // ローカル側に残るnullフィールドと、跳ね返ってきたデータでキーごと消えている状態を同一視できるよう正規化する）
  function normalizeGuestForCompare(g) {
    const out = {};
    Object.keys(g || {}).forEach(k => { if (g[k] !== null && g[k] !== undefined) out[k] = g[k]; });
    return out;
  }
  function guestsListSignature(list) {
    return JSON.stringify((list || []).map(normalizeGuestForCompare).slice().sort((a,b) => (a.id||0)-(b.id||0)));
  }

  // Firebaseからゲストをリアルタイム受信
  onValue(guestsRef, (snapshot) => {
    const data = snapshot.val();
    window._fbGuests = data === null ? [] : Object.values(data).filter(g => g && (g.name || g.tanto || g.tableNum));
    if (typeof guests !== 'undefined' && typeof renderTables === 'function') {
      // 自分自身の保存がそのまま返ってきただけ（内容に変化なし）の場合は、
      // 全体再描画をスキップする。編集直後に画面が作り直されて行の位置がズレ、
      // 次のセルをタップしづらくなる問題を防ぐため
      const changed = guestsListSignature(guests) !== guestsListSignature(window._fbGuests);
      // 初回以降もリアルタイム反映
      guests = window._fbGuests;
      nextId = guests.reduce((m,g) => Math.max(m, (g.id||0)+1), 1);
      if (!changed) return;
      if (window.renderTablesPreservingScroll) window.renderTablesPreservingScroll();
      else if (window.renderTables) window.renderTables();
      if (window.renderStaffStatus) window.renderStaffStatus();
      if (window.renderView && document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active')) window.renderView();
      if (window.updateStats) window.updateStats();
    } else if (window._fbReady) {
      window._fbReady();
    }
  });

  // Firebaseからスタッフリストをリアルタイム受信
  onValue(staffRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const list = Array.isArray(data) ? data : String(data).split('\n').map(s => s.trim()).filter(Boolean);
      window._fbStaff = list;
      // 常にリアルタイムで反映
      if (typeof staffList !== 'undefined') {
        staffList = list;
        try { localStorage.setItem('tableManager_staff', JSON.stringify(staffList)); } catch(e) {}
        if (window.renderStaffStatus) window.renderStaffStatus();
      } else if (window._fbStaffReady) {
        window._fbStaffReady();
      }
    }
  });

  // Firebaseから初回データをリアルタイム受信
  onValue(firstRef, (snapshot) => {
    const data = snapshot.val();
    // 1件ずつ 'g'+id キーで保存された形式に対応（配列としてもオブジェクトとしても受け取れるようにする）
    const list = Array.isArray(data) ? data.filter(Boolean) : (data && typeof data === 'object' ? Object.values(data).filter(Boolean) : []);
    window._fbFirstGroups = list;
    if (typeof firstGroups !== 'undefined' && typeof renderFirstTab === 'function') {
      firstGroups = list;
      // idカウンタがFirebase側のデータと衝突しないよう調整
      if (typeof firstGid !== 'undefined') {
        firstGid = list.reduce((m,g)=>Math.max(m,(g.id||0)+1), 1);
      }
      if (typeof firstRid !== 'undefined') {
        list.forEach(g => {
          (g.rows||[]).forEach(r => { firstRid = Math.max(firstRid, (r.id||0)+1); });
        });
      }
      try { localStorage.setItem('rj_firstData', JSON.stringify(firstGroups)); } catch(e) {}
      if (window.renderFirstTabFromFB) window.renderFirstTabFromFB();
    } else if (window._fbFirstReady) {
      window._fbFirstReady();
    }
  });

  // Firebaseからリセットバックアップをリアルタイム受信（別端末からの復元にも対応）
  onValue(backupRef, (snapshot) => {
    const data = snapshot.val();
    window._fbBackup = data || null;
    if (window.updateUndoButtonState) window.updateUndoButtonState();
  });

  // Firebaseから呼び名データをリアルタイム受信
  onValue(aliasRef, (snapshot) => {
    const data = snapshot.val();
    const aliases = (data && typeof data === 'object') ? data : {};
    window._fbAliases = aliases;
    if (typeof staffAliases !== 'undefined') {
      staffAliases = aliases;
      try { localStorage.setItem('rj_staffAliases', JSON.stringify(staffAliases)); } catch(e) {}
      if (window.refreshAliasModalIfOpen) window.refreshAliasModalIfOpen();
    }
  });

  // Firebaseから場内メモをリアルタイム受信
  onValue(baanaiRef, (snapshot) => {
    const data = snapshot.val();
    const text = typeof data === 'string' ? data : '';
    window._fbBaanai = text;
    try { localStorage.setItem('rj_baanai', text); } catch(e) {}
    const el = document.getElementById('baanaiInput');
    // 自分が今まさに入力中でなければ値を反映（別端末からの更新を取りこぼさないため）
    if (el && document.activeElement !== el) el.value = text;
    if (window.updateBaanaiBar) window.updateBaanaiBar(text);
    if (window.renderFloorStatus) window.renderFloorStatus();
  });

  // Firebaseから「卓一覧タブの公開設定」をリアルタイム受信（値が無ければデフォルトで公開扱い）
  onValue(tableListVisibleRef, (snapshot) => {
    const data = snapshot.val();
    window._fbTableListVisible = data === false ? false : true;
    if (window.applyTableListVisibility) window.applyTableListVisibility();
  });

  // Firebaseから「本日一度でも👑主役が付いた担当者」の記録をリアルタイム受信（別端末での操作もすぐ反映される）
  onValue(eventTantoRef, (snapshot) => {
    const data = snapshot.val();
    const parsed = (data && typeof data === 'object') ? { date: data.date || '', names: data.names || {} } : { date: '', names: {} };
    window._fbEventTantoToday = parsed;
    if (typeof eventTantoToday !== 'undefined') {
      eventTantoToday = parsed;
      try { localStorage.setItem('rj_eventTantoToday', JSON.stringify(eventTantoToday)); } catch(e) {}
    }
  });

  // Firebaseから卓状況（フロア構成）をリアルタイム受信
  onValue(floorRef, (snapshot) => {
    const data = snapshot.val();
    if (data && typeof data === 'object' && (data.V || data.A || data.B)) {
      window._fbFloorData = data;
      if (typeof floorData !== 'undefined') {
        floorData = data;
        try { localStorage.setItem('rj_floorData', JSON.stringify(floorData)); } catch(e) {}
        if (window.renderFloorStatus) window.renderFloorStatus();
        if (window.refreshFloorModalIfOpen) window.refreshFloorModalIfOpen();
      }
    }
  });

  // Firebaseから本日の報告状況（休み・有休・半休・予定未定）をリアルタイム受信
  onValue(dayStatusRef, (snapshot) => {
    const data = snapshot.val();
    const statusObj = (data && typeof data === 'object') ? data : {};
    window._fbDayStatus = statusObj;
    if (typeof staffDayStatus !== 'undefined') {
      staffDayStatus = statusObj;
      try { localStorage.setItem('rj_staffDayStatus', JSON.stringify(staffDayStatus)); } catch(e) {}
      if (window.renderStaffStatus) window.renderStaffStatus();
    }
  });

  // Firebaseから月次集計ログをリアルタイム受信（過去分含む全件）
  onValue(monthlyLogsRef, (snapshot) => {
    const data = snapshot.val();
    const logs = (data && typeof data === 'object') ? data : {};
    window._fbMonthlyLogs = logs;
    try { localStorage.setItem('rj_monthlyLogs', JSON.stringify(logs)); } catch(e) {}
    if (window.refreshSummaryModalIfOpen) window.refreshSummaryModalIfOpen();
  });
</script>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">卓 管 理</div>
    <div class="login-sub">ROMEO &amp; JULIET</div>
    <input class="login-input" id="loginInput" type="password" placeholder="パスワードを入力" maxlength="20"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;font-size:15px;padding:12px;">
      入室
    </button>
  </div>
</div>

<header>
  <div>
    <div class="header-title">卓 管 理</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-stats">
    <span id="statTotal" style="display:none"></span>
    <span id="statArrived" style="display:none"></span>
    <button id="tableListVisibleBtn" onclick="toggleTableListVisible()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:11px;padding:5px 9px;cursor:pointer;font-family:var(--font-main);white-space:nowrap;display:none;">👁 卓一覧を公開中</button>
    <button id="summaryBtn" onclick="openSummaryModal()" style="background:none;border:1px solid var(--accent-dim);border-radius:4px;color:var(--accent);font-size:11px;padding:5px 9px;cursor:pointer;font-family:var(--font-main);white-space:nowrap;">📊 集計</button>
    <button id="undoResetBtn" onclick="confirmUndoReset()" style="display:none;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:11px;padding:5px 9px;cursor:pointer;font-family:var(--font-main);white-space:nowrap;">↩ 復元</button>
    <button id="resetReportsBtn" onclick="confirmResetReports()" style="background:none;border:1px solid #c0392b;border-radius:4px;color:#c0392b;font-size:11px;padding:5px 9px;cursor:pointer;font-family:var(--font-main);white-space:nowrap;">🔄 本日分リセット</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 予定報告</div>
  <div class="tab" onclick="switchTab('tables')">📊 卓一覧</div>
  <div class="tab" onclick="switchTab('first')">🔰 初回</div>
  <div class="tab" onclick="switchTab('view')">👁 全体</div>
</div>

<!-- 固定統計バー（JSでtop位置を計算してヘッダー/タブ直下に固定） -->
<div id="fixedStats" class="no-scrollbar" style="display:none;z-index:90;background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;font-size:13px;overflow-x:auto;"></div>
<div id="tantoStats" style="display:none;z-index:89;background:var(--surface2);border-bottom:1px solid var(--border);padding:4px 16px;font-size:11px;"></div>
<div id="baanaiBar" style="display:none;z-index:88;background:var(--surface2);border-bottom:1px solid var(--border);padding:4px 16px;font-size:11px;"></div>
<div id="emptyTablesBar" style="display:none;z-index:87;background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;font-size:12px;color:var(--text-dim);line-height:1.6;"></div>
<!-- 固定バーの高さぶん、本文を押し下げるためのスペーサー -->
<div id="fixedSpacer" style="height:0px;"></div>

<!-- 予定報告パネル -->
<div class="panel active" id="panel-input">
  <div id="identityIndicator" style="margin-bottom:10px;font-size:12px;"></div>

  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
    <button onclick="promptQuickStatus('pending')" style="flex:1;min-width:70px;padding:8px 4px;border-radius:6px;border:1px solid #3498db;background:transparent;color:#3498db;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">予定未定</button>
    <button onclick="promptQuickStatus('off')" style="flex:1;min-width:70px;padding:8px 4px;border-radius:6px;border:1px solid #e74c3c;background:transparent;color:#e74c3c;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">本日お休み</button>
    <button onclick="promptQuickStatus('paid_off')" style="flex:1;min-width:70px;padding:8px 4px;border-radius:6px;border:1px solid #e74c3c;background:transparent;color:#e74c3c;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">有休</button>
    <button onclick="promptQuickStatus('half_off')" style="flex:1;min-width:70px;padding:8px 4px;border-radius:6px;border:1px solid #e67e22;background:transparent;color:#e67e22;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">半休</button>
  </div>

  <div style="display:flex; gap:10px; align-items:flex-start;">
    <!-- 左：入力フォーム -->
    <div style="flex:1; min-width:0;">
      <div id="multiReportForm" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;">
        <div class="mr-row"><label class="mr-label">担当名</label><input class="mr-input" id="mr-tanto" oninput="updateQuickAddBtnVisibility()"></div>
        <div class="mr-row"><label class="mr-label">お客様名</label><input class="mr-input" id="mr-name" oninput="updateQuickAddBtnVisibility()"></div>
        <div id="mrAibanArea"></div>
        <div class="mr-row"><label class="mr-label">来店時間</label><input class="mr-input" id="mr-arrive"></div>
        <div class="mr-row"><label class="mr-label">退店時間</label><input class="mr-input" id="mr-leave"></div>
        <div class="mr-row"><label class="mr-label">予算</label><input class="mr-input" id="mr-budget"></div>
        <div class="mr-row"><label class="mr-label">ヘルプ</label><input class="mr-input" id="mr-help"></div>
        <div class="mr-row"><label class="mr-label">備考</label><input class="mr-input" id="mr-note"></div>
        <div id="queuePreviewArea"></div>
        <button class="btn btn-ghost" id="mrQuickAddBtn" onclick="quickAddToQueue()" style="width:100%;margin-top:4px;display:none;">＋ 予定を追加</button>
        <button class="btn btn-primary" id="mrSubmitBtn" onclick="addToReportQueue()" style="width:100%;margin-top:4px;">報告内容を確認</button>
      </div>

      <button id="myReportsBtn" onclick="openReportsListForRole()" style="margin-top:8px;width:100%;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;padding:8px;cursor:pointer;font-family:var(--font-main);">📋 予定の確認・編集</button>
      <div id="myTodaySummary" style="margin-top:10px;"></div>
    </div>

    <!-- 右：報告状況 -->
    <div style="width:90px; flex-shrink:0;">
      <div style="font-size:10px;color:var(--accent);letter-spacing:0.08em;font-weight:700;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--accent-dim);">報告状況</div>
      <div id="staffStatusList" style="font-size:11px;"></div>
      <button onclick="openStaffSettings()" style="margin-top:8px;width:100%;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:4px;cursor:pointer;font-family:var(--font-main);">⚙ 編集</button>
    </div>
  </div>

  <div id="previewArea"></div>

  <!-- 卓状況 -->
  <div style="margin-top:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--accent-dim);">
      <span style="font-size:10px;color:var(--accent);letter-spacing:0.08em;font-weight:700;">卓状況</span>
      <button onclick="openFloorSettings()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:2px 8px;cursor:pointer;font-family:var(--font-main);">⚙ 編集</button>
    </div>
    <div id="floorLegend" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;" id="floorStatusArea">
      <!-- V・A・Bフロア -->
    </div>
  </div>
</div>

<!-- 卓一覧パネル -->
<div class="panel" id="panel-tables">

<script>
// ===== STATE =====
let guests = []; // { id, name, arrive, leave, tanto, budget, help, note, tableNum, arrived }
let nextId = 1;
let firstGroups = [];
let firstGid = 1;
let firstRid = 1;
let staffList = [];
let staffAliases = {}; // { "本名": ["呼び名1","呼び名2", ...] }
let staffDayStatus = {}; // { "本名": { status: 'pending'|'off'|'paid_off'|'half_off', reportType: 'self'|'proxy'|null, timestamp } }
let eventTantoToday = { date: '', names: {} }; // その日一度でも👑主役が付いた担当者を記録（{ date: 'YYYY-MM-DD', names: { 正規化した担当者名: true } }）。日付が変われば自動的にリセットされる
let _resetToken = 0; // 本日分リセット/復元のたびに更新。保険の遅延処理が古い操作を巻き戻さないようにするため

// ===== LOGIN =====
const PASS_ADMIN = 'rj0123';
const PASS_HOST  = '1234';

function checkLogin() {
  const role = localStorage.getItem('rj_role');
  if (role === 'admin' || role === 'host') {
    applyRole(role);
    document.getElementById('loginScreen').style.display = 'none';
    if (role === 'host' && !getMyIdentity()) {
      setTimeout(() => promptIdentityModal(), 200);
    }
  }
}

function doLogin() {
  const val = document.getElementById('loginInput').value.trim();
  if (val === PASS_ADMIN) {
    localStorage.setItem('rj_role', 'admin');
    applyRole('admin');
    document.getElementById('loginScreen').style.display = 'none';
  } else if (val === PASS_HOST) {
    localStorage.setItem('rj_role', 'host');
    applyRole('host');
    document.getElementById('loginScreen').style.display = 'none';
    // ログイン直後に「あなたは誰か」を選んでもらう（未選択のまま使い始めるのを防ぐ）
    if (!getMyIdentity()) {
      setTimeout(() => promptIdentityModal(), 200);
    }
  } else {
    document.getElementById('loginError').textContent = 'パスワードが違います';
    document.getElementById('loginInput').value = '';
  }
}

// 卓一覧タブをキャストに見せるかどうかを、現在の公開設定に合わせて反映する
// （内勤が締日などに一時的にOFFにできる。デフォルトは公開）
function applyTableListVisibility() {
  if (localStorage.getItem('rj_role') !== 'host') return; // 内勤には常に表示するので対象外
  const visible = window._fbTableListVisible !== false;
  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.panel');
  if (tabs[1]) tabs[1].style.display = visible ? '' : 'none';
  if (panels[1]) panels[1].style.display = visible ? '' : 'none';
  // 非公開に切り替わった時、卓一覧を見ていたら予定報告タブに戻す
  if (!visible && panels[1] && panels[1].classList.contains('active')) {
    switchTab('input');
  }
}

function applyRole(role) {
  if (role === 'host') {
    // 卓一覧タブの表示・非表示は、内勤が設定した公開設定に従う（デフォルトは公開）
    applyTableListVisibility();
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    // アクティブを予定報告に
    tabs[0].classList.add('active');
    panels[0].classList.add('active');
    // 本日分リセットは内勤（admin）のみ操作可能
    const resetBtn = document.getElementById('resetReportsBtn');
    if (resetBtn) resetBtn.style.display = 'none';
    // 集計も内勤（admin）のみ閲覧可能
    const summaryBtn = document.getElementById('summaryBtn');
    if (summaryBtn) summaryBtn.style.display = 'none';
    // 初回タブはキャストロールでは閲覧専用（追加・全クリアボタンを非表示）
    const firstAddBtn = document.getElementById('firstAddBtn');
    if (firstAddBtn) firstAddBtn.style.display = 'none';
    const firstClearBtn = document.getElementById('firstClearBtn');
    if (firstClearBtn) firstClearBtn.style.display = 'none';
    // 卓一覧タブはキャストロールでは閲覧専用（一覧管理ボタンを非表示）
    const manageModalBtn = document.getElementById('manageModalBtn');
    if (manageModalBtn) manageModalBtn.style.display = 'none';
  }
  updateTableListVisibleBtn();
  if (typeof updateUndoButtonState === 'function') updateUndoButtonState();
  if (typeof renderIdentityIndicator === 'function') renderIdentityIndicator();
  setTimeout(updateFixedTop, 50);
}

// 卓一覧の公開設定トグルボタンは内勤（admin）だけに見せ、今の状態を反映する
function updateTableListVisibleBtn() {
  const btn = document.getElementById('tableListVisibleBtn');
  if (!btn) return;
  if (localStorage.getItem('rj_role') !== 'admin') { btn.style.display = 'none'; return; }
  const visible = window._fbTableListVisible !== false;
  btn.style.display = 'inline-block';
  btn.textContent = visible ? '👁 卓一覧を公開中' : '🚫 卓一覧を非公開中';
  btn.style.color = visible ? 'var(--text-dim)' : '#c0392b';
  btn.style.borderColor = visible ? 'var(--border)' : '#c0392b';
}

// 内勤が卓一覧タブの公開/非公開を切り替える（締日など、キャストに見せたくない時にOFFにする）
function toggleTableListVisible() {
  if (localStorage.getItem('rj_role') !== 'admin') return;
  const next = !(window._fbTableListVisible !== false);
  window._fbTableListVisible = next;
  if (window.fbSaveTableListVisible) window.fbSaveTableListVisible(next);
  updateTableListVisibleBtn();
  showToast(next ? '卓一覧をキャストに公開しました' : '卓一覧をキャストから非公開にしました');
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Firebase module scriptからアクセスできるようにwindowに登録
  window.renderStaffStatus = renderStaffStatus;
  window.applyTableListVisibility = applyTableListVisibility;
  window.renderTables = renderTables;
  window.renderTablesPreservingScroll = renderTablesPreservingScroll;
  window.renderFloorStatus = renderFloorStatus;
  window.updateBaanaiBar = updateBaanaiBar;
  window.renderView = renderView;
  window.updateStats = updateStats;
  window.updateUndoButtonState = updateUndoButtonState;
  window.refreshAliasModalIfOpen = refreshAliasModalIfOpen;
  window.refreshFloorModalIfOpen = refreshFloorModalIfOpen;
  window.refreshSummaryModalIfOpen = refreshSummaryModalIfOpen;
  window.renderFirstTabFromFB = function() {
    renderFirstTab();
    if (window.renderFloorStatus) window.renderFloorStatus();
    if (document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active') && window.renderView) window.renderView();
  };
  checkLogin();
  // firstGroupsを必ずクリーンな状態で初期化
  firstGroups = [];
  firstGid = 1;
  firstRid = 1;
  loadFirstData();
  updateDate();
  renderFirstTab();
  // Firebase準備完了時に実行
  window._fbReady = function() {
    if (window._fbGuests) {
      guests = window._fbGuests;
      nextId = guests.reduce((m,g) => Math.max(m, (g.id||0)+1), 1);
      renderTables();
      if (document.getElementById('panel-view').classList.contains('active')) renderView();
      updateStats();
    }
  };
  window._fbFirstReady = function() {
    if (window._fbFirstGroups) {
      firstGroups = window._fbFirstGroups;
      firstGid = firstGroups.reduce((m,g)=>Math.max(m,(g.id||0)+1), 1);
      firstGroups.forEach(g => {
        (g.rows||[]).forEach(r => { firstRid = Math.max(firstRid, (r.id||0)+1); });
      });
      renderFirstTab();
      renderFloorStatus();
    }
  };
  // ローカルのデータで先に表示（Firebase接続前）
  loadFromStorage();
  loadStaff();
  loadBaanai();
  loadFloorData();
  renderTables();
  renderStaffStatus();
  renderIdentityIndicator();
  renderMrAibanArea();
  prefillMrTanto();
  updateQueueStatusBar();
  updateQuickAddBtnVisibility();
  updateFixedTop();
  setTimeout(updateFixedTop, 100);
  // 来店予定・退店予定の時刻経過ハイライトを1分ごとに再評価する
  setInterval(() => {
    renderTables();
    renderFloorStatus();
  }, 60000);
});

function updateDate() {
  const now = new Date();
  const d = `${now.getMonth()+1}月${now.getDate()}日（${'日月火水木金土'[now.getDay()]}）`;
  document.getElementById('headerDate').textContent = d;
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['input','tables','first','view'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name === 'tables') renderTables();
  if (name === 'view') renderView();
  if (name === 'first') renderFirstTab();
  if (name === 'input') renderFloorStatus();
  renderEmptyTablesArea();
  // タブによって上部の固定エリアの高さが変わるため、切り替えるたびに固定位置を再計算する
  setTimeout(updateFixedTop, 50);
}

// 卓一覧タブの表を印刷する（紙様式30行表・空白行も含めて印刷。CSS側の@media printで印刷範囲を絞る）
function printTablesList() {
  if (!document.getElementById('panel-tables').classList.contains('active')) {
    switchTab('tables');
  }
  setTimeout(() => window.print(), 100);
}

// ===== 横スワイプによるタブ切り替え =====
(function initTabSwipe() {
  const TAB_ORDER = ['input', 'tables', 'first', 'view'];
  let startX = 0, startY = 0, startTime = 0;
  let tracking = false;   // このタッチをスワイプ候補として追跡中か
  let ignoreThis = false; // このタッチは横スクロール領域内など、スワイプ判定の対象外か
  let axisLocked = null;  // 'h'（横方向優勢）'v'（縦方向優勢）が決まったら以後は判定し直さない

  // 指定要素の祖先をたどり、実際に横スクロール可能な要素（中身が画面より横長）の内側かどうかを調べる。
  // これに該当する間はタブスワイプとして扱わず、その場の横スクロール（統計バーや紙様式の表など）を優先する。
  function isInsideHorizontalScroller(el) {
    let node = el;
    while (node && node !== document.body) {
      if (node.nodeType === 1) {
        const style = window.getComputedStyle(node);
        const canScrollX = (style.overflowX === 'auto' || style.overflowX === 'scroll');
        if (canScrollX && node.scrollWidth > node.clientWidth + 1) return true;
      }
      node = node.parentElement;
    }
    return false;
  }

  function onTouchStart(e) {
    if (e.touches.length !== 1) { tracking = false; return; } // ピンチ操作等は対象外
    // モーダル表示中は誤動作防止のためスワイプ判定を行わない
    if (document.querySelector('.modal-overlay.show')) { tracking = false; return; }
    const target = e.target;
    const tag = target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') { tracking = false; return; }
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    startTime = Date.now();
    tracking = true;
    axisLocked = null;
    ignoreThis = isInsideHorizontalScroller(target);
  }

  function onTouchMove(e) {
    if (!tracking || ignoreThis) return;
    const touch = e.touches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    if (axisLocked === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      // 動き始めの方向で「横スワイプ候補」か「縦スクロール」かを一度だけ判定する
      axisLocked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
  }

  function onTouchEnd(e) {
    if (!tracking || ignoreThis || axisLocked !== 'h') { tracking = false; return; }
    tracking = false;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    const dt = Math.max(1, Date.now() - startTime);
    // 画面幅に応じてしきい値をスケーリングする（狭い画面ほど短い距離でも切り替わるように）
    const distanceThreshold = Math.max(50, window.innerWidth * 0.18);
    const velocity = Math.abs(dx) / dt; // px/ms
    const isHorizontalEnough = Math.abs(dx) > Math.abs(dy) * 1.8;
    // 「すばやいフリック」または「画面幅に応じた十分な距離のドラッグ」のどちらかを満たせばスワイプとみなす。
    // ゆっくりした横スクロール操作（統計バーの中身を見る等）と誤反応しないよう、速度と距離の両にらみで判定する。
    const isFastFlick = velocity > 0.45 && Math.abs(dx) > 30;
    const isLongDrag = Math.abs(dx) > distanceThreshold;
    if (!isHorizontalEnough || (!isFastFlick && !isLongDrag)) return;

    const activePanel = document.querySelector('.panel.active');
    if (!activePanel) return;
    const currentName = activePanel.id.replace('panel-', '');
    const currentIndex = TAB_ORDER.indexOf(currentName);
    if (currentIndex === -1) return;
    if (dx < 0) {
      // 左スワイプ：次のタブへ
      if (currentIndex < TAB_ORDER.length - 1) switchTab(TAB_ORDER[currentIndex + 1]);
    } else {
      // 右スワイプ：前のタブへ
      if (currentIndex > 0) switchTab(TAB_ORDER[currentIndex - 1]);
    }
  }

  document.addEventListener('touchstart', onTouchStart, { passive: true });
  document.addEventListener('touchmove', onTouchMove, { passive: true });
  document.addEventListener('touchend', onTouchEnd, { passive: true });
})();

// ===== ポップアップ（モーダル）は外側（オーバーレイの背景部分）をタップしても閉じられるようにする =====
// クリック先が「.modal-overlay自身」の場合のみ閉じる（内側の.modal本体やボタン等をタップした時は
// イベントがそこで止まらずbubbleしてくるが、target自体はoverlayにならないので誤って閉じることはない）
document.addEventListener('click', function(e) {
  const target = e.target;
  if (target && target.classList && target.classList.contains('modal-overlay') && target.classList.contains('show')) {
    target.classList.remove('show');
  }
});

// ===== 1件ずつ入力してキューに追加する方式 =====
let _multiReportQueue = [];
let _queueEditOpen = {};
let _queueAibanFormOpen = {};
let _queueAibanParts = {}; // { idx: {tanto, name} } 推測での再分解をせず、入力中の値を直接保持する

// 「予約を編集」モーダル用（一覧管理・卓一覧の編集で共通）
let _editAibanFormOpen = false;
let _editAibanParts = { tanto: '', name: '' };
// 卓状況・全体タブの長押しクイック編集モーダル用
let _qeAibanFormOpen = false;
let _qeAibanParts = { tanto: '', name: '' };
let _mrAiban = { tanto: '', name: '' };
let _mrAibanFormOpen = false;

// アイバンの担当名/お客様名を取得する。個別保存された値があればそれを優先し（確実・推測不要）、
// 無ければ従来通り結合文字列から推測で分割する（古いデータとの互換性のため）
function getAibanParts(obj) {
  if (!obj) return { tanto: '', name: '' };
  if (obj.aibanTanto || obj.aibanName) {
    return { tanto: obj.aibanTanto || '', name: obj.aibanName || '' };
  }
  return splitAibanText(obj.aiban || '');
}

// アイバンUIの共通部品（チップ表示／2列入力フォーム／追加ボタン）。
// 呼び出し元ごとに異なる開閉・更新処理をJS式の文字列として渡すことで、見た目と挙動を完全に統一する
function aibanEditorHTML(combinedValue, isOpen, parts, openExpr, closeExpr, clearExpr, tantoInputExpr, nameInputExpr) {
  const hasValue = combinedValue && combinedValue.trim();
  if (hasValue && !isOpen) {
    return `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="display:inline-flex;align-items:center;gap:5px;background:#1a3a52;border:1px solid #3498db;border-radius:12px;padding:3px 6px 3px 10px;font-size:12px;color:#5dade2;">
          🔗 ${combinedValue}
          <button onclick="${openExpr}" style="background:none;border:none;color:#5dade2;font-size:12px;cursor:pointer;padding:0 4px;">編集</button>
          <button onclick="${clearExpr}" style="background:none;border:none;color:#e74c3c;font-size:12px;cursor:pointer;padding:0 4px 0 0;">削除</button>
        </span>
      </div>`;
  }
  if (isOpen) {
    return `
      <div style="margin-bottom:6px;background:var(--surface);border:1px solid #3498db;border-radius:6px;padding:8px;box-sizing:border-box;">
        <div style="font-size:10px;color:#5dade2;margin-bottom:5px;">🔗 アイバン予定の相手</div>
        <div style="display:flex;gap:6px;margin-bottom:5px;">
          <input class="aiban-input" placeholder="担当名" value="${(parts.tanto||'').replace(/"/g,'&quot;')}" oninput="${tantoInputExpr}">
          <input class="aiban-input" placeholder="お客様名" value="${(parts.name||'').replace(/"/g,'&quot;')}" oninput="${nameInputExpr}">
        </div>
        <button onclick="${closeExpr}" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:11px;padding:3px 10px;cursor:pointer;font-family:var(--font-main);">閉じる</button>
      </div>`;
  }
  return `
    <div style="margin-bottom:6px;">
      <button onclick="${openExpr}" style="background:none;border:1px dashed var(--border);border-radius:12px;color:var(--text-dim);font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--font-main);">🔗 アイバン予定を追加</button>
    </div>`;
}

function renderMrAibanArea() {
  const el = document.getElementById('mrAibanArea');
  if (!el) return;
  const combined = [_mrAiban.tanto, _mrAiban.name].filter(Boolean).join(' ');
  el.innerHTML = aibanEditorHTML(
    combined, _mrAibanFormOpen, _mrAiban,
    `_mrAibanFormOpen=true;renderMrAibanArea();`,
    `_mrAibanFormOpen=false;renderMrAibanArea();`,
    `_mrAiban={tanto:'',name:''};renderMrAibanArea();`,
    `_mrAiban.tanto=this.value;`,
    `_mrAiban.name=this.value;`
  );
}

// キャスト用パスでログイン中なら、担当名にログイン中の名前を自動入力する
function prefillMrTanto() {
  const role = localStorage.getItem('rj_role');
  const el = document.getElementById('mr-tanto');
  if (!el || role !== 'host') return;
  const me = getMyIdentity();
  if (me) el.value = me;
}

function clearMrForm() {
  ['mr-name','mr-arrive','mr-leave','mr-budget','mr-help','mr-note'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  prefillMrTanto();
  _mrAiban = { tanto: '', name: '' };
  _mrAibanFormOpen = false;
  renderMrAibanArea();
  updateQueueStatusBar();
  updateQuickAddBtnVisibility();
}

// 入力欄の下に、報告前のキューの中身をボタンなしで一覧表示する
function updateQueueStatusBar() {
  renderQueuePreview();
}

function renderQueuePreview() {
  const el = document.getElementById('queuePreviewArea');
  if (!el) return;
  if (!_multiReportQueue.length) {
    el.innerHTML = '';
    return;
  }
  const items = _multiReportQueue.map(p => `
    <div style="font-size:12px;color:var(--text);padding:3px 0;">
      <span style="color:#f0c040;">${p.tanto || '(担当未入力)'}</span> ${p.name || '(お客様名未入力)'}様
    </div>`).join('');
  el.innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-top:6px;margin-bottom:2px;">
      <div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:2px;">報告前の予定：${_multiReportQueue.length}件</div>
      ${items}
    </div>`;
}

// 担当名・お客様名が両方入力されている時だけ「予定を追加」ボタンを表示する（体入は担当名省略可）
function updateQuickAddBtnVisibility() {
  const btn = document.getElementById('mrQuickAddBtn');
  if (!btn) return;
  const tanto = document.getElementById('mr-tanto').value.trim();
  const name = document.getElementById('mr-name').value.trim();
  const isTainyu = name === '体入';
  btn.style.display = ((tanto || isTainyu) && name) ? 'block' : 'none';
}

// 今の入力内容が有効なら(担当名+お客様名、体入は担当名省略可)キューに追加する。追加できたらtrueを返す
function pushCurrentEntryToQueue() {
  const tanto = document.getElementById('mr-tanto').value.trim();
  const name = document.getElementById('mr-name').value.trim();
  const isTainyu = name === '体入';
  if (!((tanto || isTainyu) && name)) return false;
  const aiban = [_mrAiban.tanto, _mrAiban.name].filter(Boolean).join(' ');
  _multiReportQueue.push({
    tanto, name,
    arrive: toHalfWidthTimeText(document.getElementById('mr-arrive').value.trim()),
    leave:  toHalfWidthTimeText(document.getElementById('mr-leave').value.trim()),
    budget: formatBudgetText(document.getElementById('mr-budget').value.trim()),
    help:   document.getElementById('mr-help').value.trim(),
    note:   document.getElementById('mr-note').value.trim(),
    aiban,
    aibanTanto: _mrAiban.tanto,
    aibanName: _mrAiban.name,
  });
  clearMrForm();
  return true;
}

// 「予定を追加」ボタン：ポップアップを開かず、その場でキューに追加して次の人を続けて入力できるようにする
function quickAddToQueue() {
  const added = pushCurrentEntryToQueue();
  if (added) showToast('追加しました。続けて入力できます');
}

function addToReportQueue() {
  const tanto = document.getElementById('mr-tanto').value.trim();
  const name = document.getElementById('mr-name').value.trim();
  const isTainyu = name === '体入';

  pushCurrentEntryToQueue();

  // 入力欄が空でも、既にキューに1件以上あればそのまま確認画面を開く
  if (!_multiReportQueue.length) {
    if (!tanto && !isTainyu) { showToast('担当名を入力してください'); return; }
    if (!name) { showToast('お客様名を入力してください'); return; }
    showToast('報告内容を入力してください');
    return;
  }
  openQueuePopup();
}

// ポップアップ内で各項目を直接修正できるようにする
function updateQueueField(idx, key, value) {
  if (!_multiReportQueue[idx]) return;
  _multiReportQueue[idx][key] = value;
}

// アイバンの担当名/お客様名どちらかが変更された時、直接保持している値を更新して結合する（推測での再分解はしない）
function updateQueueAibanPart(idx, part, value) {
  if (!_queueAibanParts[idx]) _queueAibanParts[idx] = { tanto: '', name: '' };
  _queueAibanParts[idx][part] = value;
  const p = _multiReportQueue[idx];
  if (p) {
    p.aiban = [_queueAibanParts[idx].tanto, _queueAibanParts[idx].name].filter(Boolean).join(' ');
    p.aibanTanto = _queueAibanParts[idx].tanto;
    p.aibanName = _queueAibanParts[idx].name;
  }
}

function removeFromReportQueue(idx) {
  _multiReportQueue.splice(idx, 1);
  updateQueueStatusBar();
  if (_multiReportQueue.length) {
    openQueuePopup();
  } else {
    closeQueuePopup();
  }
}

// 追加するたびに開く、これまでの予定一覧の確認ポップアップ（箇条書き・空欄は表示しない・スクロール対応）
function openQueuePopup() {
  let modal = document.getElementById('queuePopup');

function closeQueuePopup() {
  document.getElementById('queuePopup')?.classList.remove('show');
}

function confirmQueueSubmit() {
  if (!_multiReportQueue.length) { showToast('予定がありません'); return; }
  // 確定時にまとめて、全角数字→半角・予算の桁区切りを正規化する（入力中のカーソル位置が乱れないように）
  _multiReportQueue.forEach(p => {
    p.arrive = toHalfWidthTimeText(p.arrive || '');
    p.leave = toHalfWidthTimeText(p.leave || '');
    p.budget = formatBudgetText(p.budget || '');
  });
  closeQueuePopup();
  importTextParsed(_multiReportQueue);
  showToast(`${_multiReportQueue.length}件の予定を報告しました`);
  _multiReportQueue = [];
  _queueEditOpen = {};
  _queueAibanFormOpen = {};
  _queueAibanParts = {};
  updateQueueStatusBar();
  switchTab('input');
}

// ===== 報告内容の確認ポップアップ（現在は未使用だが、他機能からの参照用に残置） =====
let _reportPreviewData = [];

function showReportPreview(parsed) {
  const previous = _reportPreviewData || [];
  _reportPreviewData = parsed.map(p => {
    const copy = { ...p };
    // 「戻って修正」→再度「報告する」で戻ってきた時、同じ担当名+お客様名ならアイバン入力を引き継ぐ
    if (!copy.aiban) {
      const match = previous.find(prev => prev.tanto === copy.tanto && prev.name === copy.name && prev.aiban);
      if (match) {
        copy.aiban = match.aiban;
        copy._aibanTanto = match._aibanTanto;
        copy._aibanName = match._aibanName;
      }
    }
    return copy;
  });
  _aibanFormOpen = {};
  renderReportPreviewModal();
}

function renderReportPreviewModal() {
  let modal = document.getElementById('reportPreviewModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'reportPreviewModal';
    document.body.appendChild(modal);

  const fields = [

}

function updateAibanField(index, part, value) {
  const p = _reportPreviewData[index];
  if (!p) return;

  const p = _reportPreviewData[index];

  p.aiban = '';
  p._aibanTanto = '';
  p._aibanName = '';

function updateReportPreviewField(index, key, value) {
  if (!_reportPreviewData[index]) return;
  _reportPreviewData[index][key] = value;
}

function removeReportPreviewRow(index) {
  _reportPreviewData.splice(index, 1);
  if (!_reportPreviewData.length) {
    document.getElementById('reportPreviewModal').classList.remove('show');
    showToast('報告内容がなくなりました');
    return;
  }
  renderReportPreviewModal();
}

function confirmReportPreview() {
  document.getElementById('reportPreviewModal').classList.remove('show');
  // アイバン入力フォーム用の一時フィールドはゲストデータに持ち込まない
  const cleaned = _reportPreviewData.map(p => {
    const copy = { ...p };
    delete copy._aibanTanto;
    delete copy._aibanName;
    return copy;
  });
  importTextParsed(cleaned);
  _reportPreviewData = [];
  _aibanFormOpen = {};
  // 送信済みのキューもクリアする
  _multiReportQueue = [];
  renderReportQueueArea();
}

// 全角数字を半角に変換する（他の文字はそのまま）
function toHalfWidthDigits(text) {
  if (!text) return text;
  return text.replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}

// 来店時間・退店時間向け：全角数字に加え、全角コロンも半角に統一する
function toHalfWidthTimeText(text) {
  return toHalfWidthDigits(text).replace(/：/g, ':');
}

// 予算欄向け：全角→半角変換した上で、完全に数字だけなら3桁区切りにする（「５万」等はそのまま、「50000」→「50,000」）
function formatBudgetText(text) {
  const normalized = toHalfWidthDigits(text || '').trim();
  if (/^\d+$/.test(normalized)) {
    return Number(normalized).toLocaleString('en-US');
  }
  return normalized;
}

// 予算欄に「上げ」（単価上げ・爆上げ等）が含まれていたら、自動で🔺特記事項を付ける
function detectBudgetRaiseKeyword(text) {
  if (!text) return false;
  return text.includes('上げ') || text.includes('あげ');
}

// 既存の特記事項を崩さず、予算欄の内容に応じて🔺(raise)の有無だけを同期する
function syncBudgetRaiseSpecial(g) {
  if (!g.specials) g.specials = [];
  const shouldHave = detectBudgetRaiseKeyword((g.budget || '') + (g.note || ''));
  const has = g.specials.includes('raise');
  if (shouldHave && !has) g.specials.push('raise');
  if (!shouldHave && has) g.specials = g.specials.filter(k => k !== 'raise');
}

// ===== 退店時間の自動計算（クイック／プランC／ワンタイ／ツータイ） =====
// 現在時刻に指定分数を加算した「HH:MM」形式の文字列を返す
// 深夜営業を考慮し、加算の結果日付が変わる場合は「25:30」のような24時以降表記にする
function calcLeaveTimeFromNow(minutesToAdd) {
  const now = new Date();
  const totalMinutes = now.getHours() * 60 + now.getMinutes() + minutesToAdd;
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

// テキスト中に「クイック」が含まれるか（予算・退店・備考のどこに書かれていてもよい）
function detectQuickKeyword(text) {
  if (!text) return false;
  return text.includes('クイック');
}

// テキスト中に「プランC」が含まれるか（初回タブのプラン欄、またはそれが反映された卓一覧の備考欄）
function detectPlanCKeyword(text) {
  if (!text) return false;
  return text.includes('プランC') || text.includes('プランｃ');
}

// 退店欄テキストから「ワンタイ」「ツータイ」による加算分数を判定する（該当なければnull）
// 表記ゆれ（カタカナ/ひらがな、全角/半角数字、長音の有無、「1時間/2時間」等）を広く拾う
function detectTaimeMinutes(text) {
  if (!text) return null;
  // カタカナ→ひらがな、全角数字→半角数字に正規化し、長音符（ー・〜）を除去して比較しやすくする
  const norm = toHiragana(toHalfWidthDigits(text)).replace(/[ー〜]/g, '');
  if (/(つ[うー]?たい|2\s*たい|２\s*たい|2\s*時間|２\s*時間)/.test(norm)) return 120;
  if (/(わんたい|1\s*たい|１\s*たい|1\s*時間|１\s*時間)/.test(norm)) return 60;
  return null;
}

// 退店欄に書かれていた「クイック／ワンタイ／ツータイ」の文言を、既存の備考欄の内容を残したまま追記する
function moveLeaveKeywordToNote(g, keyword) {
  if (!keyword) return;
  const existingNote = (g.note || '').trim();
  // 同じ文言が既に備考欄にあれば重複追記しない
  if (existingNote.includes(keyword)) return;
  g.note = existingNote ? `${existingNote} ${keyword}` : keyword;
}

// 来店確認（入店フラグON）や関連欄の編集保存のタイミングで、ゲスト1件分の退店時間を自動計算して反映する
// ・ワンタイ／ツータイ（退店欄にその文言がある間）：常に現在時刻からの再計算で上書きする
// ・クイック（予算・退店・備考のいずれかにその文言がある）：退店欄がまだ空の時だけ、+1時間で自動計算する
//   （一度自動計算した後に本人が退店欄を具体的な時刻へ手動修正したら、以後はその値を優先し上書きしない）
// ・退店欄自体に「クイック／ワンタイ／ツータイ」と書かれていた場合は、その文言を備考欄へ移してから退店欄を時刻に置き換える
function applyAutoLeaveTime(g) {
  if (!g) return;
  const leaveText = g.leave || '';
  const taimeMinutes = detectTaimeMinutes(leaveText);
  if (taimeMinutes != null) {
    // 表記ゆれ（わんたい/1タイ/1時間 等）を問わず、備考欄には統一表記で記録する
    moveLeaveKeywordToNote(g, taimeMinutes === 120 ? 'ツータイ' : 'ワンタイ');
    g.leave = calcLeaveTimeFromNow(taimeMinutes);
    return;
  }
  const isQuick = detectQuickKeyword(g.budget || '') || detectQuickKeyword(leaveText) || detectQuickKeyword(g.note || '');
  // 退店欄が空、または退店欄そのものに「クイック」という文字が書かれている場合だけ自動計算する
  // （退店欄に既に具体的な時刻等が入っている場合は、本人が手動で決めた値として上書きしない）
  const leaveHasQuickText = detectQuickKeyword(leaveText);
  const leaveIsEmptyOrQuickText = !leaveText.trim() || leaveHasQuickText;
  if (isQuick && leaveIsEmptyOrQuickText) {
    if (leaveHasQuickText) moveLeaveKeywordToNote(g, 'クイック');
    g.leave = calcLeaveTimeFromNow(60);
  }
}


// お客様名・備考のどちらかに「新規」「初回RP」の文言が含まれていたら🔰を自動で付ける
// （飲直による自動付与とは別ルートなので、こちらは追加のみ行い、自動での削除はしない）
function syncNewSpecialFromText(g) {
  if (!g.specials) g.specials = [];
  const text = (g.name || '') + (g.note || '');
  const shouldHave = text.includes('新規') || text.includes('初回RP') || text.includes('初回リピート');
  if (shouldHave && !g.specials.includes('new')) g.specials.push('new');
}

// ===== 👑イベント主役の「本日一度でも付いた担当者」自動判定 =====
// 担当者名の比較用に正規化する（カタカナ→ひらがな、前後の空白除去）。既存の主役連動ロジックと同じ正規化ルール
function normalizeTantoName(tanto) {
  return toHiragana((tanto || '').trim());
}

// 指定した担当者に、本日一度でも👑主役が付いたことを記録する（Firebase同期・営業日をまたいだら自動でリセット）
function markEventTantoToday(tanto) {
  const tantoNorm = normalizeTantoName(tanto);
  if (!tantoNorm) return;
  const todayKey = getTodayKey();
  if (eventTantoToday.date !== todayKey) {
    eventTantoToday = { date: todayKey, names: {} };
  }
  eventTantoToday.names[tantoNorm] = true;
  saveEventTantoToday();
}

// 指定した担当者の「本日の主役フラグ」記録を取り消す（特記事項モーダルで手動OFFにした時のみ使用。退店では取り消さない）
function unmarkEventTantoToday(tanto) {
  const tantoNorm = normalizeTantoName(tanto);
  if (!tantoNorm) return;
  const todayKey = getTodayKey();
  if (eventTantoToday.date !== todayKey) return; // 別営業日の記録なら触る必要がない
  if (eventTantoToday.names[tantoNorm]) {
    delete eventTantoToday.names[tantoNorm];
    saveEventTantoToday();
  }
}

// 指定した担当者が、本日一度でも👑主役が付いた担当者かどうかを判定する
function isEventTantoToday(tanto) {
  const tantoNorm = normalizeTantoName(tanto);
  if (!tantoNorm) return false;
  if (eventTantoToday.date !== getTodayKey()) return false; // 日付が変わっていたら記録は無効
  return !!eventTantoToday.names[tantoNorm];
}

function saveEventTantoToday() {
  try { localStorage.setItem('rj_eventTantoToday', JSON.stringify(eventTantoToday)); } catch(e) {}
  if (window.fbSaveEventTantoToday) window.fbSaveEventTantoToday(eventTantoToday);
}

// ゲストの担当者が「本日一度でも主役が付いた担当者」なら、👑主役の特記事項を自動で付ける（追加のみ、自動での削除はしない）
// 予定報告の取り込み・卓一覧での新規行作成・担当者欄の編集・飲直確定など、担当者(tanto)が設定されるすべての箇所から呼ぶ
function syncEventSpecialFromTanto(g) {
  if (!g.specials) g.specials = [];
  if (g.specials.includes('event')) return; // 既に付いていれば何もしない
  if (isEventTantoToday(g.tanto)) g.specials.push('event');
}

function importTextParsed(parsed) {
  if (!parsed || !parsed.length) {
    showToast('該当する報告が見つかりませんでした');
    return;
  }
  const usedRows = new Set(guests.map(g => Number(g.rowNum)).filter(Boolean));
  let rc = 1;
  let skipped = 0;
  parsed.forEach(g => {
    const isDuplicate = guests.some(existing =>
      existing.tanto && existing.name && g.tanto && g.name &&
      (existing.tanto.includes(g.tanto) || g.tanto.includes(existing.tanto)) &&
      existing.name === g.name
    );
    if (isDuplicate) { skipped++; return; }
    while (usedRows.has(rc)) rc++;
    usedRows.add(rc);
    const specials = detectBudgetRaiseKeyword((g.budget || '') + (g.note || '')) ? ['raise'] : [];
    const newGuest = { id: nextId++, ...g, rowNum: String(rc++), tableNum: g.tableNum||'', arrived: false, reportType: getCurrentReportType(), specials };
    syncNewSpecialFromText(newGuest);
    syncEventSpecialFromTanto(newGuest);
    guests.push(newGuest);
  });
  saveToStorage();
  updateStats();
  renderStaffStatus();
  const msg = skipped > 0 ? `取り込みました！（重複${skipped}件をスキップ）` : `${parsed.length - skipped}件を取り込みました！`;
  showToast(msg);
  switchTab('tables');
}

function renderTables() {
  const container = document.getElementById('assignedTables');
  const MAX_ROWS = 30;

  // 表示前に行番号を詰め直す（他端末から隙間のあるデータを受信した場合も自動修復）
  const beforeRepack = JSON.stringify(guests.map(g => g.rowNum));
  repackRowNums();
  const afterRepack = JSON.stringify(guests.map(g => g.rowNum));
  if (beforeRepack !== afterRepack) {
    // 詰め直しで変化があった場合のみ保存し直し、他端末にも修復結果を反映する（1件ずつ書き込み）
    try { localStorage.setItem('tableManager_guests', JSON.stringify(guests)); } catch(e) {}
    if (window.fbSaveGuest) {
      guests.forEach(g => window.fbSaveGuest(g));
    }
  }

  // No.ごとにゲストをマップ（rowNum = 行番号）
  const rowMap = {};
  guests.forEach(g => { if (g.rowNum) rowMap[g.rowNum] = g; });

  // 卓一覧タブでの並び順：①未来店（No.順）②来店済み・退店済み（No.順）③空白行（No.順）の3グループに分ける
  const notArrivedRows = [];
  const arrivedRows = [];
  const emptyRowNums = [];
  for (let i = 1; i <= MAX_ROWS; i++) {
    const g = rowMap[i];
    if (g) {
      (g.arrived ? arrivedRows : notArrivedRows).push({ no: i, g });
    } else {
      emptyRowNums.push(i);
    }
  }
  // MAX_ROWS超えの行も同様に、未来店/来店済みへ振り分ける
  guests.filter(g => g.rowNum && Number(g.rowNum) > MAX_ROWS)
    .sort((a,b) => Number(a.rowNum)-Number(b.rowNum))
    .forEach(g => { (g.arrived ? arrivedRows : notArrivedRows).push({ no: g.rowNum, g }); });

  let rows = '';
  notArrivedRows.forEach(({no,g}) => { rows += rowHTML(no, g); });
  arrivedRows.forEach(({no,g}) => { rows += rowHTML(no, g); });
  emptyRowNums.forEach(no => { rows += emptyRowHTML(no); });

  container.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="paper-table">
        <thead>
          <tr>
            <th class="p-col-no">No.</th>
            <th class="p-col-num">卓番</th>
            <th class="p-col-time">来店時間</th>
            <th class="p-col-tanto">担当者</th>
            <th class="p-col-guest">お客様名</th>
            <th class="p-col-keep">ボトル</th>
            <th class="p-col-help">ヘルプ</th>
            <th class="p-col-note">備考</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  updateStats();
  updateTableStats();
  renderEmptyTablesArea();
}

// アイバン文字列（「担当名 お客様名」形式）を、担当名部分とお客様名部分に分解する
// 編集モーダルなどで2列入力欄に事前入力するために使う
function splitAibanText(text) {
  if (!text || !text.trim()) return { tanto: '', name: '' };
  const trimmed = text.trim();
  const aliasIndex = buildAliasIndex();
  const normText = toHiragana(trimmed);
  const staffMatch = aliasIndex.find(entry => normText.startsWith(entry.norm));
  if (staffMatch) {
    return { tanto: staffMatch.name, name: trimmed.slice(staffMatch.text.length).trim() };
  }
  return { tanto: '', name: trimmed };
}

// アイバン欄（「担当名　お客様名」形式）から、対応する相手のゲストを探す
// 表記は担当名の呼び名マッチ＋お客様名の部分一致で判定する（完全一致は求めない）
function findAibanPartner(g) {
  if (!g.aiban) return null;
  const text = g.aiban.trim();
  if (!text) return null;
  const aliasIndex = buildAliasIndex();
  const normText = toHiragana(text);
  // 担当名らしき部分を先頭から検出
  const staffMatch = aliasIndex.find(entry => normText.startsWith(entry.norm));
  const nameHint = staffMatch ? text.slice(staffMatch.text.length).trim() : text;
  return guests.find(other => {
    if (other.id === g.id || other.left) return false;
    const nameOk = nameHint && other.name && toHiragana(other.name).includes(toHiragana(nameHint).replace(/[△\s]/g,''));
    const tantoOk = !staffMatch || (other.tanto && toHiragana(other.tanto).includes(staffMatch.norm));
    return nameOk && tantoOk;
  }) || null;
}

// そのゲストがアイバンで誰かと紐づいているかを判定する（自分が設定側／相手として参照される側の両方に対応）
// アイバンで繋がっているグループごとに色を割り当てる（複数組のアイバンが同時にあっても見分けられるように）
const AIBAN_PALETTE = ['#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#e91e63', '#2ecc71', '#f39c12', '#95a5a6'];
function computeAibanColorMap() {
  const active = guests.filter(g => !g.left);
  const parent = {};
  function find(x) {
    if (!(x in parent)) parent[x] = x;
    while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
    return x;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra !== rb) parent[ra] = rb;
  }
  active.forEach(g => {
    if (g.aiban && g.aiban.trim()) {
      const partner = findAibanPartner(g);
      if (partner) { find(g.id); find(partner.id); union(g.id, partner.id); }
    }
  });
  const groupsMap = {};
  Object.keys(parent).forEach(idStr => {
    const id = Number(idStr);
    const root = find(id);
    if (!groupsMap[root]) groupsMap[root] = [];
    groupsMap[root].push(id);
  });
  // グループ内最小idの昇順で色を安定的に割り当てる
  const groupList = Object.values(groupsMap).sort((a,b) => Math.min(...a) - Math.min(...b));
  const colorMap = {};
  groupList.forEach((ids, idx) => {
    const color = AIBAN_PALETTE[idx % AIBAN_PALETTE.length];
    ids.forEach(id => { colorMap[id] = color; });
  });
  return colorMap;
}

function getAibanLinkInfo(g) {
  const colorMap = computeAibanColorMap();
  const color = colorMap[g.id] || '#3498db';
  if (g.aiban && g.aiban.trim()) {
    const partner = findAibanPartner(g);
    const label = partner
      ? `アイバン: ${partner.tanto||''} ${formatGuestDisplayName(partner.name)}`
      : `アイバン: ${g.aiban}`;
    return { linked: true, label, color, partnerId: partner ? partner.id : null };
  }
  const referrer = guests.find(other => {
    if (other.id === g.id || other.left || !other.aiban) return false;
    const partner = findAibanPartner(other);
    return partner && partner.id === g.id;
  });
  if (referrer) {
    return { linked: true, label: `アイバン: ${referrer.tanto||''} ${formatGuestDisplayName(referrer.name)}と`, color, partnerId: referrer.id };
  }
  return { linked: false, label: '', color: null, partnerId: null };
}

// インライン編集でセルを再描画すると、キーボードが閉じるタイミングと重なって
// 画面が勝手にスクロールしてしまうことがあるため、再描画のタイミングをキーボードが閉じきってから行う。
// キーボード表示中に画面外へ押し出されていたヘッダー/統計バーが正しい位置に戻る際は、
// それに連動して本文（表）も自然に下へずれるようにし、あえて打ち消すことはしない。
function withScrollPreserved(renderFn) {
  // キーボードが閉じるアニメーションと再描画のタイミングが重なるとズレやすいため、少し待ってから行う
  setTimeout(() => {
    // キーボード表示中はヘッダー/統計バーがposition:fixedのまま画面外へ押し出されていることがあるため、
    // キーボードが閉じ終わったこのタイミングで一度だけ正しい位置に計算し直す
    // （常時監視して直し続けるとガタつきの原因になるため、あくまで編集完了時の1回きりにする。
    // 　preserveScroll=falseにより、ヘッダーが戻る動きに本文も連動してそのまま下にずれるようにする）
    updateFixedTop(false);
    renderFn();
  }, 120);
}

// withScrollPreservedと違い、「今どの行を編集していたか」が分からない場面（他端末からの
// リアルタイム同期反映など）で使う汎用版。画面内で一番上に見えている行を自動的に目印にし、
// 卓一覧が丸ごと再描画されても、その行が画面上の同じ位置に見え続けるようスクロール位置を補正する。
function renderTablesPreservingScroll() {
  const panel = document.getElementById('panel-tables');
  const isTablesActive = panel && panel.classList.contains('active');
  if (!isTablesActive) { renderTables(); return; } // 卓一覧タブを見ていない時は特に気にする必要がない

  let anchorRowNum = null, beforeTop = null;
  const rows = panel.querySelectorAll('[data-rownum]');
  for (const tr of rows) {
    const rect = tr.getBoundingClientRect();
    if (rect.bottom > 0) { // 画面内に入っている一番上の行
      anchorRowNum = tr.getAttribute('data-rownum');
      beforeTop = rect.top;
      break;
    }
  }

  function realign() {
    if (anchorRowNum === null) return;
    const newTr = document.querySelector(`#panel-tables [data-rownum="${anchorRowNum}"]`);
    if (newTr) {
      const afterTop = newTr.getBoundingClientRect().top;
      window.scrollBy(0, afterTop - beforeTop);
    }
  }

  setTimeout(() => {
    renderTables();
    realign();
    requestAnimationFrame(realign);
    setTimeout(realign, 100);
    setTimeout(realign, 300);
  }, 30);
}

// セルをインライン編集
function editCell(id, field, td) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  const current = g[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  // カーソルを末尾に（全選択しない）
  const len = input.value.length;
  input.setSelectionRange(len, len);
  function save() {
    g[field] = input.value.trim();
    if (field === 'name' || field === 'note') syncNewSpecialFromText(g);
    if (field === 'tanto') syncEventSpecialFromTanto(g);
    // 来店済みのゲストで、予算・退店・備考のいずれかが編集された時は、クイック／ワンタイ／ツータイの退店時間を再計算する
    if (g.arrived && (field === 'budget' || field === 'leave' || field === 'note')) {
      applyAutoLeaveTime(g);
    }
    saveToStorage();
    // キーボードが閉じる際の画面ズレを防ぐため、行の更新をキーボードが閉じきるまで少し待ってから行い、
    // 更新後も同じ行が画面上の同じ位置に見えるようスクロール位置を補正する
    withScrollPreserved(() => updateSingleGuestRow(id), td.closest('tr'));
    renderFloorStatus();
    if (document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active')) renderView();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    // 日本語入力（IME）で漢字変換を確定するEnterと区別する。変換確定中のEnterでセル編集自体を終了させない
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) input.blur();
    if (e.key === 'Escape') { td.textContent = current; }
  });
}

// 空行タップで新規作成してその場編集
function createAndEdit(rowNum, field, td) {
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  function save() {
    const val = input.value.trim();
    if (!val) { withScrollPreserved(renderTables, td.closest('tr')); return; } // 空なら何もしない
    const g = { id: nextId++, rowNum: String(rowNum), tableNum:'', arrive:'', leave:'', tanto:'', name:'', budget:'', note:'', help:'', arrived: false };
    g[field] = val;
    syncNewSpecialFromText(g);
    if (field === 'tanto') syncEventSpecialFromTanto(g);
    guests.push(g);
    repackRowNums();
    saveToStorage();
    withScrollPreserved(renderTables, td.closest('tr'));
    renderFloorStatus();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    // 日本語入力（IME）で漢字変換を確定するEnterと区別する。変換確定中のEnterでセル編集自体を終了させない
    if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) input.blur();
    if (e.key === 'Escape') { withScrollPreserved(renderTables, td.closest('tr')); }
  });
}



// ===== 卓状況 =====
const DEFAULT_FLOORS = {
  V: Array.from({length:9},(_,i)=>'V'+(i+1)),
  A: Array.from({length:6},(_,i)=>'A'+(i+1)),
  B: Array.from({length:9},(_,i)=>'B'+(i+1)),
};
let floorData = JSON.parse(JSON.stringify(DEFAULT_FLOORS));

function loadFloorData() {
  try {
    const raw = localStorage.getItem('rj_floorData');
    if (raw) floorData = JSON.parse(raw);
  } catch(e) {}
}

function saveFloorData() {
  try { localStorage.setItem('rj_floorData', JSON.stringify(floorData)); } catch(e) {}
  if (window.fbSaveFloor) window.fbSaveFloor(floorData);
}

// 卓状況の1ボックス分を生成する（同じ卓番に複数ゲストがいる場合は、この関数を人数分呼び出して並べる）
function renderFloorBox(t, key, info, baanaiName, multiTantoNames) {
  const iconsHtml = (info && info.specials && info.specials.length)
    ? info.specials.map(k => { const s = SPECIALS.find(x => x.key === k); return s ? s.icon : ''; }).join('')
    : '';
  const arrived = !!(info && info.arrived);
  const isFirst = !!(info && info.isFirst);
  // 初回は水色系、それ以外(来店済みの通常ゲスト)は今まで通りゴールド系
  const boxBg = isFirst ? '#5dade2' : (arrived ? '#c9a84c' : 'transparent');
  const boxText = isFirst ? '#000' : (arrived ? '#000' : 'var(--text)');
  const boxDim = isFirst ? '#1a4a66' : (arrived ? '#5a4a1a' : '#a68a4a');
  let line1, line2, line3;
  if (info && info.isFirst) {
    line1 = `<span style="font-weight:700;">${t}</span>${iconsHtml ? ' '+iconsHtml : ''}`;
    line2 = info.help
      ? `<span style="color:${boxText};">${info.name}</span> <span style="color:${boxDim};">${info.help}</span>`
      : `<span style="color:${boxText};">${info.name}</span>`;
    line3 = '';
  } else {
    const tanto = (info && info.tanto) || '';
    const isTantoConflict = tanto && multiTantoNames.has(tanto);
    const tantoHtml = tanto ? ` <span style="${isTantoConflict ? 'color:#e74c3c;font-weight:700;' : ''}">${normalizeStaffNamesInText(tanto)}</span>` : '';
    const leaveHtml = (info && info.leave && parseTimeText(info.leave)) ? ` <span style="color:${arrived?'#8b2f2f':'#e57373'};font-weight:700;">⏰${info.leave}</span>` : '';
    // 飲直転換後に卓移動していたら「元卓→現卓」の形で表示する
    const origTable = info && info.originalTableNum ? info.originalTableNum.toUpperCase().replace(/^P/, 'V') : '';
    const tableLabel = (origTable && origTable !== t) ? `${origTable}→${t}` : t;
    line1 = `<span style="font-weight:700;">${tableLabel}</span>${iconsHtml ? ' '+iconsHtml : ''}${tantoHtml}${leaveHtml}`;
    const subBits = [];
    // 卓状況のBOXでは、お客様名に混ぜて書かれた「新規」「初回RP」（🔰自動判定用の文言）は表示上取り除く
    if (info && info.name) subBits.push(`<span style="color:${boxText};">${formatGuestDisplayName(info.name.replace(/新規|初回リピート|初回RP/g, '').replace(/\s+/g, ' ').trim())}</span>`);
    if (info && info.help) subBits.push(`<span style="color:${boxDim};">H: ${info.help}</span>`);
    line2 = subBits.join(' ');
    // 飲直で出来た卓は、プラン情報を3行目に表示する
    line3 = (info && info.plan) ? `<span style="color:${boxDim};">飲直: ${info.plan}</span>` : '';
  }
  const isLeaveSoon = arrived && info && !info.isFirst && info.leave && isTimeOverdue(info.leave, 10);
  const finalBoxBg = isLeaveSoon ? '#c0392b' : boxBg;
  const finalBoxText = isLeaveSoon ? '#fff' : boxText;
  // 来店済みは今まで通りタップ・長押し両方、未来店はタップでの詳細確認だけできるようにする（備考等を事前に見られるように）
  const interactiveAttrs = arrived
    ? `onclick="if(_leaveEditHoldFired){_leaveEditHoldFired=false;return;}openTableDetailModal('${key}',${info && info.guestId != null ? info.guestId : 'null'})"
       oncontextmenu="event.preventDefault();openLeaveTimeQuickEdit('table','${key}',${info && info.guestId != null ? info.guestId : 'null'})"
       ontouchstart="startLeaveEditHold('table','${key}',${info && info.guestId != null ? info.guestId : 'null'})" ontouchend="cancelLeaveEditHold()" ontouchmove="cancelLeaveEditHold()"`
    : (info && !info.isFirst)
    ? `onclick="openTableDetailModal('${key}',${info.guestId != null ? info.guestId : 'null'})"`
    : '';
  const hasShareNote = arrived && info && info.shareNote;
  const line4 = hasShareNote ? `<div style="font-size:8.5px;line-height:1.3;font-weight:700;color:#ffd8c2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📢${info.shareNote}</div>` : '';
  return `<div ${interactiveAttrs}
    class="${hasShareNote ? 'share-note-glow' : ''}"
    style="cursor:${(arrived || (info && !info.isFirst))?'pointer':'default'};padding:3px 5px;border-radius:4px;border:1px solid ${isLeaveSoon?'#c0392b':(isFirst?'#2980b9':'#c9a84c')};background:${finalBoxBg};color:${finalBoxText};overflow:hidden;">
    <div style="font-size:10px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line1}</div>
    <div style="font-size:8.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line2}</div>
    ${line3 ? `<div style="font-size:8.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${line3}</div>` : ''}
    ${line4}
  </div>`;
}

function renderFloorStatus() {
  renderMyTodaySummary();
  updateTantoStats();
  const multiTantoNames = computeMultiTantoNames();
  const area = document.getElementById('floorStatusArea');
  if (!area) return;
  // 卓番→表示情報のマップを作成（通常ゲスト・初回グループ両対応）
  // 同じ卓に「予定報告の来店予定」と「今対応中の初回」が重なる場合、初回を優先表示する
  // （例：22時に予定の客がいても、19時に来た初回を同じ卓で先に対応しているケース）
  const infoMap = {}; // { "V1": [entry, entry, ...] } 同じ卓に複数ゲストがいる場合は全員分の配列で持つ
  (firstGroups || []).filter(g => g.tableNum).forEach(g => {
    // 全員が飲直に転換済みなら、もう「初回」ではなく実際のお客様として扱う（優先表示の対象から外す）
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => isFirstRowDone(r));
    if (allDone) return;
    const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
    if (!infoMap[key]) infoMap[key] = [];
    const count = parseInt(g.count) || 0;
    const photoNames = [...new Set((g.rows||[]).flatMap(r => [r.photo1, r.photo2]).filter(Boolean).map(n => normalizeStaffNamesInText(n)))];
    infoMap[key].push({ tanto: '', name: `初回${count ? count+'名' : ''}`, help: photoNames.length ? '写指:'+photoNames.join('/') : '', specials: [], isFirst: true, arrived: true });
  });
  // 通常ゲストは「来店済み」を優先して登録する。同じ卓に複数の来店済みゲストがいる場合は全員分表示する
  guests.filter(g => g.tableNum && !g.left && g.arrived).forEach(g => {
    const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
    if (!infoMap[key]) infoMap[key] = [];
    infoMap[key].push({
      tanto: g.tanto || '',
      name: (g.name || '').replace('△','').trim(),
      help: normalizeStaffNamesInText(g.help || ''),
      leave: g.leave || '',
      shareNote: g.shareNote || '',
      plan: g.plan || '',
      originalTableNum: g.originalTableNum || '',
      specials: g.specials || [],
      isFirst: false,
      arrived: true,
      guestId: g.id
    });
  });
  // 未来店の予定は、分かりにくいという意見があったため卓状況には表示しない（来店確認されて初めて表示される）

  // 【場内】欄から卓番ごとの場内指名を取得
  let baanaiText = '';
  try { baanaiText = localStorage.getItem('rj_baanai') || ''; } catch(e) {}
  const baanaiMap = parseBaanaiAssignments(baanaiText);

  // 特記事項アイコンの凡例（表示中の卓に1つでも使われていれば表示）
  const legendEl = document.getElementById('floorLegend');
  if (legendEl) {
    const usedKeys = new Set();
    Object.values(infoMap).forEach(entries => entries.forEach(info => (info.specials || []).forEach(k => usedKeys.add(k))));
    if (usedKeys.size) {
      legendEl.innerHTML = SPECIALS.filter(s => usedKeys.has(s.key))
        .map(s => `<span style="font-size:10px;color:var(--text-dim);">${s.icon}${s.label}</span>`).join('');
      legendEl.style.display = 'flex';
    } else {
      legendEl.style.display = 'none';
      legendEl.innerHTML = '';
    }
  }

  const floors = ['V','A','B'];
  area.innerHTML = floors.map(f => {
    const tables = floorData[f] || [];
    return `
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:4px;font-weight:700;">${f}フロア</div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          ${tables.map(t => {
            const key = t.toUpperCase();
            const entries = infoMap[key] || [];
            const baanaiName = baanaiMap[key];
            if (!entries.length && !baanaiName) {
              return `<div style="display:flex;align-items:center;font-size:10px;padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);">
                <span style="font-weight:700;">${t}</span>
              </div>`;
            }
            // 卓番が被って複数ゲストがいる場合は、その人数分だけBOXを並べる（卓一覧タブと同じ考え方）
            const list = entries.length ? entries : [null];
            return list.map(info => renderFloorBox(t, key, info, baanaiName, multiTantoNames)).join('');
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

// 卓状況の卓をタップした時に、全体タブ相当の詳細情報をポップアップ表示する
function openTableDetailModal(tableKey, guestId) {
  const active = guests.filter(g => !g.left);
  const guest = (guestId != null ? active.find(g => g.id === guestId) : null)
    || active.find(g => g.tableNum && g.tableNum.toUpperCase().replace(/^P/, 'V') === tableKey);
  const firstGroup = (firstGroups || []).find(g => {
    if (!g.tableNum || g.tableNum.toUpperCase().replace(/^P/, 'V') !== tableKey) return false;
    // 全員が飲直/終了済みのグループは、もう「初回」として扱わない（卓状況のBOX表示と同じ判定基準）
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => isFirstRowDone(r));
    return !allDone;
  });

  let baanaiText = '';
  try { baanaiText = localStorage.getItem('rj_baanai') || ''; } catch(e) {}
  const baanaiMap = parseBaanaiAssignments(baanaiText);
  const baanaiName = baanaiMap[tableKey];

  let modal = document.getElementById('tableDetailModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'tableDetailModal';
    document.body.appendChild(modal);
  }

  let bodyHtml = '';
  if (guest) {
    const specialIcons = (guest.specials || []).map(k => {
      const s = SPECIALS.find(x => x.key === k);
      return s ? `<span style="font-size:20px;margin-right:4px;" title="${s.label}">${s.icon}</span>` : '';
    }).join('');
    const rows = [
      ['担当', normalizeStaffNamesInText(guest.tanto)],
      ['お客様名', formatGuestDisplayName(guest.name)],
      ['来店時間', guest.arrive],
      ['退店時間', guest.leave],
      ['予算', guest.budget],
      ['ヘルプ', normalizeStaffNamesInText(guest.help)],
      ['備考', guest.note],
      ['📢 共有事項', guest.shareNote],
      ['アイバン', guest.aiban],
      ['場内指名', baanaiName],
    ].filter(([,v]) => v);
    const canEdit = canEditTable(guest);
    const actionButtons = !canEdit
      ? ''
      : guest.arrived
      ? `<button class="btn btn-ghost" onclick="document.getElementById('tableDetailModal').classList.remove('show');confirmToggleLeft(${guest.id})" style="flex:1;color:var(--text-dim);">退店にする</button>`
      : `<button class="btn btn-primary" onclick="document.getElementById('tableDetailModal').classList.remove('show');toggleArrived(${guest.id})" style="flex:1;">来店にする</button>
         <button class="btn btn-ghost" onclick="document.getElementById('tableDetailModal').classList.remove('show');confirmDelete(${guest.id})" style="flex:1;color:#c0392b;border-color:#c0392b;">予約をキャンセル</button>`;
    bodyHtml = `
      ${specialIcons ? `<div style="margin-bottom:10px;">${specialIcons}</div>` : ''}
      ${!guest.arrived ? `<div style="font-size:11px;color:#e67e22;margin-bottom:10px;">⚠ まだ来店確認されていません</div>` : ''}
      ${rows.map(([label, val]) => `
        <div style="display:flex;padding:7px 0;border-bottom:1px solid var(--border);">
          <div style="width:80px;flex-shrink:0;font-size:11px;color:var(--text-dim);">${label}</div>
          <div style="font-size:13px;color:${label==='📢 共有事項' ? '#e74c3c' : 'var(--text)'};font-weight:${label==='📢 共有事項' ? '700' : '400'};">${val}</div>
        </div>`).join('')}
      ${!canEdit ? `<div style="font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center;">※この卓の担当者のみ編集できます</div>` : `
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-ghost" onclick="document.getElementById('tableDetailModal').classList.remove('show');openSpecialModal(${guest.id})" style="flex:1;">特記事項を編集</button>
        ${actionButtons}
      </div>`}
    `;
  } else if (firstGroup) {
    const count = parseInt(firstGroup.count) || 0;
    const rowsHtml = (firstGroup.rows || []).map(r => {
      const bits = [];
      if (r.seat) bits.push('席:' + r.seat);
      if (r.photo1) bits.push('写真①:' + normalizeStaffNamesInText(r.photo1));
      if (r.photo2) bits.push('写真②:' + normalizeStaffNamesInText(r.photo2));
      if (r.okuri) bits.push('送り:' + normalizeStaffNamesInText(r.okuri));
      if (r.nominaoshi) bits.push('飲直:' + r.nominaoshi);
      if (r.plan) bits.push('プラン:' + r.plan);
      return `<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);">${bits.join(' ／ ') || '（未入力）'}</div>`;
    }).join('');
    bodyHtml = `
      <div style="font-size:13px;color:#f0c040;font-weight:700;margin-bottom:8px;">初回 ${count}名</div>
      ${rowsHtml || '<div style="color:var(--text-dim);font-size:12px;">詳細未入力</div>'}
      ${baanaiName ? `<div style="margin-top:10px;font-size:12px;color:var(--text-dim);">場内指名: ${baanaiName}</div>` : ''}`;
  } else if (baanaiName) {
    bodyHtml = `<div style="font-size:13px;color:var(--text);">場内指名: ${baanaiName}</div>`;
  } else {
    bodyHtml = `<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0;">この卓の詳細情報はありません</div>`;
  }

  modal.innerHTML = `
    <div class="modal" style="max-width:340px;">
      <div class="modal-header">
        <span>${tableKey}卓 詳細</span>
        <button onclick="document.getElementById('tableDetailModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
    </div>`;
  modal.classList.add('show');
}
