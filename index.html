// ===== 初回タブ =====
// groups: [{id, count, tableNum, rows:[{id,seat,photo1,photo2,okuri,nominaoshi,plan}]}]
function loadFirstData() {
  try {
    const raw = localStorage.getItem('rj_firstData');
    if (raw) {
      const parsed = JSON.parse(raw);
      firstGroups = Array.isArray(parsed) ? parsed : [];
      if (firstGroups.length) {
        firstGid = firstGroups.reduce((m,g)=>Math.max(m,(g.id||0)+1),1);
        firstGroups.forEach(g => {
          if (Array.isArray(g.rows)) {
            g.rows.forEach(r => { firstRid = Math.max(firstRid, (r.id||0)+1); });
          } else {
            g.rows = [];
          }
        });
      }
    }
  } catch(e) { firstGroups = []; }
}

function saveFirstData() {
  try { localStorage.setItem('rj_firstData', JSON.stringify(firstGroups)); } catch(e) {}
  // Firebase: 各初回グループを個別のパスに書き込む（全体を丸ごと上書きしないので、他端末の変更と衝突しにくい）
  if (window.fbSaveFirstGroup) {
    firstGroups.forEach(g => window.fbSaveFirstGroup(g));
  }
  if (window.fbRemoveFirstGroup && window._fbFirstGroups) {
    const currentIds = new Set(firstGroups.map(g => g.id));
    window._fbFirstGroups.forEach(g => {
      if (g && g.id != null && !currentIds.has(g.id)) window.fbRemoveFirstGroup(g.id);
    });
  }
}

function addFirstRow() {
  if (localStorage.getItem('rj_role') !== 'admin') { showToast('この操作は内勤のみ可能です'); return; }
  firstGroups.push({ id: firstGid++, count:'', tableNum:'', rows:[{id:firstRid++,seat:'',photo1:'',photo2:'',okuri:'',nominaoshi:'',plan:''}] });
  saveFirstData();
  renderFirstTab();
}

function clearFirstData() {
  if (localStorage.getItem('rj_role') !== 'admin') { showToast('この操作は内勤のみ可能です'); return; }
  let overlay = document.getElementById('deleteOverlay');
  if (!overlay) { overlay = document.createElement('div'); overlay.id='deleteOverlay'; overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;'; document.body.appendChild(overlay); }
  overlay.innerHTML = `<div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:24px;max-width:300px;width:100%;text-align:center;">
    <div style="font-size:14px;color:#f0ece0;margin-bottom:16px;">初回データを全て消去しますか？</div>
    <div style="display:flex;gap:10px;">
      <button onclick="document.getElementById('deleteOverlay').style.display='none'" style="flex:1;padding:10px;background:transparent;border:1px solid #555;border-radius:6px;color:#888;font-size:13px;cursor:pointer;">キャンセル</button>
      <button onclick="document.getElementById('deleteOverlay').style.display='none';doClearFirstData();" style="flex:1;padding:10px;background:#c0392b;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">消去</button>
    </div>
  </div>`;
  overlay.style.display='flex';
}

function doClearFirstData() {
  const backup = JSON.parse(JSON.stringify(firstGroups));
  const backupGid = firstGid, backupRid = firstRid;
  firstGroups = [];
  firstGid = 1;
  firstRid = 1;
  saveFirstData();
  renderFirstTab();
  showToast('消去しました');
  offerUndo('初回データを消去しました', () => {
    firstGroups = backup;
    firstGid = backupGid;
    firstRid = backupRid;
    saveFirstData();
    renderFirstTab();
  });
}

// 初回の1行が「対応完了」扱いかどうか判定する（飲直になった、または終了フラグが立っている）
function isFirstRowDone(r) {
  return !!((r.nominaoshi && r.nominaoshi.trim() !== '') || r.ended);
}

function renderFirstTab() {
  const tbody = document.getElementById('firstTableBody');
  if (!tbody) return;
  if (!Array.isArray(firstGroups)) firstGroups = [];
  const MAX_GROUPS = 20;
  let rows = '';
  let noCounter = 1;

  // グループを描画
  firstGroups.forEach(g => {
    const count = parseInt(g.count) || 1;
    const rowspan = count > 1 ? ` rowspan="${count}"` : '';
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => isFirstRowDone(r));
    g.rows.forEach((r, ri) => {
      const isDone = isFirstRowDone(r);
      const doneStyle = isDone ? 'background:#d4edda;color:#555;' : '';
      rows += `<tr id="fr-${r.id}" oncontextmenu="event.preventDefault();deleteFirstGroup(${g.id})"
          ontouchstart="startHold2(${g.id})" ontouchend="cancelHold()" ontouchmove="cancelHold()">`;
      if (ri === 0) {
        rows += `<td style="text-align:center;color:#c9a84c;font-size:12px;font-weight:700;${allDone?'background:#d4edda;':''}"${rowspan}>${noCounter}</td>`;
        const countLabel = g.isEda ? `枝${g.count||''}名` : (g.count ? `${g.count}名` : '-');
        rows += `<td${rowspan} style="${allDone?'background:#d4edda;':''}">
          <div onclick="event.stopPropagation();openCountPicker(${g.id}, this)" style="width:100%;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font-main);font-size:12px;padding:5px 2px;cursor:pointer;">${countLabel}</div>
        </td>`;
        rows += `<td${rowspan} style="${allDone?'background:#d4edda;':''}">
          <div class="editable" onclick="editFirstGroup(${g.id},'tableNum',this)" style="font-weight:700;color:var(--accent);padding:2px 0;">${g.tableNum||''}</div>
          ${g.isEda ? `<div onclick="event.stopPropagation();editFirstGroup(${g.id},'edaReferrer',this)" style="font-size:10px;color:#f0c040;border-top:1px solid var(--border);padding-top:2px;margin-top:2px;cursor:pointer;">枝:${g.edaReferrer ? g.edaReferrer : '未入力'}</div>` : ''}
        </td>`;
      }
      rows += `<td style="${doneStyle}">
        <div onclick="event.stopPropagation();openSeatPicker(${g.id},${r.id}, this)" style="width:100%;text-align:center;background:${isDone?'#d4edda':'var(--surface2)'};border:1px solid var(--border);border-radius:4px;color:${isDone?'#555':'var(--text)'};font-family:var(--font-main);font-size:12px;padding:5px 2px;cursor:pointer;">${r.seat || '-'}</div>
      </td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo1',this)" style="${doneStyle}">${normalizeStaffNamesInText(r.photo1||'')}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo2',this)" style="${doneStyle}">${normalizeStaffNamesInText(r.photo2||'')}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'okuri',this)" style="${isDone?'background:#d4edda;color:#555;':''}">${normalizeStaffNamesInText(r.okuri||'')}</td>`;
      const nomiDone = isFirstRowDone(r);
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'nominaoshi',this)" style="${nomiDone?'background:#d4edda;color:#000;':''}">${r.nominaoshi||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'plan',this)" style="${nomiDone?'background:#d4edda;color:#555;':''}">${r.plan||''}</td>`;
      rows += `<td style="text-align:center;${doneStyle}">
        <span onclick="event.stopPropagation();toggleFirstRowEnded(${g.id},${r.id})" style="cursor:pointer;font-size:16px;color:${r.ended?'#c0392b':'#ccc'};user-select:none;">${r.ended ? '✕' : '○'}</span>
      </td>`;
      rows += '</tr>';
    });
    noCounter++;
  });

  // 空行を20まで埋める
  const remaining = MAX_GROUPS - firstGroups.length;
  for (let i = 0; i < remaining; i++) {
    rows += `<tr><td style="text-align:center;color:#555;font-size:11px;">${noCounter++}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
  }

  tbody.innerHTML = rows;

  // 統計表示更新
  const statsEl = document.getElementById('firstStats');
  if (statsEl) {
    const total = firstGroups.reduce((s,g) => s + (parseInt(g.count)||0), 0);
    const current = firstGroups.reduce((s,g) => {
      const cnt = parseInt(g.count)||0;
      const rowCnt = (g.rows||[]).length || 1;
      const doneRows = (g.rows||[]).filter(r => isFirstRowDone(r)).length;
      return s + Math.round(cnt * (rowCnt - doneRows) / rowCnt);
    }, 0);
    statsEl.innerHTML = total > 0
      ? `初回数 現在<span style="color:var(--accent);font-weight:700;">${current}名</span>／トータル<span style="font-weight:700;">${total}名</span>`
      : '';
  }
}

// ===== ミニピッカー（<select>のiOS崩れ回避のため、独自の軽量ドロップダウンを使う） =====
let _inlinePickerCallback = null;

function openCountPicker(gid, anchorEl) {
  if (localStorage.getItem('rj_role') !== 'admin') { showToast('この操作は内勤のみ可能です'); return; }
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const options = [
    { value: '', label: '-' },
    { value: '1', label: '1名' },
    { value: '2', label: '2名' },
    { value: '3', label: '3名' },
    { value: 'eda-1', label: '枝1名' },
    { value: 'eda-2', label: '枝2名' },
    { value: 'eda-3', label: '枝3名' },
  ];
  const currentVal = g.isEda ? ('eda-' + g.count) : (g.count || '');
  renderInlinePicker(anchorEl, options, currentVal, (val) => { onCountChange(gid, val); });
}

function openSeatPicker(gid, rid, anchorEl) {
  if (localStorage.getItem('rj_role') !== 'admin') { showToast('この操作は内勤のみ可能です'); return; }
  const g = firstGroups.find(x => x.id === gid);
  const r = g ? (g.rows || []).find(x => x.id === rid) : null;
  const options = [
    { value: '', label: '-' },
    { value: '左', label: '左' },
    { value: '中', label: '中' },
    { value: '右', label: '右' },
  ];
  const currentVal = r ? (r.seat || '') : '';
  renderInlinePicker(anchorEl, options, currentVal, (val) => { updateFirstRow(gid, rid, 'seat', val); });
}

function renderInlinePicker(anchorEl, options, currentVal, onSelect) {
  closeInlinePicker();
  cancelHold();
  _inlinePickerCallback = onSelect;
  const picker = document.createElement('div');
  picker.id = 'inlinePicker';
  picker.style.cssText = 'position:fixed;z-index:300;background:#e8e8e8;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.4);min-width:72px;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;';
  picker.innerHTML = options.map((opt, i) => `
    <div onclick="event.stopPropagation();_inlinePickerCallback('${opt.value}');closeInlinePicker();"
      style="padding:10px 14px;font-size:13px;color:${opt.value===currentVal?'#8a6d1a':'#333'};font-weight:${opt.value===currentVal?'700':'400'};cursor:pointer;white-space:nowrap;${i<options.length-1?'border-bottom:1px solid #ccc;':''}">${opt.label}</div>
  `).join('');
  document.body.appendChild(picker);
  const rect = anchorEl.getBoundingClientRect();
  const pickerHeight = Math.min(picker.offsetHeight, 240);
  const spaceBelow = window.innerHeight - rect.bottom;
  const spaceAbove = rect.top;
  let top;
  if (spaceBelow >= pickerHeight + 8 || spaceBelow >= spaceAbove) {
    // 下に十分な余白があれば下向きに開く
    top = rect.bottom + 4;
  } else {
    // 下が狭ければ上向きに開く
    top = Math.max(8, rect.top - pickerHeight - 4);
  }
  const left = Math.min(rect.left, window.innerWidth - 90);
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';
  setTimeout(() => { document.addEventListener('click', closeInlinePickerOnce); }, 0);
}

function closeInlinePickerOnce() {
  closeInlinePicker();
  document.removeEventListener('click', closeInlinePickerOnce);
}

function onCountChange(gid, val) {
  if (localStorage.getItem('rj_role') !== 'admin') { showToast('この操作は内勤のみ可能です'); return; }

  if (!g) return;

  g.count = countStr;
  g.isEda = isEda;
  if (!isEda) g.edaReferrer = ''; // 枝でなくなったら紹介元情報はクリア
  // 行数を調整
  while (g.rows.length < newCount) g.rows.push({id:firstRid++,seat:'',photo1:'',photo2:'',okuri:'',nominaoshi:'',plan:''});
  while (g.rows.length > newCount) g.rows.pop();
  // 席位置を自動設定
  const seatMap = {1:[''], 2:['左','右'], 3:['左','中','右']};
  const seats = seatMap[newCount] || g.rows.map(()=>'');

}

function updateFirstRow(gid, rid, field, val) {

function syncNominaoshiToTable(g, r) {
  const key = `first_${g.id}_${r.id}`;
  const nomi = (r.nominaoshi || '').trim();
  // 飲直がない or「なし」の場合は卓一覧から削除
  if (!nomi || nomi === 'なし') {
    guests = guests.filter(x => x.firstKey !== key);
    saveToStorage();
    renderTables();
    renderFloorStatus();
    return;
  }
  const noteStr = ['飲直', r.plan ? r.plan.trim() : ''].filter(Boolean).join(' ');
  const isPlanC = detectPlanCKeyword(r.plan || '') || detectPlanCKeyword(noteStr);
  const existing = guests.find(x => x.firstKey === key);
  if (existing) {
    existing.tableNum = g.tableNum || '';
    existing.tanto = r.okuri || '';
    existing.name = nomi;
    existing.note = noteStr;
    existing.plan = r.plan ? r.plan.trim() : '';
    existing.arrived = true;
    if (isPlanC) existing.leave = calcLeaveTimeFromNow(60);
    if (!existing.specials) existing.specials = [];
    if (!existing.specials.includes('new')) existing.specials.push('new'); // 飲直で出来た卓は自動で🔰マーク
    syncEventSpecialFromTanto(existing);
  } else {
    const newGuest = {
      id: nextId++,
      rowNum: '999', // 仮番号、repackRowNumsで整理
      tableNum: g.tableNum || '',
      originalTableNum: g.tableNum || '', // 飲直転換時の卓番（後で卓移動しても、ここは変えない）
      tanto: r.okuri || '',
      name: nomi,
      note: noteStr,
      plan: r.plan ? r.plan.trim() : '',
      arrive: '', leave: '', budget: '', help: '',
      arrived: true,
      specials: ['new'], // 飲直で出来た卓は自動で🔰マーク
      firstKey: key
    };
    if (isPlanC) newGuest.leave = calcLeaveTimeFromNow(60);
    syncEventSpecialFromTanto(newGuest);
    guests.push(newGuest);
  }
  repackRowNums();
  saveToStorage();
  renderTables();
  renderFloorStatus();
  // 飲直転換で卓が確定した際、その卓に別の予約が重複していないか確認する（アイバンは正常な重複として除外）
  checkNominaoshiTableConflict(g, r, key);
}

// 飲直に転換した卓が、既に別の予約（アイバンでない）で埋まっていないか確認して警告する
function checkNominaoshiTableConflict(g, r, firstKey) {
  if (!g.tableNum) return;
  const targetKey = g.tableNum.toUpperCase().replace(/^P/, 'V');
  const conflictGuest = guests.find(other => {
    if (other.left || other.firstKey === firstKey) return false;
    if (!other.tableNum) return false;
    if (other.tableNum.toUpperCase().replace(/^P/, 'V') !== targetKey) return false;
    return true;
  });
  if (conflictGuest) {
    // アイバンで意図的に同卓の場合は正常なので警告しない
    const conflictAibanPartner = conflictGuest.aiban ? findAibanPartner(conflictGuest) : null;
    const isAibanPair = conflictAibanPartner && guests.some(x => x.firstKey === firstKey && x.id === conflictAibanPartner.id);
    if (isAibanPair) return;
    showToast(`⚠ ${g.tableNum}卓は${formatGuestDisplayName(conflictGuest.name)}の予約と重複しています。卓の再配置をご確認ください`);
  }
}

// 枝以外の初回が、既に別の予定客（アイバンでない）と同じ卓になっていないか確認して警告する
// 枝タイプの初回は既存客と同卓になるのが正常なので対象外
function checkFirstGroupTableConflict(g) {
  if (!g.tableNum || g.isEda) return;
  const targetKey = g.tableNum.toUpperCase().replace(/^P/, 'V');
  const conflictGuest = guests.find(other => {
    if (other.left || !other.tableNum || !other.arrived) return false; // 来店確認前の予約は「空いている」扱い
    return other.tableNum.toUpperCase().replace(/^P/, 'V') === targetKey;
  });
  if (conflictGuest) {
    showToast(`⚠ ${g.tableNum}卓は既存客(${formatGuestDisplayName(conflictGuest.name)})と重複しています。記入ミスの可能性があります`);
  }
}

// ===== 場内 =====
// 「ひろきA4」のような場内メモを解析し、卓番→キャスト名のマップを作る
// キャスト名（呼び名含む）を先頭から最長一致で判定し、残り文字列が実在する卓番と一致すれば採用する
function parseBaanaiAssignments(text) {
  const result = {};
  if (!text) return result;
  const aliasIndex = buildAliasIndex();
  const allTables = new Set([
    ...(floorData.V || []), ...(floorData.A || []), ...(floorData.B || [])
  ].map(t => t.toUpperCase()));
  const tokens = text.split(/[\s,、,\/]+/).map(s => s.trim()).filter(Boolean);
  tokens.forEach(token => {
    const normToken = toHiragana(token);
    const match = aliasIndex.find(entry => normToken.startsWith(entry.norm));
    if (!match) return;
    const remainder = token.slice(match.text.length).toUpperCase().replace(/^P/, 'V');
    if (allTables.has(remainder)) {
      result[remainder] = match.name;
    }
  });
  return result;
}

// ===== RENDER VIEW =====
// 卓番ソート: V・P（同フロア）→A→B→その他、番号順
function tableNumSort(a, b) {
  const getGroup = (t) => {
    if (!t) return 9;
    const p = t[0].toUpperCase();
    if (p === 'V' || p === 'P') return 0; // VとPは同グループ
    if (p === 'A') return 1;
    if (p === 'B') return 2;
    return 9;
  };
  const numA = parseInt((a.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const numB = parseInt((b.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const groupA = getGroup(a.tableNum);
  const groupB = getGroup(b.tableNum);
  if (groupA !== groupB) return groupA - groupB;
  return numA - numB;
}

// 来店済みで2卓以上を担当している「被り」の担当者名一覧を取得する（卓状況のBOX等でも使う）
function computeMultiTantoNames() {
  const active = guests.filter(g => !g.left);
  const tantoCount = {};
  active.filter(g => g.tanto && g.tableNum && g.arrived).forEach(g => {
    tantoCount[g.tanto] = (tantoCount[g.tanto] || 0) + 1;
  });
  return new Set(Object.entries(tantoCount).filter(([,n]) => n >= 2).map(([name]) => name));
}

// 担当者別の卓数集計（2卓以上の「被り」を検出する）。予定報告タブ・全体タブ両方から呼べるよう独立させる
function updateTantoStats() {
  const multiTantoNames = computeMultiTantoNames();
  const multiTanto = [...multiTantoNames].map(name => {
    const active = guests.filter(g => !g.left);
    const count = active.filter(g => g.tanto === name && g.tableNum && g.arrived).length;
    return [name, count];
  });
  const tantoStatsEl = document.getElementById('tantoStats');
  if (tantoStatsEl) {
    tantoStatsEl.innerHTML = multiTanto.length
      ? `<span style="color:var(--text-dim);margin-right:6px;">【被り】</span>` + multiTanto.map(([name, n]) => `<span style="margin-right:10px;"><span style="color:var(--accent);">${name}</span><span style="color:#e74c3c;font-weight:700;">${n}</span></span>`).join('')
      : '';
    tantoStatsEl.style.display = multiTanto.length ? 'block' : 'none';
    updateFixedTop(); setTimeout(updateFixedTop, 50);
  }
}

function renderView() {
  const container = document.getElementById('viewList');

  // 担当者別卓数集計（被り表示）
  updateTantoStats();

  // 全卓をV→A→Bの順に並べて表示

  // 卓番→ゲストのマップ

  active.forEach(g => {

    </div>`;
  }

  // 卓番→ゲスト複数対応のマップ（全体タブは「今、実際に店内にいる人」を表示するため、来店確認済みのみ対象）
  const tableMapMulti = {};
  active.filter(g => g.arrived).forEach(g => {
    if (g.tableNum) {
      const key = g.tableNum.toUpperCase().replace(/^P/, 'V');
      if (!tableMapMulti[key]) tableMapMulti[key] = [];
      tableMapMulti[key].push({ type: 'guest', data: g });

  // 初回グループも追加（全員が飲直に転換済みのグループは、もう実際のゲストとして別枠で表示されるので除外）
  (firstGroups||[]).forEach(g => {
    if (!g.tableNum) return;

function toggleSpecial(id, key) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  if (!g.specials) g.specials = [];
  const turningOn = !g.specials.includes(key);
  if (turningOn) {
    g.specials.push(key);
  } else {
    g.specials = g.specials.filter(k => k !== key);
  }
  // 主役アイコンは「その担当者の卓すべて」に付くものなので、同じ担当者の他の卓にも自動で連動させる
  if (key === 'event' && g.tanto) {
    const tantoNorm = toHiragana(g.tanto.trim());
    guests.forEach(other => {
      if (other.id === g.id || other.left || !other.tanto) return;
      if (toHiragana(other.tanto.trim()) !== tantoNorm) return;
      if (!other.specials) other.specials = [];
      if (turningOn) {
        if (!other.specials.includes('event')) other.specials.push('event');
      } else {
        other.specials = other.specials.filter(k => k !== 'event');
      }
    });
    // 本日一度でも主役が付いた担当者として記録しておくと、後から来店する同担当者のお客様にも自動で付く。
    // 手動でOFFにした場合（付け間違いの訂正等）は、この「本日の記録」も一緒に取り消す
    if (turningOn) {
      markEventTantoToday(g.tanto);
    } else {
      unmarkEventTantoToday(g.tanto);
    }
  }
  saveToStorage();
  openSpecialModal(id); // モーダル更新
  renderView();
  if (window.renderFloorStatus) window.renderFloorStatus();
}

// ===== STATS =====
function updateStats() {
  const active = guests.filter(g => (g.name || g.tanto || g.tableNum) && g.name !== '体入');
  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statArrived').textContent = active.filter(g => g.arrived).length;
  updateTableStats();
}

function updateTableStats() {
  // 体入は「予定卓数」「現状」の集計対象外（お客様ではないため）
  const withData = guests.filter(g => (g.name || g.tanto) && g.name !== '体入');
  // 予定卓数 = 実際にデータが入っている件数（行番号に隙間があっても正確に数える）
  const maxRow = withData.length;
  // △の件数（来店済みは除外）
  const deltaCount = withData.filter(g => g.name && g.name.includes('△') && !g.arrived).length;
  const arrivedCount = withData.filter(g => g.arrived).length;
  // 初回人数集計
  const allRows = firstGroups.reduce((arr, g) => arr.concat(g.rows||[]), []);
  const firstTotal = firstGroups.reduce((sum, g) => sum + (parseInt(g.count)||0), 0);
  const firstCurrent = firstGroups.reduce((sum, g) => {
    return sum + (g.rows||[]).reduce((s, r) => s + (isFirstRowDone(r) ? 0 : (parseInt(g.count)||0) / (g.rows||[1]).length), 0);
  }, 0);
  const firstCurrentInt = Math.round(firstCurrent);
  // 飲直の件数（初回タブから飲直転換された卓。備考欄が「飲直」から始まるもので判定）
  const nomiCount = guests.filter(g => g.note && g.note.trim().startsWith('飲直')).length;

  const statsHtml = `<span style="font-size:14px;white-space:nowrap;">予定卓数 <span style="color:var(--accent);font-weight:700;">${maxRow}卓</span><span style="color:var(--text-dim);">（△<span style="color:#e74c3c;font-weight:700;">${deltaCount}</span>）</span>&nbsp;&nbsp;現状 <span style="color:#2ecc71;font-weight:700;">${arrivedCount}卓</span>&nbsp;&nbsp;初回 現在<span style="color:var(--accent);font-weight:700;">${firstCurrentInt}名</span>／<span style="color:var(--text-dim);font-weight:700;">${firstTotal}名</span>&nbsp;&nbsp;飲直 <span style="color:var(--accent);font-weight:700;">${nomiCount}件</span></span>`;
  // 固定バーに反映
  const fixedEl = document.getElementById('fixedStats');
  if (fixedEl) {
    fixedEl.innerHTML = statsHtml;
    fixedEl.style.display = 'block';
    updateFixedTop(); setTimeout(updateFixedTop, 50);
  }
}

// ===== STORAGE =====
function saveToStorage() {
  // 保存前に空行を除去
  guests = guests.filter(g => g.name || g.tanto || g.tableNum);
  repackRowNums();
  try { localStorage.setItem('tableManager_guests', JSON.stringify(guests)); } catch(e) {}
  // Firebase: 各ゲストを個別のパスに書き込む（全体を丸ごと上書きしないので、他端末の変更と衝突しにくい）
  if (window.fbSaveGuest) {
    guests.forEach(g => window.fbSaveGuest(g));
  }
  // 直近でFirebaseから受信していた一覧と比較し、ローカルから消えたものだけを個別に削除する
  if (window.fbRemoveGuest && window._fbGuests) {
    const currentIds = new Set(guests.map(g => g.id));
    window._fbGuests.forEach(g => {

// 予定報告タブの空きスペースに、ログイン中のキャスト本人の本日の予定を一覧表示する
function renderMyTodaySummary() {
  const el = document.getElementById('myTodaySummary');
  if (!el) return;
  const role = localStorage.getItem('rj_role');
  if (role !== 'host') { el.innerHTML = ''; return; }
  const me = getMyIdentity();
  if (!me) { el.innerHTML = ''; return; }
  const myNorm = toHiragana(me.trim());
  const myGuests = guests
    .filter(g => {
      if (g.left || !g.tanto) return false;
      const tantoNorm = toHiragana(g.tanto.trim());
      return tantoNorm === myNorm || tantoNorm.includes(myNorm) || myNorm.includes(tantoNorm);
    })
    .sort((a, b) => Number(a.rowNum || 0) - Number(b.rowNum || 0));

  if (!myGuests.length) {
    el.innerHTML = `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text-dim);font-size:12px;text-align:center;">本日の予定はまだありません</div>`;

      <span style="color:var(--accent);font-weight:700;min-width:44px;font-size:12px;">${g.tableNum || (i + 1) + '件目'}</span>

function confirmDeleteMyReservation(id) {
  const g = guests.find(x => x.id === id);

function doDeleteMyReservation(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  if (!canEditTable(g)) { showToast('自分の担当分のみ削除できます'); return; }
  const backup = JSON.parse(JSON.stringify(g));
  const label = formatGuestDisplayName(g.name);
  guests = guests.filter(x => x.id !== id);
  repackRowNums();
  saveToStorage();
  if (window.fbRemoveGuest) window.fbRemoveGuest(id);
  renderTables();
  renderFloorStatus();
  renderMyTodaySummary();
  openMyReportsModal();
  showToast('削除しました');
  offerUndo(`「${label}」を削除しました`, () => {
    guests.push(backup);
    repackRowNums();
    saveToStorage();
    renderTables();
    renderFloorStatus();
    renderMyTodaySummary();
  });
}

function renderAliasModalContent() {
  const modal = document.getElementById('aliasModal');
  if (!modal || !_currentAliasStaff) return;
  const name = _currentAliasStaff;
  const aliases = staffAliases[name] || [];
  const chips = aliases.length
    ? aliases.map(a => `
        <span style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:4px 6px 4px 12px;font-size:12px;margin:3px 4px 3px 0;">

  modal.innerHTML = `

        </div>

    </div>`;

function addAlias() {
  if (!_currentAliasStaff) return;
  const input = document.getElementById('aliasInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  if (!staffAliases[_currentAliasStaff]) staffAliases[_currentAliasStaff] = [];
  if (!staffAliases[_currentAliasStaff].includes(val)) {
    staffAliases[_currentAliasStaff].push(val);
    saveAliases(_currentAliasStaff);
  }
  input.value = '';
  renderAliasModalContent();
  // 入力を続けやすいようフォーカスを戻す
  setTimeout(() => { const el = document.getElementById('aliasInput'); if (el) el.focus(); }, 0);
}

function removeAlias(alias) {
  if (!_currentAliasStaff || !staffAliases[_currentAliasStaff]) return;
  staffAliases[_currentAliasStaff] = staffAliases[_currentAliasStaff].filter(a => a !== alias);
  saveAliases(_currentAliasStaff);
  renderAliasModalContent();
}

  const modal = document.getElementById('aliasModal');

  _currentAliasStaff = null;
}

// 今日の日付キー（YYYY-MM-DD、ローカル時刻基準）
// 営業日の基準日付を取得する（深夜0時ではなく朝6時を区切りとする）
// 深夜0時〜5時台にリセットしても、その営業を開始した日の実績として記録されるようにする
function getTodayKey() {
  const now = new Date();
  const businessDate = new Date(now);
  if (now.getHours() < 6) {
    businessDate.setDate(businessDate.getDate() - 1);
  }
  const y = businessDate.getFullYear();
  const m = String(businessDate.getMonth() + 1).padStart(2, '0');
  const d = String(businessDate.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ===== 本日の集計 =====

// お客様名を表示用に整形する（△を除去し、「様」を正しい位置に付ける）
// 「ひな+枝」のような「+枝」表記は、本来の名前より後ろに来るよう「ひな様+枝」の形にする
function formatGuestDisplayName(rawName) {
  const name = (rawName || '').replace('△','').trim();
  if (!name) return '';
  if (name === '体入') return name; // 体入はお客様ではないので「様」を付けない
  // 「+枝」「+同業」のように、本来の名前より後ろに来るべき接尾語（今後増えたらここに追加する）
  const m = name.match(/^(.*?)\s*[+＋]\s*(枝|同業)\s*$/);
  if (m && m[1].trim()) {
    return `${m[1].trim()}様+${m[2]}`;
  }
  return `${name}様`;
}

// ===== 時刻の解析・経過判定（来店時間・退店時間の自由入力から数字を拾う） =====
// 「21:00」「22時」「22時ごろ」のような表記から時刻を抽出する。「同伴」「未定」等は解析できず null を返す
function parseTimeText(text) {
  if (!text) return null;
  const m = String(text).match(/(\d{1,2})[:時](\d{0,2})/);
  if (!m) return null;
  const hour = parseInt(m[1]);
  const minute = m[2] ? parseInt(m[2]) : 0;
  // 深夜営業では「24時」「25時」のような表記も使われるため、29時までは有効な時刻として扱う
  if (isNaN(hour) || hour > 29 || minute > 59) return null;
  return { hour, minute };
}

// 深夜営業を考慮し、17時を「営業日の始まり」とした通し分数に変換する
// （深夜1時は22時より"後"として正しく比較できるようにする）
function toShiftMinutes(hour, minute) {
  let h = hour;
  if (h < 6) h += 24; // 深夜0時〜5時台だけを「前日の続き」として後ろに回す（日中の時間帯まで巻き込まないように）
  return h * 60 + minute;
}

// 指定した時刻テキストが、現在時刻から見て「経過済み」かどうか判定する
// thresholdMinutesBefore を指定すると「その分数前から経過扱い」にできる（例：退店10分前から警告）
function isTimeOverdue(timeText, thresholdMinutesBefore = 0) {
  const t = parseTimeText(timeText);
  if (!t) return false;
  const now = new Date();
  const nowShift = toShiftMinutes(now.getHours(), now.getMinutes());
  const targetShift = toShiftMinutes(t.hour, t.minute) - thresholdMinutesBefore;
  return nowShift >= targetShift;
}

// カタカナをひらがなに変換する（呼び名の表記ゆれ吸収用）
// 全角カタカナ(U+30A1-U+30F6)は対応するひらがな(U+3041-U+3096)に1文字ずつ変換される（文字数は変わらない）
function toHiragana(str) {
  return (str || '').replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}

// テキストの先頭から、登録済みの呼び名（長い順）でどのスタッフかを判定する
// 例："なるとあ" -> "なると"(成) を先にマッチ、残り"あ" -> "あい"は長さ不足で不一致 のように貪欲に処理
function buildAliasIndex() {
  // [{ text: "なると", norm: "なると", name: "成" }, ...] を文字列長の降順で並べる（本名自体もエイリアスとして含める）
  // normはひらがな正規化済みテキスト。カタカナで入力されても同じ呼び名として拾えるようにする
  const index = [];
  staffList.forEach(name => {
    index.push({ text: name, norm: toHiragana(name), name });
    (staffAliases[name] || []).forEach(a => {
      if (a) index.push({ text: a, norm: toHiragana(a), name });
    });
  });
  index.sort((a, b) => b.text.length - a.text.length);
  return index;
}

// ヘルプ欄などの自由入力テキストから、含まれるスタッフ名を貪欲マッチで抽出する
function extractStaffNames(text, aliasIndex) {
  const found = [];
  let remaining = (text || '').replace(/[\/,、,・\s]+/g, ' ').trim();
  if (!remaining) return found;
  // まず区切り文字ベースで分割してから、各断片の全開始位置をチェックする
  // （呼び名同士が文字を共有していても両方拾えるよう、消費せず1文字ずつずらして走査）
  // 比較はひらがな正規化した文字列同士で行う（カタカナ表記の呼び名も拾えるように）
  const chunks = remaining.split(' ').filter(Boolean);
  chunks.forEach(chunk => {
    const normChunk = toHiragana(chunk);
    for (let pos = 0; pos < chunk.length; pos++) {
      const match = aliasIndex.find(entry => normChunk.startsWith(entry.norm, pos));
      if (match) found.push(match.name);
    }
  });
  return found;
}

// 自由入力のテキスト（ヘルプ欄・写真指名・送りなど）を、表示用に正式なキャスト名へ置き換える。
// 区切り文字（/, 、 スペースなど）はそのまま残し、各断片が呼び名として完全一致した場合だけ正式名に差し替える
// （部分一致までやると誤爆しやすいため、表示の置き換えはあえて完全一致のみに絞っている）
function normalizeStaffNamesInText(text) {
  if (!text) return text;
  const aliasIndex = buildAliasIndex();
  const parts = text.split(/([\/,、,・\s]+)/); // 区切り文字も配列に残るようキャプチャして分割
  return parts.map(part => {
    if (!part || /^[\/,、,・\s]+$/.test(part)) return part; // 区切り文字部分はそのまま
    const norm = toHiragana(part.trim());
    const match = aliasIndex.find(entry => entry.norm === norm);
    return match ? match.name : part;
  }).join('');
}


function computeDailySummary() {
  const aliasIndex = buildAliasIndex();
  const photoCount = {};
  const okuriCount = {};
  const nomiCount = {};
  const helpCount = {};
  const shinkiCount = {};
  const rpCount = {};

  function bump(map, key) {
    if (!key) return;
    map[key] = (map[key] || 0) + 1;
  }

  function matchStaff(rawText) {
    if (!rawText) return null;
    const text = rawText.trim();
    if (!text) return null;
    const normText = toHiragana(text);
    // 完全一致優先（ひらがな正規化して比較）
    const exact = staffList.find(s => toHiragana(s) === normText) ||
      Object.keys(staffAliases).find(name => (staffAliases[name] || []).some(a => toHiragana(a) === normText));
    if (exact) return exact;
    // 部分一致
    const partial = staffList.find(s => normText.includes(toHiragana(s)) || toHiragana(s).includes(normText));
    if (partial) return partial;
    const aliasPartial = aliasIndex.find(entry => normText.includes(entry.norm) || entry.norm.includes(normText));
    return aliasPartial ? aliasPartial.name : text; // どれにも該当しなければ入力値そのまま
  }

  // ----- 初回タブ集計 -----
  (firstGroups || []).forEach(g => {
    (g.rows || []).forEach(r => {
      if (r.photo1) bump(photoCount, matchStaff(r.photo1));
      if (r.photo2) bump(photoCount, matchStaff(r.photo2));
      if (r.okuri) {
        const okuriStaff = matchStaff(r.okuri);
        bump(okuriCount, okuriStaff);
        const nomi = (r.nominaoshi || '').trim();
        if (nomi && nomi !== 'なし') {
          bump(nomiCount, okuriStaff);
        }
      }
    });
  });

  // ----- 予定報告集計（guestsから） -----
  const selfCount = {};
  const proxyCount = {};
  guests.forEach(g => {
    // ヘルプ指名（呼び名リストで貪欲マッチ）
    if (g.help) {
      extractStaffNames(g.help, aliasIndex).forEach(name => bump(helpCount, name));
    }
    // 新規・初回RP判定（お客様名に含まれる文字列で判定）※来店確認済みの卓のみカウント
    const name = g.name || '';
    const tanto = matchStaff(g.tanto);
    if (g.arrived) {
      if (name.includes('初回RP') || name.includes('初回リピート')) {
        bump(shinkiCount, tanto);
        bump(rpCount, tanto);
      } else if (name.includes('新規')) {
        bump(shinkiCount, tanto);
      }
    }
    // 本人／代理の集計（記録されているものだけカウント。未記録はノイズを避けるためスキップ）
    if (g.reportType === 'self') bump(selfCount, tanto);
    else if (g.reportType === 'proxy') bump(proxyCount, tanto);
  });

  // ----- 休み・有休・半休・予定未定の集計（staffDayStatusから） -----
  const offCount = {};
  const paidOffCount = {};
  const halfOffCount = {};
  const pendingCount = {};
  Object.keys(staffDayStatus).forEach(name => {
    const entry = staffDayStatus[name];
    if (!entry) return;
    if (entry.status === 'off') bump(offCount, name);
    else if (entry.status === 'paid_off') bump(paidOffCount, name);
    else if (entry.status === 'half_off') bump(halfOffCount, name);
    else if (entry.status === 'pending') bump(pendingCount, name);
    if (entry.reportType === 'self') bump(selfCount, name);
    else if (entry.reportType === 'proxy') bump(proxyCount, name);
  });

  return { photoCount, okuriCount, nomiCount, helpCount, shinkiCount, rpCount, selfCount, proxyCount, offCount, paidOffCount, halfOffCount, pendingCount };
}

// 月次ログを合算する（当月かつliveなら本日のcomputeDailySummary()も加算）
function aggregateMonthlyLogs(monthKey) {
  let localLogs = {};
  try {
    const raw = localStorage.getItem('rj_monthlyLogs');
    if (raw) localLogs = JSON.parse(raw);
  } catch(e) {}
  // Firebase側のキャッシュをベースに、ローカル（保存直後で確実に最新）で上書きマージする
  const logs = { ...(window._fbMonthlyLogs || {}), ...localLogs };

  const keys = ['photoCount','okuriCount','nomiCount','helpCount','shinkiCount','rpCount','selfCount','proxyCount','offCount','paidOffCount','halfOffCount','pendingCount'];
  const merged = {};
  keys.forEach(k => merged[k] = {});

  function addInto(summary) {
    keys.forEach(k => {
      const src = summary[k] || {};
      Object.keys(src).forEach(name => {
        merged[k][name] = (merged[k][name] || 0) + src[name];
      });
    });
  }

  Object.keys(logs).forEach(dateKey => {
    if (dateKey.slice(0, 7) === monthKey) addInto(logs[dateKey] || {});
  });

  // 当月かつ今日がまだリセットされていない場合、本日分のライブ集計も加算する
  const todayKey = getTodayKey();
  if (monthKey === todayKey.slice(0, 7) && !(logs[todayKey])) {
    addInto(computeDailySummary());
  }

  return merged;
}

// 保存済みログから利用可能な月一覧（降順）を取得
function getAvailableMonths() {
  let localLogs = {};
  try {
    const raw = localStorage.getItem('rj_monthlyLogs');
    if (raw) localLogs = JSON.parse(raw);
  } catch(e) {}
  const logs = { ...(window._fbMonthlyLogs || {}), ...localLogs };
  const months = new Set(Object.keys(logs).map(d => d.slice(0, 7)));
  months.add(getTodayKey().slice(0, 7)); // 当月は常に選べるようにする
  return [...months].sort().reverse();
}

// 保存済みログがある日付一覧（降順）を取得する。日別タブの日付選択に使う
function getAvailableDates() {
  let localLogs = {};
  try {
    const raw = localStorage.getItem('rj_monthlyLogs');
    if (raw) localLogs = JSON.parse(raw);
  } catch(e) {}
  const logs = { ...(window._fbMonthlyLogs || {}), ...localLogs };
  const dates = new Set(Object.keys(logs));
  dates.add(getTodayKey()); // 今日は常に選べるようにする
  return [...dates].sort().reverse();
}

const SUMMARY_COL_WIDTHS = [68, 54, 54, 50, 54, 54, 62, 50, 50, 58, 50];
const SUMMARY_COL_LABELS = ['キャスト','送り','飲直','新規','初回RP','写真指名','ヘルプ指名','本人','代理','休/有休','半休'];

// 集計テーブルを「固定表示するヘッダー部分」と「縦横スクロールする本体部分」に分けて返す
// （sticky指定に頼らず、スクロール領域そのものの外にヘッダーを出すことで確実に固定する）
function buildSummaryTable(summary) {
  summary = summary || {};
  const photoCount = summary.photoCount || {};
  const okuriCount = summary.okuriCount || {};
  const nomiCount = summary.nomiCount || {};
  const helpCount = summary.helpCount || {};
  const shinkiCount = summary.shinkiCount || {};
  const rpCount = summary.rpCount || {};
  const selfCount = summary.selfCount || {};
  const proxyCount = summary.proxyCount || {};
  const offCount = summary.offCount || {};
  const paidOffCount = summary.paidOffCount || {};
  const halfOffCount = summary.halfOffCount || {};
  const allNames = new Set([
    ...staffList,
    ...Object.keys(photoCount),
    ...Object.keys(okuriCount),
    ...Object.keys(nomiCount),
    ...Object.keys(helpCount),
    ...Object.keys(shinkiCount),
    ...Object.keys(rpCount),
    ...Object.keys(selfCount),
    ...Object.keys(proxyCount),
  ]);
  const orderedNames = [
    ...staffList.filter(n => allNames.has(n)),
    ...[...allNames].filter(n => !staffList.includes(n)).sort()
  ];

  const rows = orderedNames.map(name => {
    const photo = photoCount[name] || 0;
    const okuri = okuriCount[name] || 0;
    const nomi = nomiCount[name] || 0;
    const help = helpCount[name] || 0;
    const shinki = shinkiCount[name] || 0;
    const rp = rpCount[name] || 0;
    const self = selfCount[name] || 0;
    const proxy = proxyCount[name] || 0;
    const off = (offCount[name] || 0) + (paidOffCount[name] || 0);
    const half = halfOffCount[name] || 0;
    return `<tr>
      <td style="padding:6px 8px 6px 4px;border-bottom:1px solid var(--border);border-right:1px solid var(--accent-dim);font-weight:700;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;background:var(--surface);z-index:3;">${name}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${okuri}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${nomi}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${shinki}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${rp}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${photo}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;">${help}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;color:#2ecc71;">${self}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;color:#e67e22;">${proxy}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;color:#e74c3c;">${off}</td>
      <td style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center;color:#e67e22;">${half}</td>
    </tr>`;
  }).join('');

  const headerHtml = `
    <table style="width:604px;border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed;">
      ${summaryColgroup()}
      <thead>
        <tr style="color:var(--accent);">
          ${SUMMARY_COL_LABELS.map((label, i) => `<th style="padding:6px 4px;text-align:${i===0?'left':'center'};border-bottom:1px solid var(--accent-dim);${i===0?'border-right:1px solid var(--accent-dim);padding-left:4px;':''}white-space:nowrap;background:var(--surface);${i===0?'position:sticky;left:0;z-index:2;':''}">${label}</th>`).join('')}
        </tr>
      </thead>
    </table>`;

  const bodyHtml = `
    <table style="width:604px;border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed;">
      ${summaryColgroup()}
      <tbody>${rows || `<tr><td colspan="11" style="padding:24px;text-align:center;color:var(--text-dim);">データがありません</td></tr>`}</tbody>
    </table>`;

  return { headerHtml, bodyHtml };
}

function renderSummaryModalContent() {
  const modal = document.getElementById('summaryModal');
  if (!modal) return;

  const tabBtn = (key, label) => `<button onclick="switchSummaryTab('${key}')" style="flex:1;padding:8px;border:none;border-bottom:2px solid ${_summaryTab===key?'var(--accent)':'transparent'};background:none;color:${_summaryTab===key?'var(--accent)':'var(--text-dim)'};font-family:var(--font-main);font-size:12px;font-weight:700;cursor:pointer;">${label}</button>`;

  let headerHtml = '', extraHtml = '', tableBodyHtml = '', titleSuffix;
  try {
    if (_summaryTab === 'today') {
      // 本日分リセット済みなら、その時点で保存されたログを優先する（ライブデータは空になっているため）
      const savedLog = getSavedDailyLog(getTodayKey());
      const built = buildSummaryTable(savedLog || computeDailySummary());
      headerHtml = built.headerHtml;
      tableBodyHtml = built.bodyHtml;
      titleSuffix = savedLog ? '（本日・リセット済み）' : '（本日・ライブ）';
      if (savedLog) {
        extraHtml = `
          <div style="margin-bottom:10px;font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:8px;">
            <span>本日分は既にリセット済みのため、リセット直前の記録を表示しています。</span>
            <button onclick="clearTodaySavedLog()" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--accent);font-size:11px;padding:3px 8px;cursor:pointer;font-family:var(--font-main);white-space:nowrap;">ライブ表示に戻す</button>
          </div>`;
      }
    } else if (_summaryTab === 'day') {
      const dates = getAvailableDates();
      const dateOptions = dates.map(d => `<option value="${d}" ${d===_summaryDayKey?'selected':''}>${d}</option>`).join('');
      // 選んだ日付が今日で、まだリセット前（保存ログが無い）ならライブデータを見る
      const summary = getSavedDailyLog(_summaryDayKey) || (_summaryDayKey === getTodayKey() ? computeDailySummary() : {});
      const built = buildSummaryTable(summary);
      headerHtml = built.headerHtml;
      tableBodyHtml = built.bodyHtml;
      extraHtml = `
        <div style="margin-bottom:10px;">
          <select onchange="changeSummaryDay(this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-main);font-size:13px;padding:6px 8px;outline:none;">
            ${dateOptions}
          </select>
        </div>`;
      titleSuffix = '（日別）';
    } else {
      const months = getAvailableMonths();
      const monthOptions = months.map(m => `<option value="${m}" ${m===_summaryMonthKey?'selected':''}>${m.replace('-','年')}月</option>`).join('');
      const summary = aggregateMonthlyLogs(_summaryMonthKey);
      const built = buildSummaryTable(summary);
      headerHtml = built.headerHtml;
      tableBodyHtml = built.bodyHtml;
      extraHtml = `
        <div style="margin-bottom:10px;">
          <select onchange="changeSummaryMonth(this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-main);font-size:13px;padding:6px 8px;outline:none;">
            ${monthOptions}
          </select>
        </div>`;
      titleSuffix = '（月間）';
    }
  } catch (e) {
    console.error('集計の描画でエラー:', e);
    tableBodyHtml = `<p style="color:#e74c3c;text-align:center;padding:20px;">集計の表示中にエラーが発生しました。<br>お手数ですが開発者にこの画面を共有してください。<br><span style="font-size:10px;color:var(--text-dim);">${(e && e.message) || e}</span></p>`;
    titleSuffix = '';
  }

  modal.innerHTML = `
    <div class="modal" style="max-width:640px;max-height:85vh;display:flex;flex-direction:column;">
      <div class="modal-header">
        <span>📊 集計${titleSuffix}</span>
        <button onclick="document.getElementById('summaryModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;border-bottom:1px solid var(--border);">
        ${tabBtn('today', '今日')}
        ${tabBtn('day', '日別')}
        ${tabBtn('month', '月間')}
      </div>
      <div id="summaryHeaderWrap" class="no-scrollbar" style="overflow-x:auto;border-bottom:1px solid var(--accent-dim);background:var(--surface);padding-left:12px;pointer-events:none;">
        ${headerHtml}
      </div>
      <div class="modal-body" style="overflow-y:auto;overflow-x:hidden;flex:1;padding:12px;">
        ${extraHtml}
        <div id="summaryTableScroll" style="overflow-x:auto;" onscroll="document.getElementById('summaryHeaderWrap').scrollLeft = this.scrollLeft;">
          ${tableBodyHtml}
        </div>
        <p style="font-size:10px;color:var(--text-dim);margin-top:12px;line-height:1.6;">※ヘルプ指名の集計精度は「⚙ 呼び名」（報告状況のキャスト名タップ）で登録した呼び名の充実度に左右されます。表記ゆれに気づいたら随時追加してください。<br>※月間集計は「本日分リセット」を押した時点のデータが記録される仕組みです。リセットを忘れた日は月間集計に反映されません。</p>
      </div>
    </div>`;
}

function renderStaffStatus() {
  const container = document.getElementById('staffStatusList');
  if (!container) return;
  if (!staffList.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:10px;">⚙ 編集からスタッフを登録</div>';
    return;
  }
  // 報告済み担当名を収集（部分一致）
  const reportedTantos = guests.map(g => g.tanto).filter(Boolean);
  container.innerHTML = staffList.map(name => {
    const done = reportedTantos.some(tanto => tanto.includes(name) || name.includes(tanto));
    const dayStatus = staffDayStatus[name] ? staffDayStatus[name].status : null;
    // 優先順位: 報告済み(緑) > 休み/有休(赤) > 半休(オレンジ) > 予定未定(青) > 未報告(グレー)
    let color, textColor;
    if (done) {
      color = textColor = '#2ecc71';
    } else if (dayStatus === 'off' || dayStatus === 'paid_off') {
      color = textColor = '#e74c3c';
    } else if (dayStatus === 'half_off') {
      color = textColor = '#e67e22';
    } else if (dayStatus === 'pending') {
      color = textColor = '#3498db';
    } else {
      color = 'var(--border)';
      textColor = 'var(--text-dim)';
    }
    const nameEsc = name.replace(/'/g, "\\'");
    return `<div onclick="openAliasModal('${nameEsc}')" style="padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;cursor:pointer;">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
      <span style="color:${textColor};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
    </div>`;
  }).join('');
}

  {
    g.aiban = [_editAibanParts.tanto, _editAibanParts.name].filter(Boolean).join(' ');
    g.aibanTanto = _editAibanParts.tanto;
    g.aibanName = _editAibanParts.name;
  }
  saveToStorage();
  document.getElementById('editModal').classList.remove('show');
  renderTables();
  renderFloorStatus();
  if (document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active')) renderView();
  showToast('保存しました');
}

function openStaffSettings() {
  let modal = document.getElementById('staffModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'staffModal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span>在籍スタッフ登録</span>
        <button onclick="document.getElementById('staffModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px;">1行に1名ずつ入力してください</p>
        <textarea id="staffInput" style="width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-main);font-size:13px;padding:10px;outline:none;">${staffList.join('\n')}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('staffModal').classList.remove('show')">キャンセル</button>
        <button class="btn btn-primary" onclick="saveStaffFromModal()">保存</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function saveStaffFromModal() {
  const raw = document.getElementById('staffInput').value;
  staffList = raw.split(/\n|\\n/).map(s => s.trim()).filter(Boolean);
  saveStaff();
  document.getElementById('staffModal').classList.remove('show');
  renderStaffStatus();
  showToast('スタッフリストを保存しました');
}

// ===== FIXED BARS =====
// ヘッダー・タブの高さぶん下にfixedStats/tantoStats/baanaiBarを重ねて配置し、
// 表示中のバーの高さぶんだけ本文をfixedSpacerで押し下げる

function updateFixedTop(preserveScroll = true) {
  const header = document.querySelector('header');
  const tabs = document.querySelector('.tabs');
  const fixedEl = document.getElementById('fixedStats');
  const tantoEl = document.getElementById('tantoStats');
  const baanaiEl = document.getElementById('baanaiBar');
  const emptyTablesEl = document.getElementById('emptyTablesBar');
  const spacer = document.getElementById('fixedSpacer');

  let top = 0;

  if (header) {
    header.style.top = top + 'px';
    top += header.offsetHeight;
  }
  if (tabs) {
    tabs.style.top = top + 'px';
    top += tabs.offsetHeight;
  }
  if (fixedEl && fixedEl.style.display !== 'none') {
    fixedEl.style.top = top + 'px';
    top += fixedEl.offsetHeight;
  }
  if (tantoEl && tantoEl.style.display !== 'none') {
    tantoEl.style.top = top + 'px';
    top += tantoEl.offsetHeight;
  }
  if (baanaiEl && baanaiEl.style.display !== 'none') {
    baanaiEl.style.top = top + 'px';
    top += baanaiEl.offsetHeight;
  }
  if (emptyTablesEl && emptyTablesEl.style.display !== 'none') {
    emptyTablesEl.style.top = top + 'px';
    top += emptyTablesEl.offsetHeight;
  }

  // header〜emptyTablesBarまで全て固定表示になったぶん、本文をpadding-topで押し下げる。
  // このpadding-topの値が変わると、たとえscrollYが同じ数値のままでも画面上の見た目の位置がズレる。
  // 画面回転などで呼ばれた時（preserveScroll=true）は、そのズレをscrollByで打ち消して見た目の位置を維持する。
  // 一方、セル編集完了後にキーボードが閉じてヘッダーが正しい位置に戻る時（preserveScroll=false）は、
  // 逆にその「本文が連動して下にずれる動き」をそのまま見せたいので、ここでは打ち消さない。
  const oldPaddingStr = document.body.style.paddingTop;
  const oldPadding = parseFloat(oldPaddingStr) || 0;
  document.body.style.paddingTop = top + 'px';
  const paddingDelta = top - oldPadding;
  if (preserveScroll && paddingDelta !== 0 && oldPaddingStr && window.scrollY > 0) {
    window.scrollBy(0, paddingDelta);
  }
  // spacerはもう使わないが、古い呼び出しが残っていても実害が無いよう0にしておく
  if (spacer) spacer.style.height = '0px';
}

// 画面サイズが変わった時（回転など）も再計算。
// ただし、スマホでキーボードが開閉した時にも高さだけの変化としてresizeイベントが発生するため、
// 「幅」が変わった時だけ再計算するようにする（キーボード開閉のたびにヘッダー位置が再計算され、
// それに伴って本文がガクッとズレて見える問題を防ぐため。回転や実際の画面サイズ変更は幅も変わるので拾える）
let _lastResizeWidth = window.innerWidth;
window.addEventListener('resize', () => {
  if (window.innerWidth === _lastResizeWidth) return;
  _lastResizeWidth = window.innerWidth;
  setTimeout(updateFixedTop, 50);
});

// ===== 汎用の「元に戻す」通知バー（削除・全クリアなどで使い回す） =====
let _lastUndo = null;

function offerUndo(label, undoFn) {
  _lastUndo = undoFn;
  let el = document.getElementById('undoBar');
  if (!el) {
    el = document.createElement('div');
    el.id = 'undoBar';
    el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#242424;border:1px solid var(--accent-dim);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.5);max-width:90vw;';
    document.body.appendChild(el);
  }
  el.innerHTML = `<span style="font-size:13px;color:var(--text);white-space:nowrap;">${label}</span><button onclick="runUndo()" style="background:none;border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-size:12px;padding:4px 10px;cursor:pointer;font-family:var(--font-main);font-weight:700;white-space:nowrap;">元に戻す</button>`;
  el.style.display = 'flex';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = 'none'; _lastUndo = null; }, 8000);
}

function runUndo() {
  if (!_lastUndo) return;
  _lastUndo();
  const el = document.getElementById('undoBar');
  if (el) el.style.display = 'none';
  _lastUndo = null;
  showToast('元に戻しました');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
