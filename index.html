<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卓管理</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #c9a84c;
    --accent-dim: #7a6330;
    --arrived: #1a3a2a;
    --arrived-border: #2ecc71;
    --text: #f0ece0;
    --text-dim: #888;
    --danger: #c0392b;
    --font-main: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--accent-dim);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  .header-date {
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-stats {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .header-stats span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ===== PANELS ===== */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* 固定統計バー（スクロールしても常時表示） */
  #fixedStats, #tantoStats, #baanaiBar {
    position: fixed;
    left: 0;
    right: 0;
    top: 0; /* JSのupdateFixedTop()で実際の位置に上書きされる。裏に隠れる事故を防ぐ初期値 */
  }

  /* ===== LINE INPUT ===== */
  .parse-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .parse-area-label {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
  }
  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 12px;
    min-height: 140px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }
  textarea::placeholder { color: #555; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    font-family: var(--font-main);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    justify-content: center;
    font-size: 14px;
    padding: 12px;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:active { filter: brightness(0.9); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-sm {
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* ===== LOADING ===== */
  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .loading.show { display: block; }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== PARSED PREVIEW ===== */
  .parsed-preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 12px;
  }
  .parsed-preview-header {
    padding: 8px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .parsed-preview-header span {
    font-size: 12px;
    color: var(--text-dim);
  }
  .preview-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .preview-item:last-child { border-bottom: none; }
  .preview-item .name { font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .preview-item .meta { color: var(--text-dim); line-height: 1.6; }

  /* ===== TABLE LIST (紙様式) ===== */
  .paper-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
    background: #fff;
    color: #000;
  }
  .paper-table th {
    background: #f0f0f0;
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 3px;
    border: 1.5px solid #555;
    text-align: center;
    white-space: nowrap;
  }
  .paper-table td {
    padding: 5px 4px;
    border: 1px solid #888;
    vertical-align: middle;
    color: #000;
    font-size: 12px;
    line-height: 1.4;
    min-height: 28px;
    height: 28px;
  }
  .paper-table tr.arrived td {
    background: #b0c4b0;
    text-decoration: line-through;
    color: #444;
  }
  .paper-table tr:not(.arrived):nth-child(even) td { background: #fafafa; }
  .paper-table tr:not(.arrived) td { background: #fff; }

  .p-col-no   { width: 24px; text-align: center; color: #888; font-size: 11px; cursor:pointer; }
  .p-col-num  { width: 42px; text-align: center; font-weight: 700; color: #c9a84c; }
  .p-col-time { width: 52px; text-align: center; font-size: 11px; }
  .p-col-tanto{ width: 46px; }
  .p-col-guest{ width: 80px; }
  .p-col-keep { width: 44px; text-align: center; }
  .p-col-note { width: 136px; font-size: 11px; }

  .table-num-input {
    width: 100%;
    border: none;
    background: #fffde7;
    font-size: 12px;
    font-weight: 700;
    color: #c9a84c;
    text-align: center;
    outline: 1px solid #c9a84c;
    padding: 2px;
    border-radius: 2px;
    font-family: var(--font-main);
  }
  .editable { cursor: pointer; }
  .editable:hover { background: #fffde7 !important; }
  .paper-table tr.arrived .editable:hover { background: #c8ddc8 !important; }
  .cell-input {
    width: 100%;
    border: none;
    outline: 1px solid #c9a84c;
    background: #fffde7;
    font-size: 12px;
    color: #000;
    padding: 2px 3px;
    font-family: var(--font-main);
    border-radius: 2px;
    box-sizing: border-box;
  }

  .paper-table tr { cursor: pointer; }
  .paper-table tr:hover td { filter: brightness(0.95); }

  /* ===== TABLE LIST (テーブル形式) ===== */
  .res-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  .res-table th {
    background: var(--surface2);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 8px 5px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .res-table td {
    padding: 8px 5px;
    border: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
    font-size: 12px;
    word-break: break-all;
    line-height: 1.5;
  }
  .res-table tr.arrived td { background: var(--arrived); }
  .paper-table tr.arrived td { background: #d4edda !important; color: #000; }
  .res-table tr:nth-child(even):not(.arrived) td { background: rgba(255,255,255,0.02); }

  .col-num   { width: 30px; text-align: center; }
  .col-time  { width: 54px; text-align: center; }
  .col-tanto { width: 52px; }
  .col-guest { width: auto; font-weight: 600; }
  .col-keep  { width: 56px; }
  .col-note  { width: 72px; font-size: 11px; color: var(--text-dim); }
  .col-act   { width: 36px; text-align: center; }

  .num-cell { font-weight: 900; color: var(--accent); font-size: 15px; }
  .arrived-cell { color: var(--arrived-border); font-weight: 900; font-size: 15px; }

  .arrive-btn {
    width: 100%;
    padding: 6px 2px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .arrive-btn:hover { border-color: var(--arrived-border); color: var(--arrived-border); }
  tr.arrived .arrive-btn.main-btn { background: var(--arrived-border); color: #000; border-color: var(--arrived-border); }

  /* ===== VIEW LIST ===== */
  .view-section-label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--accent-dim);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .view-section-label:first-child { margin-top: 0; }
  .view-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .view-row:last-child { border-bottom: none; }
  .view-num {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    min-width: 32px;
    text-align: center;
    line-height: 1.3;
  }
  .view-num.no-table { color: var(--text-dim); font-size: 12px; font-weight: 400; padding-top: 2px; }
  .view-body { flex: 1; }
  .view-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .view-meta { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .view-arrived { color: var(--arrived-border); font-size: 11px; font-weight: 700; }
  .view-num-inline { color: var(--accent); font-weight: 900; font-size: 15px; min-width: 40px; display: inline-block; }

  /* ===== UNASSIGNED LIST ===== */
  .unassigned-section { margin-top: 16px; }
  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .guest-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .guest-chip-info { flex: 1; font-size: 12px; }
  .guest-chip-name { font-weight: 700; color: var(--accent); margin-bottom: 2px; }
  .guest-chip-meta { color: var(--text-dim); line-height: 1.5; }
  .guest-chip-assign { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .table-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 12px;
    padding: 5px 6px;
    outline: none;
    max-width: 80px;
  }
  .table-select:focus { border-color: var(--accent); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }
  .modal-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .modal-body { padding: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 4px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .modal-footer {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .modal-footer .btn { flex: 1; justify-content: center; }

  /* ===== UPLOAD ===== */
  .upload-area {
    background: var(--surface);
    border: 2px dashed var(--accent-dim);
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-text { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text-dim); }
  .thumb-wrap { position: relative; width: 72px; height: 72px; }
  .thumb-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .thumb-remove {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--danger); border-radius: 50%; border: none;
    color: #fff; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    border-radius: 12px;
    padding: 32px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .login-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }
  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 16px;
    padding: 12px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-error {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 8px;
    min-height: 16px;
  }

  /* iOSズームアップ防止 */
  input, select, textarea { font-size: 16px !important; }

  @media (max-width: 480px) {
    .table-grid { grid-template-columns: 1fr; }
    .header-title { font-size: 14px; }
  }
</style>
<!-- Firebase SDK -->
<script>
  // Firebase無効（プレビュー用）
  window.fbSave = function() {};
  window.fbSaveStaff = function() {};
  window.fbSaveFirst = function() {};
  window._fbReady = null;
  window._fbStaffReady = null;
</script>
<script type="text/disabled">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCdOu7waepEH5WXQkvFKLLFRah-FODcOUI",
    authDomain: "rjtable-cdd5c.firebaseapp.com",
    databaseURL: "https://rjtable-cdd5c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rjtable-cdd5c",
    storageBucket: "rjtable-cdd5c.firebasestorage.app",
    messagingSenderId: "893265704748",
    appId: "1:893265704748:web:95615ebcd7be9927631e89"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const guestsRef = ref(db, 'guests');
  const staffRef = ref(db, 'staff');

  // Firebaseにゲストデータを保存
  window.fbSave = function(guestsData) {
    const obj = {};
    guestsData.forEach(g => { obj['g' + g.id] = g; });
    set(guestsRef, obj).catch(e => console.error('FB save error:', e));
  };

  // Firebaseにスタッフリストを保存
  window.fbSaveStaff = function(list) {
    set(staffRef, list).catch(e => console.error('FB staff save error:', e));
  };

  // Firebaseからゲストをリアルタイム受信
  onValue(guestsRef, (snapshot) => {
    const data = snapshot.val();
    window._fbGuests = data === null ? [] : Object.values(data).filter(g => g && (g.name || g.tanto || g.tableNum));
    if (typeof guests !== 'undefined' && typeof renderTables === 'function') {
      // 初回以降もリアルタイム反映
      guests = window._fbGuests;
      nextId = guests.reduce((m,g) => Math.max(m, (g.id||0)+1), 1);
      if (window.renderTables) window.renderTables();
      if (window.renderStaffStatus) window.renderStaffStatus();
      if (window.renderView && document.getElementById('panel-view') && document.getElementById('panel-view').classList.contains('active')) window.renderView();
      if (window.updateStats) window.updateStats();
    } else if (window._fbReady) {
      window._fbReady();
    }
  });

  // Firebaseからスタッフリストをリアルタイム受信
  onValue(staffRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      const list = Array.isArray(data) ? data : String(data).split('\n').map(s => s.trim()).filter(Boolean);
      window._fbStaff = list;
      // 常にリアルタイムで反映
      if (typeof staffList !== 'undefined') {
        staffList = list;
        try { localStorage.setItem('tableManager_staff', JSON.stringify(staffList)); } catch(e) {}
        if (window.renderStaffStatus) window.renderStaffStatus();
      } else if (window._fbStaffReady) {
        window._fbStaffReady();
      }
    }
  });
</script>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">卓 管 理</div>
    <div class="login-sub">ROMEO &amp; JULIET</div>
    <input class="login-input" id="loginInput" type="password" placeholder="パスワードを入力" maxlength="20"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;font-size:15px;padding:12px;">
      入室
    </button>
  </div>
</div>

<header>
  <div>
    <div class="header-title">卓 管 理</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="header-stats">
    <span id="statTotal" style="display:none"></span>
    <span id="statArrived" style="display:none"></span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">📋 予定報告</div>
  <div class="tab" onclick="switchTab('tables')">📊 卓一覧</div>
  <div class="tab" onclick="switchTab('first')">🔰 初回</div>
  <div class="tab" onclick="switchTab('view')">👁 全体</div>

<!-- 固定統計バー（JSでtop位置を計算してヘッダー/タブ直下に固定） -->

<script>
// ===== STATE =====
let guests = []; // { id, name, arrive, leave, tanto, budget, help, note, tableNum, arrived }
let nextId = 1;
let firstGroups = [];
let firstGid = 1;
let firstRid = 1;
let staffList = [];

// ===== LOGIN =====
const PASS_ADMIN = 'rj0123';
const PASS_HOST  = '1234';

function checkLogin() {
  const role = localStorage.getItem('rj_role');
  if (role === 'admin' || role === 'host') {
    applyRole(role);
    document.getElementById('loginScreen').style.display = 'none';
  }
}

function doLogin() {
  const val = document.getElementById('loginInput').value.trim();
  if (val === PASS_ADMIN) {
    localStorage.setItem('rj_role', 'admin');
    applyRole('admin');
    document.getElementById('loginScreen').style.display = 'none';
  } else if (val === PASS_HOST) {
    localStorage.setItem('rj_role', 'host');
    applyRole('host');
    document.getElementById('loginScreen').style.display = 'none';
  } else {
    document.getElementById('loginError').textContent = 'パスワードが違います';
    document.getElementById('loginInput').value = '';
  }
}

function applyRole(role) {
  if (role === 'host') {
    // ホストは卓一覧タブを非表示
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    // 卓一覧タブ（index 1）を非表示
    if (tabs[1]) tabs[1].style.display = 'none';
    if (panels[1]) panels[1].style.display = 'none';
    // アクティブを予定報告に
    tabs[0].classList.add('active');
    panels[0].classList.add('active');
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Firebase module scriptからアクセスできるようにwindowに登録
  window.renderStaffStatus = renderStaffStatus;
  window.renderTables = renderTables;
  window.renderFloorStatus = renderFloorStatus;
  window.renderView = renderView;
  window.updateStats = updateStats;
  checkLogin();
  // firstGroupsを必ずクリーンな状態で初期化
  firstGroups = [];
  firstGid = 1;
  firstRid = 1;
  loadFirstData();
  updateDate();
  renderFirstTab();
  // Firebase準備完了時に実行
  window._fbReady = function() {
    if (window._fbGuests) {
      guests = window._fbGuests;
      nextId = guests.reduce((m,g) => Math.max(m, (g.id||0)+1), 1);
      renderTables();
      if (document.getElementById('panel-view').classList.contains('active')) renderView();
      updateStats();
    }
  };
  // ローカルのデータで先に表示（Firebase接続前）
  loadFromStorage();
  loadStaff();
  renderTables();
  renderStaffStatus();
  setTimeout(updateFixedTop, 100);
});

function updateDate() {
  const now = new Date();
  const d = `${now.getMonth()+1}月${now.getDate()}日（${'日月火水木金土'[now.getDay()]}）`;
  document.getElementById('headerDate').textContent = d;
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['input','tables','first','view'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if (name === 'tables') renderTables();
  if (name === 'view') renderView();
  if (name === 'first') renderFirstTab();
  if (name === 'input') renderFloorStatus();
}

// ===== AI TEXT PARSE =====
function resetTemplate() {
  document.getElementById('lineTextInput').value = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
}

function clearTemplate() {
  const ta = document.getElementById('lineTextInput');
  const tmpl = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  const blocks = ta.value.split('\n\n').filter(b => b.trim());
  const filtered = blocks.filter(block => {
    const lines = block.split('\n');
    return lines.some(line => {
      const idx = line.indexOf('：');
      const val = idx >= 0 ? line.slice(idx + 1).trim() : line.trim();
      return val !== '';
    });
  });
  ta.value = filtered.join('\n\n');
}

function addTemplate() {
  const ta = document.getElementById('lineTextInput');
  const current = ta.value.trim();
  const tmpl = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  ta.value = current ? current + '\n\n' + tmpl : tmpl;
  ta.scrollTop = ta.scrollHeight;
}

function parseLineText() {
  const text = document.getElementById('lineTextInput').value.trim();
  if (!text) { showToast('内容を入力してください'); return; }

  // ブロックを空行で分割
  const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
  const parsed = [];

  blocks.forEach(block => {
    const get = (key) => {
      const match = block.match(new RegExp(key + '：(.*)'));
      return match ? match[1].trim() : '';
    };

    // テンプレ形式かチェック
    const tanto = get('担当名');
    const name = get('お客様名');

    if (tanto || name) {
      // テンプレ形式
      if (!tanto) { showToast('担当名を入力してください'); return; }
      // 予定未定はスキップ（お客様名なしor予定未定）
      if (!name || name.includes('予定未定')) {
        // 報告状況に反映するためtantoだけ記録
        markReported(tanto);
        return;
      }
      parsed.push({
        tanto, name,
        arrive: get('来店時間'),
        leave:  get('退店時間'),
        budget: get('予算'),
        help:   get('ヘルプ'),
        note:   get('備考'),
      });
    } else {
      // 自由入力形式（例：「カルマ 予定未定」）
      const trimmed = block.trim();
      if (!trimmed) return;
      // 予定未定を含む場合は報告状況に反映してスキップ
      if (trimmed.includes('予定未定')) {
        // 名前部分を抽出（「カルマ予定未定」「カルマ 予定未定」両対応）
        const tName = trimmed.replace(/\s*予定未定.*/, '').trim();
        if (tName) markReported(tName);
        return;
      }
      // スペース区切りで最初の単語を担当名、残りをお客様名として扱う
      const parts = trimmed.split(/\s+/);
      if (parts.length < 2) { showToast('担当名とお客様名を入力してください'); return; }
      parsed.push({
        tanto: parts[0],
        name: parts.slice(1).join(' '),
        arrive: '', leave: '', budget: '', help: '', note: '',
      });
    }
  });

  if (!parsed.length) {
    showToast('有効な報告が見つかりませんでした');
    return;
  }

  importTextParsed(parsed);
}

function importTextParsed(parsed) {
  if (!parsed || !parsed.length) {
    showToast('該当する報告が見つかりませんでした');
    return;
  }
  const usedRows = new Set(guests.map(g => Number(g.rowNum)).filter(Boolean));
  let rc = 1;
  let skipped = 0;
  parsed.forEach(g => {
    const isDuplicate = guests.some(existing =>
      existing.tanto && existing.name && g.tanto && g.name &&
      (existing.tanto.includes(g.tanto) || g.tanto.includes(existing.tanto)) &&
      existing.name === g.name
    );
    if (isDuplicate) { skipped++; return; }
    while (usedRows.has(rc)) rc++;
    usedRows.add(rc);
    guests.push({ id: nextId++, ...g, rowNum: String(rc++), tableNum: g.tableNum||'', arrived: false });
  });
  document.getElementById('previewArea').innerHTML = '';
  document.getElementById('lineTextInput').value = '担当名：\nお客様名：\n来店時間：\n退店時間：\n予算：\nヘルプ：\n備考：';
  saveToStorage();
  updateStats();
  renderStaffStatus();
  const msg = skipped > 0 ? `取り込みました！（重複${skipped}件をスキップ）` : `${parsed.length - skipped}件を取り込みました！`;
  showToast(msg);
  switchTab('tables');
}


// ===== RENDER TABLES =====
function renderTables() {
  const container = document.getElementById('assignedTables');
  const MAX_ROWS = 30;

  // No.ごとにゲストをマップ（rowNum = 行番号）
  const rowMap = {};
  guests.forEach(g => { if (g.rowNum) rowMap[g.rowNum] = g; });

  let rows = '';
  for (let i = 1; i <= MAX_ROWS; i++) {
    const g = rowMap[i];
    if (g) {
      rows += rowHTML(i, g);
    } else {
      rows += emptyRowHTML(i);
    }
  }

  // MAX_ROWS超えの行
  guests.filter(g => g.rowNum && Number(g.rowNum) > MAX_ROWS)
    .sort((a,b) => Number(a.rowNum)-Number(b.rowNum))
    .forEach(g => { rows += rowHTML(g.rowNum, g); });

  container.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="paper-table">
        <thead>
          <tr>
            <th class="p-col-no">No.</th>
            <th class="p-col-num">卓番</th>
            <th class="p-col-time">来店時間</th>
            <th class="p-col-tanto">担当者</th>
            <th class="p-col-guest">お客様名</th>
            <th class="p-col-keep">ボトル</th>
            <th class="p-col-note">備考</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  updateStats();
  updateTableStats();
}

function rowHTML(no, g) {
  const bottleState = g.bottle || 0;
  const bottleIcon = bottleState === 0 ? '' : bottleState === 1 ? '○' : '◉';
  const bottleColor = bottleState === 2 ? '#2ecc71' : '#c9a84c';
  return `
    <tr class="${g.arrived ? 'arrived' : ''}" id="card-${g.id}"
        oncontextmenu="event.preventDefault();confirmDelete(${g.id})"
        data-hold="" ontouchstart="startHold(${g.id})" ontouchend="cancelHold()" ontouchmove="cancelHold()">
      <td class="p-col-no" onclick="toggleArrived(${g.id})" style="cursor:pointer;user-select:none;">${no}</td>
      <td class="p-col-num editable" onclick="editCell(${g.id},'tableNum',this)">${g.tableNum||''}</td>
      <td class="p-col-time editable" onclick="editCell(${g.id},'arrive',this)">${g.arrive||''}</td>
      <td class="p-col-tanto editable" onclick="editCell(${g.id},'tanto',this)">${g.tanto||''}</td>
      <td class="p-col-guest editable" onclick="editCell(${g.id},'name',this)">${g.name||''}</td>
      <td class="p-col-keep" onclick="toggleBottle(${g.id})" style="cursor:pointer;text-align:center;font-size:16px;color:${bottleColor};user-select:none;">${bottleIcon}</td>
      <td class="p-col-note editable" onclick="editCell(${g.id},'note',this)">${g.note||''}</td>
    </tr>`;
}

function emptyRowHTML(no) {
  // 空行タップで新規ゲスト作成
  return `
    <tr id="emptyrow-${no}">
      <td class="p-col-no" style="color:#aaa;">${no}</td>
      <td class="p-col-num editable empty-cell" onclick="createAndEdit(${no},'tableNum',this)"></td>
      <td class="p-col-time editable empty-cell" onclick="createAndEdit(${no},'arrive',this)"></td>
      <td class="p-col-tanto editable empty-cell" onclick="createAndEdit(${no},'tanto',this)"></td>
      <td class="p-col-guest editable empty-cell" onclick="createAndEdit(${no},'name',this)"></td>
      <td class="p-col-keep editable empty-cell" onclick="createAndEdit(${no},'budget',this)"></td>
      <td class="p-col-note editable empty-cell" onclick="createAndEdit(${no},'note',this)"></td>
    </tr>`;
}

// セルをインライン編集
function editCell(id, field, td) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  const current = g[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  // カーソルを末尾に（全選択しない）
  const len = input.value.length;
  input.setSelectionRange(len, len);
  function save() {
    g[field] = input.value.trim();
    saveToStorage();
    renderTables();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { td.textContent = current; }
  });
}

// 空行タップで新規作成してその場編集
function createAndEdit(rowNum, field, td) {
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.placeholder = field === 'tableNum' ? 'A1〜P12' : '';
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  function save() {
    const val = input.value.trim();
    if (!val) { renderTables(); return; } // 空なら何もしない
    const g = { id: nextId++, rowNum: String(rowNum), tableNum:'', arrive:'', leave:'', tanto:'', name:'', budget:'', note:'', help:'', arrived: false };
    g[field] = val;
    guests.push(g);
    repackRowNums();
    saveToStorage();
    renderTables();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { renderTables(); }
  });
}



// ===== 卓状況 =====
const DEFAULT_FLOORS = {
  V: Array.from({length:9},(_,i)=>'V'+(i+1)),
  A: Array.from({length:6},(_,i)=>'A'+(i+1)),
  B: Array.from({length:9},(_,i)=>'B'+(i+1)),
};
let floorData = JSON.parse(JSON.stringify(DEFAULT_FLOORS));

function loadFloorData() {
  try {
    const raw = localStorage.getItem('rj_floorData');
    if (raw) floorData = JSON.parse(raw);
  } catch(e) {}
}

function saveFloorData() {
  try { localStorage.setItem('rj_floorData', JSON.stringify(floorData)); } catch(e) {}
}

function renderFloorStatus() {
  const area = document.getElementById('floorStatusArea');
  if (!area) return;
  // 使用中の卓番を取得（初回も含む）
  const usedTables = new Set([
    ...guests.filter(g => g.tableNum && !g.left).map(g => g.tableNum.toUpperCase()),
    ...(firstGroups||[]).filter(g => g.tableNum).map(g => g.tableNum.toUpperCase())
  ]);

  const floors = ['V','A','B'];
  area.innerHTML = floors.map(f => {
    const tables = floorData[f] || [];
    return `

function loadFirstData() {

    if (raw) {

      firstGroups = Array.isArray(parsed) ? parsed : [];
      if (firstGroups.length) {
        firstGid = firstGroups.reduce((m,g)=>Math.max(m,(g.id||0)+1),1);

}

function renderFirstTab() {
  const tbody = document.getElementById('firstTableBody');
  if (!tbody) return;
  if (!Array.isArray(firstGroups)) firstGroups = [];
  const MAX_GROUPS = 20;
  let rows = '';
  let noCounter = 1;

  // グループを描画
  firstGroups.forEach(g => {
    const count = parseInt(g.count) || 1;
    const rowspan = count > 1 ? ` rowspan="${count}"` : '';
    const allDone = (g.rows||[]).length > 0 && (g.rows||[]).every(r => r.nominaoshi && r.nominaoshi.trim() !== '');
    g.rows.forEach((r, ri) => {
      const isDone = r.nominaoshi && r.nominaoshi.trim() !== '';
      const doneStyle = isDone ? 'background:#d4edda;color:#555;' : '';
      rows += `<tr id="fr-${r.id}" oncontextmenu="event.preventDefault();deleteFirstGroup(${g.id})"
          ontouchstart="startHold2(${g.id})" ontouchend="cancelHold()" ontouchmove="cancelHold()">`;
      if (ri === 0) {
        rows += `<td style="text-align:center;color:#c9a84c;font-size:12px;font-weight:700;${allDone?'background:#d4edda;':''}"${rowspan}>${noCounter}</td>`;
        rows += `<td${rowspan} style="${allDone?'background:#d4edda;':''}">
          <select onchange="onCountChange(${g.id},this.value)"
            style="width:100%;background:var(--surface2);border:none;color:var(--text);font-family:var(--font-main);font-size:12px;padding:2px;outline:none;">
            <option value="">-</option>
            ${[1,2,3].map(n=>`<option value="${n}" ${g.count==n?'selected':''}>${n}名</option>`).join('')}
          </select>
        </td>`;
        rows += `<td${rowspan} class="editable" onclick="editFirstGroup(${g.id},'tableNum',this)" style="font-weight:700;color:var(--accent);${allDone?'background:#d4edda;':''}">${g.tableNum||''}</td>`;
      }
      rows += `<td style="${doneStyle}">
        <select onchange="updateFirstRow(${g.id},${r.id},'seat',this.value)"
          style="width:100%;background:${isDone?'#d4edda':'var(--surface2)'};border:none;color:${isDone?'#555':'var(--text)'};font-family:var(--font-main);font-size:12px;padding:2px;outline:none;">
          <option value="">-</option>
          ${['左','中','右'].map(s=>`<option value="${s}" ${r.seat===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo1',this)" style="${doneStyle}">${r.photo1||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'photo2',this)" style="${doneStyle}">${r.photo2||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'okuri',this)" style="${isDone?'background:#d4edda;color:#555;':''}">${r.okuri||''}</td>`;
      const nomiDone = r.nominaoshi && r.nominaoshi.trim() !== '';
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'nominaoshi',this)" style="${nomiDone?'background:#d4edda;color:#000;':''}">${r.nominaoshi||''}</td>`;
      rows += `<td class="editable" onclick="editFirstRow(${g.id},${r.id},'plan',this)" style="${nomiDone?'background:#d4edda;color:#555;':''}">${r.plan||''}</td>`;
      rows += '</tr>';
    });
    noCounter++;
  });

  // 空行を20まで埋める
  const remaining = MAX_GROUPS - firstGroups.length;
  for (let i = 0; i < remaining; i++) {
    rows += `<tr><td style="text-align:center;color:#555;font-size:11px;">${noCounter++}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
  }

  tbody.innerHTML = rows;

  // 統計表示更新
  const statsEl = document.getElementById('firstStats');
  if (statsEl) {
    const total = firstGroups.reduce((s,g) => s + (parseInt(g.count)||0), 0);
    const current = firstGroups.reduce((s,g) => {
      const cnt = parseInt(g.count)||0;
      const rowCnt = (g.rows||[]).length || 1;
      const doneRows = (g.rows||[]).filter(r => r.nominaoshi && r.nominaoshi.trim()).length;
      return s + Math.round(cnt * (rowCnt - doneRows) / rowCnt);
    }, 0);
    statsEl.innerHTML = total > 0
      ? `初回数 現在<span style="color:var(--accent);font-weight:700;">${current}名</span>／トータル<span style="font-weight:700;">${total}名</span>`
      : '';
  }
}

function onCountChange(gid, val) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const newCount = parseInt(val) || 1;
  g.count = val;
  // 行数を調整
  while (g.rows.length < newCount) g.rows.push({id:firstRid++,seat:'',photo1:'',photo2:'',okuri:'',nominaoshi:'',plan:''});
  while (g.rows.length > newCount) g.rows.pop();
  // 席位置を自動設定
  const seatMap = {1:[''], 2:['左','右'], 3:['左','中','右']};
  const seats = seatMap[newCount] || g.rows.map(()=>'');
  g.rows.forEach((r, i) => { r.seat = seats[i] || ''; });
  saveFirstData();
  renderFirstTab();
  syncFirstGroupToView(g);
}

function updateFirstRow(gid, rid, field, val) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const r = g.rows.find(x => x.id === rid);
  if (!r) return;
  r[field] = val;
  saveFirstData();
  // 飲直が入ったら卓一覧に反映
  if (field === 'nominaoshi') {
    syncNominaoshiToTable(g, r);
  }
}

function syncNominaoshiToTable(g, r) {
  const key = `first_${g.id}_${r.id}`;
  const nomi = (r.nominaoshi || '').trim();
  // 飲直がない or「なし」の場合は卓一覧から削除
  if (!nomi || nomi === 'なし') {
    guests = guests.filter(x => x.firstKey !== key);
    saveToStorage();
    renderTables();
    return;
  }
  const noteStr = ['飲直', r.plan ? r.plan.trim() : ''].filter(Boolean).join(' ');
  const existing = guests.find(x => x.firstKey === key);
  if (existing) {
    existing.tableNum = g.tableNum || '';
    existing.tanto = r.okuri || '';
    existing.name = nomi;
    existing.note = noteStr;
    existing.arrived = true;
  } else {
    guests.push({
      id: nextId++,
      rowNum: '999', // 仮番号、repackRowNumsで整理
      tableNum: g.tableNum || '',
      tanto: r.okuri || '',
      name: nomi,
      note: noteStr,
      arrive: '', leave: '', budget: '', help: '',
      arrived: true,
      firstKey: key
    });
  }
  repackRowNums();
  saveToStorage();
  renderTables();
}

function editFirstGroup(gid, field, td) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const current = g[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  function save() {
    g[field] = input.value.trim();
    saveFirstData();
    renderFirstTab();
    // 卓番変更時は全行を再同期＋初回卓を反映
    if (field === 'tableNum') {
      (g.rows||[]).forEach(r => syncNominaoshiToTable(g, r));
      syncFirstGroupToView(g);
    }
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key==='Enter') input.blur(); if (e.key==='Escape') { td.textContent=current; } });
}

function editFirstRow(gid, rid, field, td) {
  const g = firstGroups.find(x => x.id === gid);
  if (!g) return;
  const r = g.rows.find(x => x.id === rid);
  if (!r) return;
  const current = r[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = current;
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  function save() {
    r[field] = input.value.trim();
    saveFirstData();
    renderFirstTab();
    // 飲直・送り・卓番が変更されたら卓一覧に反映
    if (field === 'nominaoshi' || field === 'okuri' || field === 'plan') {
      syncNominaoshiToTable(g, r);
    }
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key==='Enter') input.blur(); if (e.key==='Escape') { td.textContent=current; } });
}

// ===== RENDER VIEW =====
// 卓番ソート: V・P（同フロア）→A→B→その他、番号順
function tableNumSort(a, b) {
  const getGroup = (t) => {
    if (!t) return 9;
    const p = t[0].toUpperCase();
    if (p === 'V' || p === 'P') return 0; // VとPは同グループ
    if (p === 'A') return 1;
    if (p === 'B') return 2;
    return 9;
  };
  const numA = parseInt((a.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const numB = parseInt((b.tableNum || '').replace(/[^0-9]/g,'')) || 0;
  const groupA = getGroup(a.tableNum);
  const groupB = getGroup(b.tableNum);
  if (groupA !== groupB) return groupA - groupB;
  return numA - numB;
}

      if (!tableMapMulti[key]) tableMapMulti[key] = [];
      tableMapMulti[key].push({ type: 'guest', data: g });

  });
  // 初回グループも追加

    tableMapMulti[key].push({ type: 'first', data: g });
  });

    html += `<div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.1em;padding:6px 0 4px;border-bottom:1px solid var(--accent-dim);margin-bottom:4px;margin-top:${floor==='V'?'0':'12px'};">${floor}フロア</div>`;
    tables.forEach(t => {
    const gs = tableMapMulti[t.toUpperCase()];

      }
      gs.forEach(item => {
        if (item.type === 'guest') {

            const p = [r.photo1, r.photo2].filter(Boolean).join('/');
            return p ? seat + `<span style="color:var(--text);">${p}</span>` : '';
          }).filter(Boolean).join('<span style="color:#555;"> ・ </span>');
          const displayT = (g.tableNum||'').replace(/^[Pp]/, 'V');
          html += `<div class="view-row">

  const unassignedArrived = active.filter(g => !g.tableNum && g.arrived);
  if (unassignedArrived.length) {
    html += `<div class="view-section-label" style="margin-top:8px;">卓未定・来店中</div>`;
    html += unassignedArrived.map(g => viewRow(g)).join('');
  }

  container.innerHTML = html || '<div class="empty-state"><div class="icon">👁</div><p>予約がありません</p></div>';
}

function viewRow(g) {
  const noteStr = [g.help ? 'H: ' + g.help : '', g.note || ''].filter(Boolean).join(' ／ ');
  const specialIcons = (g.specials || []).map(k => {
    const s = SPECIALS.find(x => x.key === k);
    return s ? `<span style="font-size:15px;" title="${s.label}">${s.icon}</span>` : '';
  }).join('');

  // PをVに統一表示
  const displayTable = g.tableNum ? g.tableNum.replace(/^[Pp]/, 'V') : null;

  return `
    <div class="view-row" onclick="openSpecialModal(${g.id})" style="cursor:pointer;">
      <div class="view-body">
        <div class="view-name" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          ${specialIcons ? `<span>${specialIcons}</span>` : ''}
          <span class="view-num-inline">${displayTable ? displayTable+'卓' : '未定'}</span>
          <span style="color:#f0c040;font-size:13px;">${g.tanto || ''}</span>
          <span style="font-weight:700;">${(g.name || '名前不明').replace('△','').trim()}様</span>
          &nbsp;
          <button onclick="event.stopPropagation();toggleLeft(${g.id})"
            style="padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-main);">
            退店
          </button>
          ${g.leave ? `<span style="font-size:11px;color:var(--text-dim);">${g.leave}</span>` : ''}
          ${g.budget ? `<span style="font-size:11px;color:var(--text-dim);">${g.budget}</span>` : ''}
        </div>
        ${noteStr ? `<div class="view-meta" style="color:#e74c3c;">${noteStr}</div>` : ''}
      </div>
    </div>`;
}


// ===== 特記事項 =====
const SPECIALS = [
  { key: 'event',  icon: '👑', label: 'イベント主役' },
  { key: 'nohelp', icon: '🚫', label: 'ヘルプなし' },
  { key: 'stop',   icon: '🛑', label: '単価ストップ' },
  { key: 'new',    icon: '🔰', label: '新規・飲直' },
  { key: 'out',    icon: '🚶', label: '中抜け' },
];

function openSpecialModal(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  let modal = document.getElementById('specialModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'specialModal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal" style="max-width:300px;">
      <div class="modal-header">
        <span>特記事項</span>
        <button onclick="document.getElementById('specialModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        ${SPECIALS.map(s => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:16px;">${s.icon} ${s.label}</span>
            <button onclick="toggleSpecial(${id},'${s.key}')" style="padding:5px 14px;border-radius:4px;border:1px solid ${(g.specials||[]).includes(s.key) ? '#2ecc71' : 'var(--border)'};background:${(g.specials||[]).includes(s.key) ? '#2ecc71' : 'transparent'};color:${(g.specials||[]).includes(s.key) ? '#000' : 'var(--text-dim)'};font-weight:700;cursor:pointer;font-family:var(--font-main);">
              ${(g.specials||[]).includes(s.key) ? 'ON' : 'OFF'}
            </button>
          </div>
        `).join('')}
      </div>
    </div>`;
  modal.classList.add('show');
}

function toggleSpecial(id, key) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  if (!g.specials) g.specials = [];
  if (g.specials.includes(key)) {
    g.specials = g.specials.filter(k => k !== key);
  } else {
    g.specials.push(key);
  }
  saveToStorage();
  openSpecialModal(id); // モーダル更新
  renderView();
}

// ===== LEFT (退店) =====
let lastLeft = null; // 最後に退店したゲストのバックアップ

function toggleLeft(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  lastLeft = JSON.parse(JSON.stringify(g)); // バックアップ
  g.left = true;
  saveToStorage();
  renderView();
}

function undoLeft() {
  if (!lastLeft) { showToast('元に戻すデータがありません'); return; }
  const g = guests.find(x => x.id === lastLeft.id);
  if (g) {
    g.left = false;
    lastLeft = null;
    saveToStorage();
    renderView();
    showToast('元に戻しました');
  }
}

// ===== ACTIONS =====
function toggleArrived(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  g.arrived = !g.arrived;
  saveToStorage();
  renderTables();
  if (document.getElementById('panel-view').classList.contains('active')) renderView();
  showToast(g.arrived ? `${g.name || ''} 来店確認 ✅` : `${g.name || ''} 来店取消`);
}

// ===== LONG PRESS DELETE =====
let _holdTimer = null;
function startHold(id) {
  _holdTimer = setTimeout(() => { confirmDelete(id); }, 600);
}
function cancelHold() {
  if (_holdTimer) { clearTimeout(_holdTimer); _holdTimer = null; }
}
function confirmDelete(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  const label = g.name || g.tanto || ('No.' + g.rowNum);

  // カスタム削除ダイアログ
  let overlay = document.getElementById('deleteOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'deleteOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:24px;max-width:300px;width:100%;text-align:center;">
      <div style="font-size:14px;color:#f0ece0;margin-bottom:8px;">削除しますか？</div>
      <div style="font-size:16px;font-weight:700;color:#c9a84c;margin-bottom:20px;">「${label}」</div>
      <div style="display:flex;gap:10px;">
        <button onclick="document.getElementById('deleteOverlay').style.display='none'"
          style="flex:1;padding:10px;background:transparent;border:1px solid #555;border-radius:6px;color:#888;font-size:13px;cursor:pointer;">キャンセル</button>
        <button onclick="document.getElementById('deleteOverlay').style.display='none';deleteGuest(${id})"
          style="flex:1;padding:10px;background:#c0392b;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">削除</button>
      </div>
    </div>`;
  overlay.style.display = 'flex';
}

function repackRowNums() {
  // データがある行だけ詰め直す（空行は除外して削除）
  guests = guests.filter(g => g.name || g.tanto || g.tableNum);
  const sorted = guests.sort((a,b) => Number(a.rowNum||0) - Number(b.rowNum||0));
  sorted.forEach((g, i) => { g.rowNum = String(i + 1); });
}

function toggleBottle(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  g.bottle = ((g.bottle || 0) + 1) % 3;
  saveToStorage();
  renderTables();
}

function deleteGuest(id) {
  guests = guests.filter(x => x.id !== id);
  repackRowNums();
  saveToStorage();
  renderTables();
  renderStaffStatus();
  showToast('削除しました');
}

function clearAll() {
  if (!confirm('全ての予約データを消去しますか？')) return;
  guests = [];
  saveToStorage();
  renderTables();
  showToast('全消去しました');
}

// ===== STATS =====
function updateStats() {
  const active = guests.filter(g => g.name || g.tanto || g.tableNum);
  document.getElementById('statTotal').textContent = active.length;
  document.getElementById('statArrived').textContent = active.filter(g => g.arrived).length;
  updateTableStats();
}

function updateTableStats() {
  const el = document.getElementById('tableStats');
  if (!el) return;
  const withData = guests.filter(g => g.name || g.tanto);
  // 最大rowNum = 予定卓数（データが無ければ0）
  const maxRow = withData.length ? Math.max(...withData.map(g => Number(g.rowNum) || 0)) : 0;
  // △の件数（来店済みは除外）
  const deltaCount = withData.filter(g => g.name && g.name.includes('△') && !g.arrived).length;
  const arrivedCount = withData.filter(g => g.arrived).length;
  // 初回人数集計
  const allRows = firstGroups.reduce((arr, g) => arr.concat(g.rows||[]), []);
  const firstTotal = firstGroups.reduce((sum, g) => sum + (parseInt(g.count)||0), 0);
  const firstCurrent = firstGroups.reduce((sum, g) => {
    return sum + (g.rows||[]).reduce((s, r) => s + (r.nominaoshi && r.nominaoshi.trim() ? 0 : (parseInt(g.count)||0) / (g.rows||[1]).length), 0);
  }, 0);
  const firstCurrentInt = Math.round(firstCurrent);

  const statsHtml = `<span style="font-size:14px;white-space:nowrap;">予定卓数 <span style="color:var(--accent);font-weight:700;">${maxRow}卓</span><span style="color:var(--text-dim);">（△<span style="color:#e74c3c;font-weight:700;">${deltaCount}</span>）</span>&nbsp;&nbsp;現状 <span style="color:#2ecc71;font-weight:700;">${arrivedCount}卓</span>&nbsp;&nbsp;初回 現在<span style="color:var(--accent);font-weight:700;">${firstCurrentInt}名</span>／<span style="color:var(--text-dim);font-weight:700;">${firstTotal}名</span></span>`;
  el.innerHTML = statsHtml;
  // 固定バーにも反映
  const fixedEl = document.getElementById('fixedStats');
  if (fixedEl) {
    fixedEl.innerHTML = statsHtml;
    fixedEl.style.display = 'block';
    updateFixedTop(); setTimeout(updateFixedTop, 50);
  }
}

// ===== STORAGE =====
function saveToStorage() {
  // 保存前に空行を除去
  guests = guests.filter(g => g.name || g.tanto || g.tableNum);
  repackRowNums();
  try { localStorage.setItem('tableManager_guests', JSON.stringify(guests)); } catch(e) {}
  if (window.fbSave) window.fbSave(guests);
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('tableManager_guests');
    if (raw) {
      guests = JSON.parse(raw);
      nextId = guests.reduce((m,g) => Math.max(m, g.id+1), 1);
    }
  } catch(e) {}
}

// ===== STAFF STATUS =====

function loadStaff() {
  try {
    const raw = localStorage.getItem('tableManager_staff');
    if (raw) staffList = JSON.parse(raw);
  } catch(e) {}
  // Firebaseスタッフ受信時に更新
  window._fbStaffReady = function() {
    if (window._fbStaff) {
      staffList = window._fbStaff;
      try { localStorage.setItem('tableManager_staff', JSON.stringify(staffList)); } catch(e) {}
      renderStaffStatus();
    }
  };
}

function saveStaff() {
  try { localStorage.setItem('tableManager_staff', JSON.stringify(staffList)); } catch(e) {}
  console.log('saveStaff called, fbSaveStaff:', typeof window.fbSaveStaff, 'staffList:', staffList);
  if (window.fbSaveStaff) {
    window.fbSaveStaff(staffList);
    console.log('fbSaveStaff called with:', staffList);
  } else {
    console.error('fbSaveStaff is not defined yet!');
  }
}

// 予定未定報告済みのスタッフ名を管理
let pendingReported = new Set();

function markReported(name) {
  pendingReported.add(name);
  renderStaffStatus();
  showToast(name + ' の予定未定を受け付けました');
}

function renderStaffStatus() {
  const container = document.getElementById('staffStatusList');
  if (!container) return;
  if (!staffList.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:10px;">⚙ 編集からスタッフを登録</div>';
    return;
  }
  // 報告済み担当名を収集（部分一致）
  const reportedTantos = guests.map(g => g.tanto).filter(Boolean);
  container.innerHTML = staffList.map(name => {
    const done = reportedTantos.some(tanto => tanto.includes(name) || name.includes(tanto));
    const pending = !done && [...pendingReported].some(p => p.includes(name) || name.includes(p));
    const color = done ? '#2ecc71' : pending ? '#3498db' : 'var(--border)';
    const textColor = done ? '#2ecc71' : pending ? '#3498db' : 'var(--text-dim)';
    return `<div style="padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
      <span style="color:${textColor};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
    </div>`;
  }).join('');
}

// ===== MANAGE MODAL (編集・削除一覧) =====
function openManageModal() {
  let modal = document.getElementById('manageModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'manageModal';
    document.body.appendChild(modal);
  }

  const rows = guests.filter(g => g.name || g.tanto).map(g => `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="color:var(--accent);font-weight:700;min-width:36px;font-size:13px;">${g.rowNum ? 'No.'+g.rowNum : '未'}</span>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;">${g.name || '−'}</div>
        <div style="font-size:11px;color:var(--text-dim);">担当: ${g.tanto || '−'} ／ 来店: ${g.arrive || '−'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeManageModal();openEditModal(${g.id})">編集</button>
      <button class="btn btn-danger btn-sm" onclick="deleteGuest(${g.id});openManageModal()">削除</button>
    </div>
  `).join('');

  modal.innerHTML = `
    <div class="modal" style="max-height:80vh;display:flex;flex-direction:column;">
      <div class="modal-header">
        <span>予約の編集・削除</span>
        <button onclick="closeManageModal()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body" style="overflow-y:auto;flex:1;">
        ${guests.filter(g => g.name || g.tanto).length ? rows : '<p style="color:var(--text-dim);text-align:center;padding:20px;">予約がありません</p>'}
      </div>
    </div>`;
  modal.classList.add('show');
}

function closeManageModal() {
  document.getElementById('manageModal')?.classList.remove('show');
}

function openEditModal(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  let modal = document.getElementById('editModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'editModal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span>予約を編集</span>
        <button onclick="document.getElementById('editModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row"><label class="form-label">No.（行番号）</label><input class="form-input" id="e-rownum" type="number" min="1" max="30" value="${g.rowNum || ''}"></div>
        <div class="form-row"><label class="form-label">卓番</label><input class="form-input" id="e-table" value="${g.tableNum || ''}"></div>
        <div class="form-row"><label class="form-label">お客様名</label><input class="form-input" id="e-name" value="${g.name || ''}"></div>
        <div class="form-row"><label class="form-label">来店時間</label><input class="form-input" id="e-arrive" value="${g.arrive || ''}"></div>
        <div class="form-row"><label class="form-label">退店時間</label><input class="form-input" id="e-leave" value="${g.leave || ''}"></div>
        <div class="form-row"><label class="form-label">担当者</label><input class="form-input" id="e-tanto" value="${g.tanto || ''}"></div>
        <div class="form-row"><label class="form-label">予算</label><input class="form-input" id="e-budget" value="${g.budget || ''}"></div>
        <div class="form-row"><label class="form-label">ヘルプ</label><input class="form-input" id="e-help" value="${g.help || ''}"></div>
        <div class="form-row"><label class="form-label">備考</label><input class="form-input" id="e-note" value="${g.note || ''}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('editModal').classList.remove('show')">キャンセル</button>
        <button class="btn btn-primary" onclick="saveEdit(${id})">保存</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function saveEdit(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  g.rowNum = document.getElementById('e-rownum').value || null;
  g.tableNum = document.getElementById('e-table').value;
  g.name = document.getElementById('e-name').value;
  g.arrive = document.getElementById('e-arrive').value;
  g.leave = document.getElementById('e-leave').value;
  g.tanto = document.getElementById('e-tanto').value;
  g.budget = document.getElementById('e-budget').value;
  g.help = document.getElementById('e-help').value;
  g.note = document.getElementById('e-note').value;
  saveToStorage();
  document.getElementById('editModal').classList.remove('show');
  renderTables();
  showToast('保存しました');
}

function openStaffSettings() {
  let modal = document.getElementById('staffModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'staffModal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span>在籍スタッフ登録</span>
        <button onclick="document.getElementById('staffModal').classList.remove('show')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px;">1行に1名ずつ入力してください</p>
        <textarea id="staffInput" style="width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-main);font-size:13px;padding:10px;outline:none;">${staffList.join('\n')}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('staffModal').classList.remove('show')">キャンセル</button>
        <button class="btn btn-primary" onclick="saveStaffFromModal()">保存</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

function saveStaffFromModal() {
  const raw = document.getElementById('staffInput').value;
  staffList = raw.split(/\n|\\n/).map(s => s.trim()).filter(Boolean);
  saveStaff();
  document.getElementById('staffModal').classList.remove('show');
  renderStaffStatus();
  showToast('スタッフリストを保存しました');
}

// ===== FIXED BARS =====
// ヘッダー・タブの高さぶん下にfixedStats/tantoStats/baanaiBarを重ねて配置し、
// 表示中のバーの高さぶんだけ本文をfixedSpacerで押し下げる
function updateFixedTop() {
  const header = document.querySelector('header');
  const tabs = document.querySelector('.tabs');
  const headerH = header ? header.offsetHeight : 0;
  const tabsH = tabs ? tabs.offsetHeight : 0;
  const base = headerH + tabsH;

  const fixedEl = document.getElementById('fixedStats');
  const tantoEl = document.getElementById('tantoStats');
  const baanaiEl = document.getElementById('baanaiBar');
  const spacer = document.getElementById('fixedSpacer');

  let top = base;
  if (fixedEl && fixedEl.style.display !== 'none') {
    fixedEl.style.top = top + 'px';
    top += fixedEl.offsetHeight;
  }
  if (tantoEl && tantoEl.style.display !== 'none') {
    tantoEl.style.top = top + 'px';
    top += tantoEl.offsetHeight;
  }
  if (baanaiEl && baanaiEl.style.display !== 'none') {
    baanaiEl.style.top = top + 'px';
    top += baanaiEl.offsetHeight;
  }
  if (spacer) spacer.style.height = (top - base) + 'px';
}

// 画面サイズが変わった時（回転など）も再計算
window.addEventListener('resize', () => setTimeout(updateFixedTop, 50));

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
